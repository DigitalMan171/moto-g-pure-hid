name: Moto G Pure Ellis - Official Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Cache Toolchains
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            clang-aosp
            gcc-64
            gcc-32
          key: ${{ runner.os }}-toolchains-v2

      - name: Fetch Toolchains (Fast Clone)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc-64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc-32
          find clang-aosp gcc-64 gcc-32 -type f -exec chmod +x {} +

      - name: Configure and Sync Architecture
        run: |
          # 1. Automatically locate the BIN folders using wildcards
          # This avoids errors if the version numbers (r416183b) change
          CLANG_BIN=$(ls -d $GITHUB_WORKSPACE/clang-aosp/clang-*/bin | head -n 1)
          GCC64_BIN=$GITHUB_WORKSPACE/gcc-64/bin
          GCC32_BIN=$GITHUB_WORKSPACE/gcc-32/bin
          
          # 2. Export absolute PATH
          export PATH="$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PATH"
          
          # 3. Verify compiler is found BEFORE starting
          aarch64-linux-android-gcc --version || (echo "COMPILER NOT FOUND IN PATH" && exit 1)
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          cd $GITHUB_WORKSPACE/kernel-source
          mkdir -p out

          # 4. Copy config
          cp "$GITHUB_WORKSPACE/running.config" out/.config

          # 5. Sync and Build
          # Running olddefconfig twice ensures all hidden dependencies are satisfied
          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_COMPILE ellis_defconfig
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 olddefconfig
          
          # Build with -j2 for stability
          make -j2 O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 Image.gz-dtb

      - name: Upload Kernel Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-Ellis-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
