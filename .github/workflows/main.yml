name: Moto G Pure (MTK) HID Build
run-name: HID Kernel Build - ${{ github.ref_name }}

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev

      - name: Fetch Toolchains (Updated to GCC 9.3)
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://".insteadOf git://
          
          # Using GCC 9.3 to satisfy the kernel's version check
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-gnu-9.3 -b lineage-18.1 gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc32
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: Checkout MTK Kernel Source
        run: |
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-mtk.git -b android-12-release-s3rhs32.20-42-10-4-11 kernel-source

      - name: Build Kernel
        run: |
          # Add toolchains to PATH
          export PATH=$(pwd)/clang-aosp/bin:$(pwd)/gcc64/bin:$(pwd)/gcc32/bin:$PATH
          cd kernel-source
          
          # Environment Setup
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER=build
          export KBUILD_BUILD_HOST=build
          export LOCALVERSION=""
          touch .scmversion

          # Toolchain Prefixes (Note the change to -gnu- for GCC 9.3)
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # 1. Base Config
          make O=out k65v1_64_bsp_defconfig
          
          # 2. Hardware Fragment Merge (Ellis/Houston)
          if [ -f "arch/arm64/configs/ext_config/ellis_defconfig.config" ]; then
            ./scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/ext_config/ellis_defconfig.config
          fi

          # 3. HID Injection
          ./scripts/config --file out/.config --enable CONFIG_USB_G_HID
          ./scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --file out/.config --enable CONFIG_HID_GENERIC
          ./scripts/config --file out/.config --enable CONFIG_USB_HID
          
          # 4. Sync Config (This fixes the "Error in reading" prompt hang)
          make O=out ARCH=arm64 olddefconfig
          
          # 5. Compile
          make O=out ARCH=arm64 -j$(nproc) Image.gz-dtb

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-HID-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
