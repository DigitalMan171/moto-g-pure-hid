name: Moto G Pure HID + DTB Fusion (Master Protocol)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Fetch Kernel Source (Stealth Bypass)
        run: |
          wget https://github.com/MotorolaMobilityLLC/kernel-mtk/archive/refs/heads/android-12-release-s3rhs32.20-42-10-4-11.zip -O kernel.zip
          unzip -q kernel.zip
          mv kernel-mtk-android-12-release-s3rhs32.20-42-10-4-11 kernel-source
          rm kernel.zip

      - name: Setup GCC 10.3 Toolchain
        run: |
          wget https://developer.arm.com/-/media/Files/downloads/gnu-a/10.3-2021.07/binrel/gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          tar -xvf gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          mv gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu toolchain

      - name: Build Kernel (Unified Developer Protocol)
        run: |
          cd kernel-source
          export TOOLCHAIN_PATH=$(pwd)/../toolchain/bin/aarch64-none-linux-gnu-
          cp ../main-repo/running.config .config
          
          # --- 1. ARCHITECTURE & DRIVER SYNC (The "Drivers" Fix) ---
          # Prevents 32-bit/64-bit conflicts in MediaTek GPU and Media drivers
          sed -i 's/CONFIG_ARM=y/CONFIG_ARM64=y/' .config
          sed -i 's/CONFIG_ARCH_MULTI_V7=y/CONFIG_ARCH_V8A=y/' .config
          
          # --- 2. CODE SHIMS (The "Hurdle" Fixes) ---
          # Resolves Inlining and Pathing errors found yesterday
          sed -i 's/inline void ksm_flock/void ksm_flock/g' include/linux/keyslot-manager.h || true
          sed -i 's/always_inline/inline/g' include/linux/keyslot-manager.h || true
          sed -i 's/inline void uclamp_se_set/void uclamp_se_set/g' kernel/sched/sched.h || true
          sed -i 's/#define TRACE_INCLUDE_PATH .$/#define TRACE_INCLUDE_PATH ..\/..\/kernel\/trace/g' kernel/trace/mtk_ftrace.h || true
          sed -i 's/YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true

          # --- 3. THE "SUCCESS" LAYER (Security & Modules) ---
          # Disables signing and keyrings to prevent final-stage link crashes
          sed -i 's/CONFIG_MODULE_SIG=y/CONFIG_MODULE_SIG=n/' .config
          sed -i 's/CONFIG_SYSTEM_TRUSTED_KEYRING=y/CONFIG_SYSTEM_TRUSTED_KEYRING=n/' .config
          
          # Force HID features and SELinux Permissive (prevents vibration loops)
          {
            echo "CONFIG_SECURITY_SELINUX_BOOTPARAM=y"
            echo "CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE=0"
            echo "CONFIG_USB_G_HID=y"
            echo "CONFIG_USB_F_HID=y"
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_MODVERSIONS=n"
          } >> .config

          # --- 4. EXECUTION ---
          make ARCH=arm64 CROSS_COMPILE=$TOOLCHAIN_PATH olddefconfig
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=$TOOLCHAIN_PATH KCFLAGS="-Wno-error" Image.gz
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=$TOOLCHAIN_PATH dtbs
          
          # --- 5. THE FUSION ---
