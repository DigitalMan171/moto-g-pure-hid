name: "Ellis: Official Open-Source Build V5.8.4"
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf liblz4-tool libncurses-dev libsdl1.2-dev libxml2 libxml2-utils lzop pngcrush rsync libelf-dev dwarves xsltproc zip zlib1g-dev device-tree-compiler
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libncurses5_6.3-2ubuntu0.1_amd64.deb
          rm *.deb

      - name: 🌐 Clone Official Motorola Source & Toolchains
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk source
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang
          
          # GCC 10.3 Toolchains
          wget https://developer.arm.com/-/media/Files/downloads/gnu-a/10.3-2021.07/binrel/gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          tar -xf gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz && mv gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu/ gcc64/
          
          wget https://developer.arm.com/-/media/Files/downloads/gnu-a/10.3-2021.07/binrel/gcc-arm-10.3-2021.07-x86_64-arm-none-linux-gnueabihf.tar.xz
          tar -xf gcc-arm-10.3-2021.07-x86_64-arm-none-linux-gnueabihf.tar.xz && mv gcc-arm-10.3-2021.07-x86_64-arm-none-linux-gnueabihf/ gcc32/

      - name: 🧪 Early Stage Patches (Standard Headers)
        working-directory: source
        run: |
          # Fixing Clang inline errors in standard Linux headers
          sed -i 's/inline void ksm_flock/void ksm_flock/g' include/linux/keyslot-manager.h
          sed -i 's/inline void blk_crypto_flock/void blk_crypto_flock/g' include/linux/blk-crypto.h
          sed -i 's/inline void uclamp_se_set/void uclamp_se_set/g' kernel/sched/sched.h

      - name: 🚀 Factory-Aligned Build & Global Export Patching
        working-directory: source
        run: |
          export PATH=$(pwd)/../clang/bin:$(pwd)/../gcc64/bin:$(pwd)/../gcc32/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-none-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-none-linux-gnueabihf-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CC=clang

          # 1. INITIALIZE (Motorola Factory Step)
          make O=out k65v1_64_bsp_defconfig
          
          # 2. SURGICAL JIT PATCHING (Global Symbol Export)
          # We include the export header and prepend stubs with EXPORT_SYMBOL
          # to allow the Video/Audio drivers to find them during final linking.
          
          sed -i '1i #include <linux/export.h>' drivers/power/supply/mtk_battery.c
          sed -i '1i int aee_kernel_dal_show(void *s) { return 0; } EXPORT_SYMBOL(aee_kernel_dal_show);' drivers/power/supply/mtk_battery.c
          sed -i '1i void aee_kernel_remoter_api_func(void *s, ...) {} EXPORT_SYMBOL(aee_kernel_remoter_api_func);' drivers/power/supply/mtk_battery.c
          sed -i '1i void aee_kernel_warning_api_func(void *s, ...) {} EXPORT_SYMBOL(aee_kernel_warning_api_func);' drivers/power/supply/mtk_battery.c
          sed -i '1i void aee_kernel_exception_api_func(void *s, ...) {} EXPORT_SYMBOL(aee_kernel_exception_api_func);' drivers/power/supply/mtk_battery.c
          
          # Motorola-specific Charging and Battery Table
          sed -i '1i int moto_chg_tcmd_unregister(void *client) { return 0; } EXPORT_SYMBOL(moto_chg_tcmd_unregister);' drivers/power/supply/mtk_battery.c
          sed -i '1i int moto_chg_tcmd_register(void *client) { return 0; } EXPORT_SYMBOL(moto_chg_tcmd_register);' drivers/power/supply/mtk_battery.c
          sed -i '1i struct moto_chg_tcmd_client;' drivers/power/supply/mtk_battery.c
          sed -i '1i struct FUELGAUGE_TEMPERATURE { int Temperature; int Temp_Array[20]; };' drivers/power/supply/mtk_battery_table.h

          # 3. CONFIGURE HID & LIGHTWEIGHT PARAMS
          ./scripts/config --file out/.config \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_HIDRAW \
            --enable CONFIG_INPUT_UINPUT \
            --disable CONFIG_BLK_INLINE_ENCRYPTION \
            --disable CONFIG_WERROR \
            --set-val CONFIG_MTK_AEE_FEATURE n
          
          make O=out olddefconfig

          # 4. FINAL COMPILATION (Building vmlinux & Image.gz)
          make -j$(nproc) O=out \
            AR=aarch64-none-linux-gnu-ar \
            NM=aarch64-none-linux-gnu-nm \
            LD=aarch64-none-linux-gnu-ld \
            KBUILD_WERROR=0 \
            KCFLAGS="-w" \
            Image.gz dtbs

      - name: 🔗 Create Ellis Image.gz-dtb
        working-directory: source
        run: |
          DTB_FILE=$(find out/arch/arm64/boot/dts/mediatek/ -name "*ellis*.dtb" | head -n 1)
          cat out/arch/arm64/boot/Image.gz "$DTB_FILE" > out/arch/arm64/boot/Image.gz-dtb

      - name: 📦 Upload Final Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-HID-Kernel-V5.8.4
          path: source/out/arch/arm64/boot/Image.gz-dtb
