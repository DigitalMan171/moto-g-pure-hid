name: Motorola Ellis Factory Build v72
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Stable Environment Cache
        id: cache-all
        uses: actions/cache@v4
        with:
          path: |
            prebuilts
            external
            kernel
            build
            device
            out/.config
          key: ${{ runner.os }}-moto-ellis-v72-stable

      - name: 2. Sync Infrastructure (If Cache Miss)
        if: steps.cache-all.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b android-12.1.0_r27 https://android.googlesource.com/platform/build build/make
          git clone --depth=1 -b android-12.1.0_r27 https://android.googlesource.com/platform/build/soong build/soong
          git clone --depth=1 -b android-12.1.0_r27 https://android.googlesource.com/platform/build/blueprint build/blueprint
          mkdir -p external
          git clone --depth=1 -b android-12.1.0_r27 https://android.googlesource.com/platform/external/golang-protobuf external/golang-protobuf
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang/host/linux-x86
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/go/linux-x86 prebuilts/go/linux-x86
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/ninja/linux-x86 prebuilts/ninja/linux-x86
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/build-tools prebuilts/build-tools
          ln -s make/envsetup.sh build/envsetup.sh
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel

      - name: 3. Sync Private Hardware Blobs
        run: |
          export TOP=$(pwd)
          git clone https://${{ secrets.DTBTOKEN }}@github.com/digitalman171/ellis-dtb.git $TOP/dtb_repo

      - name: 4. Save Toolchain State (Pre-Build Backup)
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-environment-verified
          path: |
            build/envsetup.sh
            dtb_repo/
            prebuilts/build-tools/linux-x86/bin/

      - name: 5. Hardware Identity & 64-bit Logic
        run: |
          DEVICE_PATH="device/motorola/ellis"
          mkdir -p $DEVICE_PATH
          cat <<EOF > $DEVICE_PATH/AndroidProducts.mk
          PRODUCT_MAKEFILES := \$(LOCAL_DIR)/full_ellis.mk
          COMMON_LUNCH_CHOICES := full_ellis-eng
          EOF
          cat <<EOF > $DEVICE_PATH/full_ellis.mk
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/core_64_bit.mk)
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/full_base.mk)
          PRODUCT_DEVICE := ellis
          PRODUCT_NAME := full_ellis
          PRODUCT_BRAND := motorola
          PRODUCT_MODEL := Moto G Pure
          EOF
          cat <<EOF > $DEVICE_PATH/BoardConfig.mk
          TARGET_ARCH := arm64
          TARGET_ARCH_VARIANT := armv8-a
          TARGET_CPU_ABI := arm64-v8a
          TARGET_BOARD_PLATFORM := mt6765
          TARGET_DEVICE := ellis
          EOF

      - name: 6. Execution (HID Injection & Precision Stitch)
        run: |
          export TEMPORARY_DISABLE_PATH_RESTRICTIONS=true
          export TOP=$(pwd)
          source build/envsetup.sh
          lunch full_ellis-eng
          CLANG_BIN=$(ls -d $TOP/prebuilts/clang/host/linux-x86/clang-r*/bin | sort -V | tail -n 1)
          export PATH="$CLANG_BIN:$PATH"
          cd kernel
          KBUILD_ARGS="-j$(nproc) O=$TOP/out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CLANG_TRIPLE=aarch64-linux-gnu-"
          make $KBUILD_ARGS mt6765_defconfig
          ./scripts/config --file $TOP/out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --file $TOP/out/.config --enable CONFIG_UHID
          ./scripts/config --file $TOP/out/.config --disable CONFIG_STRICT_DEVMEM
          ./scripts/config --file $TOP/out/.config --enable CONFIG_DEVMEM
          make $KBUILD_ARGS Image.gz
          truncate -s %4 $TOP/out/arch/arm64/boot/Image.gz
          cat $TOP/out/arch/arm64/boot/Image.gz \
              $TOP/dtb_repo/boot.img-dtb-offset \
              $TOP/dtb_repo/boot.img-dtb > $TOP/out/arch/arm64/boot/Image.gz-dtb

      - name: 7. Archive Build Artifacts (Crash-Resistant)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-final-output
          path: |
            out/arch/arm64/boot/Image.gz-dtb
            out/.config
            out/*.log
