name: Motorola Ellis Factory Cloud-Save
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Workspace Save Method (Cloud Sync v23)
        id: cache-all
        uses: actions/cache@v4
        with:
          path: |
            prebuilts/clang/host/linux-x86
            kernel
            build/make
            out
          # Incrementing this key forces a fresh download and update to the cloud
          key: ${{ runner.os }}-moto-ellis-v23

      - name: 2. Factory Sync (Forced Download on Cache Miss)
        if: steps.cache-all.outputs.cache-hit != 'true'
        run: |
          echo "--- STARTING FRESH DOWNLOAD OF FACTORY TOOLS ---"
          
          # A. The Build 'Brain' - Fixed branch name for Android 12
          git clone --depth=1 -b android12-release https://android.googlesource.com/platform/build build/make
          
          # B. The Official Compiler
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang/host/linux-x86
          
          # C. The Kernel Source (Motorola Ellis Branch)
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          
          # D. Motorola Vendor Modules
          mkdir -p kernel/vendor/motorola
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/motorola-kernel-modules.git kernel/vendor/motorola/modules

      - name: 3. Identity Injection (Mock Device Tree)
        run: |
          mkdir -p device/motorola/ellis
          
          # Register the device in the lunch menu
          cat <<EOF > device/motorola/ellis/vendorsetup.sh
          add_lunch_combo full_ellis-userdebug
          EOF

          # Define the product map
          cat <<EOF > device/motorola/ellis/AndroidProducts.mk
          PRODUCT_MAKEFILES := \$(LOCAL_DIR)/full_ellis.mk
          COMMON_LUNCH_CHOICES := full_ellis-userdebug
          EOF

          # Identity blueprint
          cat <<EOF > device/motorola/ellis/full_ellis.mk
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/core_64_bit.mk)
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/full_base.mk)
          PRODUCT_DEVICE := ellis
          PRODUCT_NAME := full_ellis
          PRODUCT_BRAND := Motorola
          PRODUCT_MODEL := Moto G Pure
          EOF

      - name: 4. Execution (AOSP Wrapper Protocol)
        run: |
          # 1. Prepare Environment
          export TOP=$(pwd)
          source build/make/envsetup.sh
          
          # 2. Trigger Lunch (Should now be valid with A12 tools)
          lunch full_ellis-userdebug
          
          # 3. Locate Clang & Set Paths
          CLANG_BIN=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r*/bin | sort -V | tail -n 1)
          export PATH="$CLANG_BIN:$PATH"
          
          # 4. Kernel Compilation Logic
          cd kernel
          
          # Standard Motorola Kbuild Arguments
          KBUILD_ARGS="-j$(nproc) O=$TOP/out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CLANG_TRIPLE=aarch64-linux-gnu-"
          
          # Step A: Generate the Ellis config
          make $KBUILD_ARGS ellis_defconfig
          
          # Step B: Inject your HID/Arduino Project Requirements
          # This ensures 'Improved Pointer' support is actually in the binary
          ../kernel/scripts/config --file $TOP/out/.config --enable CONFIG_UHID
          ../kernel/scripts/config --file $TOP/out/.config --enable CONFIG_USB_HID
          ../kernel/scripts/config --file $TOP/out/.config --enable CONFIG_HID_GENERIC
          
          # Step C: Final Build
          make $KBUILD_ARGS

      - name: 5. Final Cloud-Save & Archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-ellis-v23-final
          path: |
            out/arch/arm64/boot/Image.gz*
            out/.config
