name: Moto G Pure Ellis - Official Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Cache Toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: |
            bin64
            bin32
            clang-flat
          key: ${{ runner.os }}-toolchains-v1

      - name: Fetch and Hard-Link Toolchains
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          # Only runs if cache is NOT found
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-tmp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc64-tmp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc32-tmp

          mkdir -p $GITHUB_WORKSPACE/bin64
          mkdir -p $GITHUB_WORKSPACE/bin32
          mkdir -p $GITHUB_WORKSPACE/clang-flat

          cp -r gcc64-tmp/bin/. $GITHUB_WORKSPACE/bin64/
          cp -r gcc32-tmp/bin/. $GITHUB_WORKSPACE/bin32/
          cp -r clang-tmp/clang-r*/. $GITHUB_WORKSPACE/clang-flat/

          rm -rf clang-tmp gcc64-tmp gcc32-tmp
          chmod +x $GITHUB_WORKSPACE/bin64/* $GITHUB_WORKSPACE/bin32/* $GITHUB_WORKSPACE/clang-flat/bin/*

      - name: Pre-Flight Verification
        run: |
          # Ensures binaries exist and are executable whether from cache or fresh download
          ls $GITHUB_WORKSPACE/bin64/aarch64-linux-android-gcc || exit 1
          ls $GITHUB_WORKSPACE/bin32/arm-linux-androideabi-gcc || exit 1

      - name: Build Kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/clang-flat/bin:$GITHUB_WORKSPACE/bin64:$GITHUB_WORKSPACE/bin32:$PATH"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          cd $GITHUB_WORKSPACE/kernel-source
          mkdir -p out
          cp "$GITHUB_WORKSPACE/running.config" out/.config

          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_COMPILE ellis_defconfig
          make -j$(nproc) O=out ARCH=arm64 CC=clang CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 Image.gz-dtb

      - name: Upload Kernel Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-Ellis-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
