name: Motorola Ellis Native Protocol Build
on: [workflow_dispatch]

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    env:
      # 1. NATIVE MOTOROLA IDENTIFIERS
      # 'ellis_factory' triggers the factory-mtk.config and iommu fast-path
      TARGET_PRODUCT: ellis_factory
      TARGET_BUILD_VARIANT: eng
      PROJECT: ellis
      ARCH: arm64
      
      # 2. COMPILER FLAGS
      # Motorola natively uses LLVM (Clang) for Android 12
      LLVM: 1
      LLVM_IAS: 1
      CLANG_TRIPLE: aarch64-linux-gnu-
      CROSS_COMPILE: aarch64-linux-android-

    steps:
      - name: 1. Clone Motorola Source
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git .

      - name: 2. Inject HID Fragment into Native Path
        run: |
          # We place our data in the 'ext_config' folder so the Motorola verifier picks it up
          mkdir -p arch/arm64/configs/vendor/ext_config/
          cat <<EOF > arch/arm64/configs/vendor/ext_config/hid_custom.config
          CONFIG_USB_G_HID=y
          CONFIG_USB_CONFIGFS_F_HID=y
          EOF
          # Tell the script to include this new fragment during the merge step
          echo "KERNEL_EXTRA_CONFIG=hid_custom" >> $GITHUB_ENV

      - name: 3. Run Native Build Script
        run: |
          # This script handles the 'add_moto_defconfig_fragments' logic natively.
          # It merges the base ellis_defconfig with factory-ellis.config AND our hid_custom.config.
          ./build/build.sh -j$(nproc)

      - name: 4. Archive Verified Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: ellis-hid-kernel
          path: out/arch/arm64/boot/Image.gz*
