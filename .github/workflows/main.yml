name: Ellis Engineering Build - Factory Final

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          fetch-depth: 1
          path: kernel

      - name: Fetch Factory Toolchains
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc32

      - name: Setup Build Environment (with 32-bit Support)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev \
            libc6:i386 libncurses5:i386 libstdc++6:i386 lib32z1

      - name: Build Engineering Stack
        run: |
          cd kernel
          
          # 1. SETUP ABSOLUTE PATHS
          TOOLCHAIN_DIR=$GITHUB_WORKSPACE
          CLANG_BIN=$TOOLCHAIN_DIR/clang-aosp/bin
          GCC64_BIN=$TOOLCHAIN_DIR/gcc64/bin
          GCC32_BIN=$TOOLCHAIN_DIR/gcc32/bin
          
          # 2. EXPORT PATHS
          export PATH=$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PATH
          export LD_LIBRARY_PATH=$TOOLCHAIN_DIR/clang-aosp/lib64:$LD_LIBRARY_PATH
          
          # 3. FACTORY BUILD VARIABLES
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CC=clang
          export HOSTCC=clang
          
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          mkdir -p $OUT_DIR
          
          # 4. VERIFY BINARIES (Debug step)
          # If this fails, the build stops here with a clear error
          $GCC64_BIN/aarch64-linux-android-ld --version

          # 5. INITIALIZE
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=$CC HOSTCC=$HOSTCC \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               CROSS_COMPILE=$CROSS_COMPILE \
               CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
               mgk_64_k510_defconfig

          # 6. MOTOROLA PROJECT MERGE
          ./scripts/kconfig/merge_config.sh -O $OUT_DIR \
            $OUT_DIR/.config arch/arm64/configs/ext_config/moto-mgk_64_k510.config

          # 7. INJECT HID & STORAGE
          ./scripts/config --file $OUT_DIR/.config \
            --enable CONFIG_MTK_ENG_BUILD \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_USB_GADGET \
            --enable CONFIG_MTK_MSDC \
            --enable CONFIG_MMC_MTK \
            --enable CONFIG_MTK_RPMB \
            --enable CONFIG_MTK_RPMB_SUPPORT \
            --disable CONFIG_SECTION_MISMATCH_WARN_ONLY
            
          # 8. SEAL & COMPILE
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=$CC HOSTCC=$HOSTCC \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               CROSS_COMPILE=$CROSS_COMPILE \
               CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
               olddefconfig
            
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=$CC HOSTCC=$HOSTCC \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               CROSS_COMPILE=$CROSS_COMPILE \
               CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
               Image.gz dtbs -j$(nproc)

      - name: Package Image.gz-dtb
        run: |
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          DTB_FILE=$(find $OUT_DIR/arch/arm64/boot/dts/ -name "*6765*.dtb" | head -n 1)
          cat $OUT_DIR/arch/arm64/boot/Image.gz "$DTB_FILE" > $OUT_DIR/arch/arm64/boot/Image.gz-dtb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ellis-factory-hid-kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
