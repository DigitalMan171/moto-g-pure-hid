name: AOSP Native Motorola Protocol (Persistent & Linked)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MOTO_VER: "12.0.0"
      ARCH: arm64
      LLVM: 1
      LLVM_IAS: 1
      CROSS_COMPILE: aarch64-linux-android-

    steps:
      - name: 1. Maximize Workspace & Initialize Cache
        uses: actions/cache@v4
        with:
          path: |
            prebuilts/clang/host/linux-x86
            out
          key: ${{ runner.os }}-moto-toolchain-${{ env.MOTO_VER }}
          restore-keys: |
            ${{ runner.os }}-moto-toolchain-

      - name: 2. Clone Official Motorola Source & Setup Toolchain
        run: |
          # A. Clone Kernel Source if missing
          if [ ! -d ".git" ]; then
            git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
            https://github.com/MotorolaMobilityLLC/kernel-mtk.git .
          fi

          # B. Pull Toolchain if missing
          if [ ! -d "prebuilts/clang/host/linux-x86" ]; then
            git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            prebuilts/clang/host/linux-x86
          fi
          
          # C. Lock the Environment Paths (The Link)
          CLANG_DIR=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r*)
          echo "CLANG_PATH=$CLANG_DIR" >> $GITHUB_ENV
          echo "$CLANG_DIR/bin" >> $GITHUB_PATH
          echo "Using Toolchain: $CLANG_DIR"

      - name: 3. Execute Native Motorola Build (MTK-Linked)
        run: |
          # A. CREATE THE EXTRA KEY
          cat <<EOF > hid_unlock.config
          CONFIG_USB_G_HID=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_MTK_EARA_IO_SUPPORT=y
          CONFIG_MTK_BLOCK_TAG_SUPPORT=y
          EOF

          # B. THE MASTER PLATFORM COMMAND
          # Passing PROJECT and MTK_PLATFORM to solve the Blocktag error
          make O=out ARCH=$ARCH \
            PROJECT=ellis \
            MTK_PROJECT=ellis \
            MTK_PLATFORM=mt6765 \
            CONFIG_MOTOROLA_KERNEL_VERSION=$MOTO_VER \
            KBUILD_DEFCONFIG=ext_config/ellis_defconfig.config \
            KERNEL_EXTRA_CONFIG=hid_unlock.config \
            defconfig

          # C. COMPILE WITH STABLE LINKS
          make O=out -j$(nproc) \
            ARCH=$ARCH \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-android- \
            PROJECT=ellis \
            MTK_PROJECT=ellis \
            MTK_PLATFORM=mt6765 \
            CONFIG_MOTOROLA_KERNEL_VERSION=$MOTO_VER \
            KERNEL_EXTRA_CONFIG=hid_unlock.config

      - name: 4. Archive Verified Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-custom-kernel
          path: out/arch/arm64/boot/Image.gz*
