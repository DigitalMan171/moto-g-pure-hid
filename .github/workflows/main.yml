name: Moto G Pure S3RH-Series HID Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Toolchain
        run: sudo apt-get update && sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm

      - name: Create Ellis HID Fragment
        run: |
          mkdir -p arch/arm64/configs/ext_config/
          cat <<EOF > arch/arm64/configs/ext_config/usb_hid.config
          # Disable Legacy Stack
          # CONFIG_USB_G_HID is not set
          
          # Enable Modern 2026 ConfigFS Stack
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_USB_LIBCOMPOSITE=y
          CONFIG_HID=y
          CONFIG_HIDRAW=y
          CONFIG_UHID=y
          CONFIG_INPUT_UINPUT=y
          EOF

      - name: Build Official Ellis Kernel
        run: |
          # 1. Init Ellis Hardware
          make O=out ARCH=arm64 vendor/ellis_defconfig
          
          # 2. Merge HID Reroute
          ./scripts/kconfig/merge_config.sh -O out/ out/.config arch/arm64/configs/ext_config/usb_hid.config
          
          # 3. Compile
          make -j$(nproc --all) O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-android-
