name: Motorola Factory Master Build (Supplemental Integration)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Toolchain & Supplemental Assets
        run: |
          # Fetch Main Kernel
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          
          # Fetch Supplemental Modules (The 'Missing' Hardware Drivers)
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/motorola-kernel-modules.git modules
          
          # Fetch Android Clang
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
          prebuilts/clang/host/linux-x86

      - name: 2. Setup Reconstructed ProjectConfig
        run: |
          cat <<EOF > build_env.sh
          # Target Identifiers
          export ARCH=arm64
          export PROJECT=ellis
          export MTK_PLATFORM=mt6765
          export TARGET_BUILD_VARIANT=eng
          
          # Hardware Unlocks (Simulating Motorola's Internal ProjectConfig.mk)
          export MTK_TOUCH_PANEL=yes
          export MTK_USB_DUAL_ROLE_SUPPORT=yes
          export MTK_SMI_SUPPORT=yes
          export MTK_IOMMU_SUPPORT=yes
          export MTK_EARA_IO_SUPPORT=yes
          export MTK_BLOCK_TAG_SUPPORT=yes
          
          # Toolchain Environment
          CLANG_DIR=\$(ls -d \$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r* | sort -V | tail -n 1)
          export PATH="\$CLANG_DIR/bin:\$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          EOF

      - name: 3. Create Hardware-Software Bridge Config
        run: |
          cat <<EOF > factory_master.config
          # IN-CELL TOUCH & DISPLAY
          CONFIG_INPUT_TOUCHSCREEN=y
          CONFIG_MTK_TOUCHPANEL=y
          CONFIG_TOUCHSCREEN_MTK_COMMON=y
          CONFIG_MTK_LCM=y
          
          # INFRASTRUCTURE & HID
          CONFIG_MTK_SMI=y
          CONFIG_MTK_IOMMU=y
          CONFIG_USB_MTK_HDRC=y
          CONFIG_USB_G_HID=y
          
          # ENGINEERING WORKER SYNC
          CONFIG_MTK_EARA_IO_SUPPORT=y
          CONFIG_MTK_BLOCK_TAG_SUPPORT=y
          EOF

      - name: 4. Build with Module Linking
        run: |
          source build_env.sh
          cd kernel
          
          # THE FIX: Point the build to the supplemental module headers
          export KCPPFLAGS="-I$GITHUB_WORKSPACE/modules/include"
          
          COMMON_FLAGS="ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CLANG_TRIPLE=aarch64-linux-gnu- MTK_PLATFORM=mt6765"
          
          # 1. Base Defconfig
          make O=out $COMMON_FLAGS ellis_defconfig
          
          # 2. Merge Factory Fragments
          ./scripts/kconfig/merge_config.sh -m -O out out/.config ../factory_master.config
          
          # 3. Final Dependency Sync
          make O=out $COMMON_FLAGS olddefconfig
          
          # 4. Compilation
          make O=out -j$(nproc) $COMMON_FLAGS

      - name: 5. Archive Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-ellis-complete
          path: |
            kernel/out/arch/arm64/boot/Image.gz*
            kernel/out/.config
