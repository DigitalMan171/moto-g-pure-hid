name: Ellis Engineering Build - Factory Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          fetch-depth: 1
          path: kernel

      - name: Fetch Factory Toolchains (Internal Layout)
        run: |
          # Motorola expects prebuilts INSIDE the kernel directory for certain scripts
          mkdir -p kernel/prebuilts/clang/host/linux-x86
          mkdir -p kernel/prebuilts/gcc/linux-x86/aarch64
          mkdir -p kernel/prebuilts/gcc/linux-x86/arm
          
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b kernel/prebuilts/clang/host/linux-x86/clang-r416183b
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 kernel/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 kernel/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9

      - name: Install System Dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev libc6:i386 libstdc++6:i386 lib32z1 binutils-multiarch wget
          # Fix for legacy MTK build tool compatibility
          wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.2-0ubuntu2_i386.deb
          wget http://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.2-0ubuntu2_i386.deb
          sudo dpkg -i libtinfo5_6.2-0ubuntu2_i386.deb libncurses5_6.2-0ubuntu2_i386.deb

      - name: Execute Factory Build
        run: |
          # EXACT FACTORY PATHS
          KERNEL_ROOT=$GITHUB_WORKSPACE/kernel
          export CLANG_PATH=$KERNEL_ROOT/prebuilts/clang/host/linux-x86/clang-r416183b/bin
          export CROSS_COMPILE=$KERNEL_ROOT/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin/aarch64-linux-android-
          export CROSS_COMPILE_ARM32=$KERNEL_ROOT/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/bin/arm-linux-androideabi-
          
          export PATH=$CLANG_PATH:$PATH
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          
          cd kernel
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          mkdir -p $OUT_DIR
          
          # Force the HID/MMC settings into a fragment
          cat <<EOF > custom_ellis.config
          CONFIG_MTK_ENG_BUILD=y
          CONFIG_USB_G_HID=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_HID_GENERIC=y
          CONFIG_USB_GADGET=y
          CONFIG_MMC=y
          CONFIG_MTK_MSDC=y
          CONFIG_MTK_RPMB=y
          CONFIG_MTK_RPMB_SUPPORT=y
          EOF
          
          # Step 1: Base Architecture Config
          make O=$OUT_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE mgk_64_k510_defconfig
          
          # Step 2: Merge Motorola Hardware Config + Custom HID
          ./scripts/kconfig/merge_config.sh -O $OUT_DIR $OUT_DIR/.config \
            arch/arm64/configs/ext_config/moto-mgk_64_k510.config \
            custom_ellis.config
          
          # Step 3: Verify the Dependency Chain (Olddefconfig)
          make O=$OUT_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE CC=clang CLANG_TRIPLE=aarch64-linux-gnu- olddefconfig
          
          # Step 4: Final Compilation
          make O=$OUT_DIR ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 CC=clang HOSTCC=clang CLANG_TRIPLE=aarch64-linux-gnu- Image.gz dtbs -j$(nproc)

      - name: Package Result
        run: |
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          DTB_FILE=$(find $OUT_DIR/arch/arm64/boot/dts/ -name "*6765*.dtb" | head -n 1)
          cat $OUT_DIR/arch/arm64/boot/Image.gz "$DTB_FILE" > $OUT_DIR/arch/arm64/boot/Image.gz-dtb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ellis-factory-hid-kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
