name: Moto G Pure Ellis - Official Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # This pulls your repo (with running.config) into the main workspace
          fetch-depth: 1

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Cache Toolchains
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            clang-aosp
            gcc-64
            gcc-32
          key: ${{ runner.os }}-toolchains-v1

      - name: Fetch Toolchains (Fast Clone)
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          # Use single branch and blob filtering for speed
          git clone --depth=1 --filter=blob:none --single-branch https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp
          git clone --depth=1 --filter=blob:none --single-branch https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc-64
          git clone --depth=1 --filter=blob:none --single-branch https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc-32
          find clang-aosp gcc-64 gcc-32 -type f -exec chmod +x {} +

      - name: Configure and Sync Architecture
        run: |
          # 1. Setup absolute variables
          export ROOT_DIR=$GITHUB_WORKSPACE
          export CLANG_BIN=$ROOT_DIR/clang-aosp/clang-r416183b/bin
          export PATH="$CLANG_BIN:$ROOT_DIR/gcc-64/bin:$ROOT_DIR/gcc-32/bin:$PATH"
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          # 2. Prepare build directory
          cd $ROOT_DIR/kernel-source
          mkdir -p out

          # 3. Copy running.config from the root (verified in d50c7a.jpg)
          if [ -f "$ROOT_DIR/running.config" ]; then
            cp "$ROOT_DIR/running.config" out/.config
            echo "SUCCESS: running.config found and copied."
          else
            echo "ERROR: running.config not found! Current location:"
            ls -la $ROOT_DIR
            exit 1
          fi

          # 4. Sync the configuration
          # Force the use of LLVM and your specific config values
          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_COMPILE ellis_defconfig
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE CROSS
