name: Ellis Surgical Build - Motorola Official Protocol
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source & Submodules
        uses: actions/checkout@v4
        with:
          repository: 'MotorolaMobilityLLC/kernel-mtk'
          ref: 'android-12-release-s3rhs32.20-42-10-4-11'
          submodules: 'recursive'
          path: './'

      - name: Checkout AOSP Toolchains
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9'
          path: 'gcc64'

      - name: Checkout AOSP Clang
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b'
          path: 'clang-aosp'

      - name: Protocol Phase 1: Configuration & HID Patch
        run: |
          mkdir -p out
          
          # IDENTIFY MOTOROLA LAYERS
          BASE_BSP="arch/arm64/configs/k65v1_64_bsp_defconfig"
          ELLIS_FRAG=$(find arch/arm64/configs -name "ellis_defconfig.config" | head -n 1)
          
          # MERGE LAYERS
          cat "$BASE_BSP" > out/.config
          if [ -n "$ELLIS_FRAG" ]; then
            cat "$ELLIS_FRAG" >> out/.config
            echo "✅ Ellis hardware layer merged."
          fi
          
          # INJECT USB-HID SUPPORT
          {
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_HID_GENERIC=y"
            echo "CONFIG_USB_HID=y"
            echo "CONFIG_INPUT_JOYSTICK=y"
            echo "CONFIG_JOYSTICK_XPAD=y"
          } >> out/.config

          # SYNC ENVIRONMENT
          export ARCH=arm64
          export CROSS_COMPILE=$(pwd)/gcc64/bin/aarch64-linux-android-
          export CC=$(pwd)/clang-aosp/bin/clang
          
          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_COMPILE CC=$CC olddefconfig

      - name: Protocol Phase 2: Global Driver Build & Assembly
        run: |
          # GLOBAL ENVIRONMENT HANDSHAKE
          # Ensures Camera (imgsensor), Touch, and HID drivers sync correctly
          export ARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=$(pwd)/gcc64/bin/aarch64-linux-android-
          export CROSS_COMPILE_ARM32=$(pwd)/gcc64/bin/aarch64-linux-android-
          export CC=$(pwd)/clang-aosp/bin/clang
          export LD_LIBRARY
