name: Moto G Pure (MTK) HID Final Build
run-name: HID Kernel Build - ${{ github.ref_name }}

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi pahole device-tree-compiler

      - name: Fetch Clang Toolchain
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://".insteadOf git://
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: Checkout MTK Kernel Source
        run: |
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-mtk.git -b android-12-release-s3rhs32.20-42-10-4-11 kernel-source

      - name: Build Kernel
        run: |
          export PATH=$(pwd)/clang-aosp/bin:$PATH
          cd kernel-source
          
          # --- STAGE 1: SOURCE LOGIC PATCHES ---
          
          # 1. Forward declare the temperature struct to solve "incomplete type"
          sed -i '1i struct FUELGAUGE_TEMPERATURE { int Temperature; int Temp_Array[20]; };' drivers/power/supply/mtk_battery_table.h

          # 2. De-inline functions to prevent 'always_inline' failures in modern Clang
          sed -i 's/inline void ksm_flock/void ksm_flock/g' include/linux/keyslot-manager.h
          sed -i 's/inline void blk_crypto_flock/void blk_crypto_flock/g' include/linux/blk-crypto.h
          sed -i 's/inline void uclamp_se_set/void uclamp_se_set/g' kernel/sched/sched.h

          # 3. Type-Matched Linker Stubs
          # These satisfy the 'undefined reference' errors for missing Motorola code.
          echo 'struct moto_chg_tcmd_client;' >> drivers/power/supply/mtk_battery.c
          echo 'int moto_chg_tcmd_register(struct moto_chg_tcmd_client *client) { return 0; }' >> drivers/power/supply/mtk_battery.c
          echo 'int moto_chg_tcmd_unregister(struct moto_chg_tcmd_client *client) { return 0; }' >> drivers/power/supply/mtk_battery.c

          # --- STAGE 2: COMPILER ENVIRONMENT ---
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export HOSTCC=clang

          # --- STAGE 3: CONFIG & HID INJECTION ---
          mkdir -p out
          make O=out k65v1_64_bsp_defconfig
          
          if [ -f "arch/arm64/configs/ext_config/ellis_defconfig.config" ]; then
            ./scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/ext_config/ellis_defconfig.config
          fi

          ./scripts/config --file out/.config --disable CONFIG_USB_G_HID --enable CONFIG_USB_CONFIGFS_F_HID --enable CONFIG_HID_GENERIC --enable CONFIG_USB_HID
          make O=out olddefconfig
          
          # --- STAGE 4: COMPILATION & PACKAGING ---
          # Build compressed image and device tree blobs separately
          make O=out KCFLAGS="-w" -j$(nproc) Image.gz dtbs
          
          # Manual concatenation to create the combined Image.gz-dtb
          # We search for the specific MT6765 DTB for the Moto G Pure (Ellis)
          DTB_FILE=$(find out/arch/arm64/boot/dts/mediatek/ -name "*ellis*.dtb" | head -n 1)
          if [ -z "$DTB_FILE" ]; then
            DTB_FILE=$(find out/arch/arm64/boot/dts/mediatek/ -name "*.dtb" | head -n 1)
          fi
          
          cat out/arch/arm64/boot/Image.gz "$DTB_FILE" > out/arch/arm64/boot/Image.gz-dtb

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-HID-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
