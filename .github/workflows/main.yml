name: Moto G Pure 32-bit HID Final
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Configs
        uses: actions/checkout@v4

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev git libelf-dev

      - name: Clone AOSP 32-bit Toolchain
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b master clang-toolchain
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b master gcc32
          echo "$(pwd)/clang-toolchain/clang-r353983c/bin:$(pwd)/gcc32/bin:$PATH" >> $GITHUB_PATH

      - name: Clone Motorola Source
        run: |
          git clone --depth=1 --branch android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git source

      - name: Inject HID to Device Config
        run: |
          cd source
          mkdir -p out
          # Using your provided device config as the foundation
          cp ../running.config out/.config
          
          # Force enable HID Gadget and Sync keys
          sed -i 's/CONFIG_LOCALVERSION=""/CONFIG_LOCALVERSION="+"/' out/.config
          {
            echo "CONFIG_USB_CONFIGFS=y"
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_USB_F_HID=y"
            echo "CONFIG_USB_G_HID=y"
            echo "CONFIG_HID=y"
          } >> out/.config
          
          make O=out ARCH=arm CC=clang CLANG_TRIPLE=arm-linux-androideabi- CROSS_COMPILE=arm-linux-androideabi- oldconfig < /dev/null

      - name: Build zImage
        run: |
          cd source
          # Changed target to 'zImage' to fix the 'No rule to make target' error
          make -j$(nproc) O=out ARCH=arm \
            CC=clang \
            CLANG_TRIPLE=arm-linux-androideabi- \
            CROSS_COMPILE=arm-linux-androideabi- \
            KCFLAGS="-w -target arm-linux-androideabi" \
            zImage

      - name: Upload for AIK
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-32bit-kernel
          path: source/out/arch/arm/boot/zImage
