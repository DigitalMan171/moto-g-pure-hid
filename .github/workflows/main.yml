name: Ellis Surgical Build - HID Enable
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential bison flex libssl-dev libelf-dev python3
          sudo apt-get install -y clang-11 lld-11 llvm-11 gcc-aarch64-linux-gnu

      - name: Configure and Patch
        run: |
          # 1. VERSION TRICKING
          touch .scmversion
          export LOCALVERSION=""
          mkdir -p out
          
          # 2. OFFICIAL PATH DEFINITIONS
          # Motorola MTK 4.19 Protocol:
          # Base: k65v1_64_bsp_defconfig
          # Fragment: vendor/ext_config/ellis-default.config
          
          # We use the built-in 'KCONFIG_ALLCONFIG' merge protocol
          make O=out ARCH=arm64 \
            KCONFIG_ALLCONFIG=arch/arm64/configs/vendor/ext_config/ellis-default.config \
            k65v1_64_bsp_defconfig
          
          # 3. APPLY CUSTOM PERIPHERAL & SECURITY FLAGS
          {
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_HID_GENERIC=y"
            echo "CONFIG_USB_HID=y"
            echo "CONFIG_SECURITY_SELINUX=y"
            echo "CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE=0"
            echo "# CONFIG_SECURITY_SELINUX_DEVELOP is not set"
            echo "# CONFIG_MODULE_SIG is not set"
            echo "# CONFIG_MODVERSIONS is not set"
          } >> out/.config
          
          # Finalize the merged configuration
          make O=out ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          make O=out ARCH=arm64 \
          CC=clang-11 \
          LD=ld.lld-11 \
          AR=llvm-ar-11 \
          NM=llvm-nm-11 \
          OBJCOPY=llvm-objcopy-11 \
          OBJDUMP=llvm-objdump-11 \
          STRIP=llvm-strip-11 \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          -j$(nproc) Image.gz

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Surgical-Kernel
          path: out/arch/arm64/boot/Image.gz
