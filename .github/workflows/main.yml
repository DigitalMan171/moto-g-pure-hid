name: Ellis Surgical Build - Motorola Spec Verification
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source (Proven Branch)
        uses: actions/checkout@v4
        with:
          ref: 'android-12-release-s3rhs32.20-42-10-4-11'

      - name: Fetch Toolchain
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_host_linux-x86 clang-aosp

      - name: Layered Configuration & Verification
        run: |
          mkdir -p out
          
          # 1. MOTOROLA SPEC MERGE (The 'Layered Cake')
          # We stack Base -> Consolidated -> Ellis
          cat arch/arm64/configs/k65v1_64_bsp_defconfig \
              arch/arm64/configs/vendor/moto-consolidate.config \
              arch/arm64/configs/vendor/ellis_defconfig.config > out/.config
          
          # 2. INJECT OUR HID FIXES
          {
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_HID_GENERIC=y"
            echo "CONFIG_USB_HID=y"
          } >> out/.config
          
          # 3. VERIFICATION (Manufacturer Check)
          echo "--- VERIFYING MERGE ---"
          if grep -q "CONFIG_USB_HID=y" out/.config && grep -q "CONFIG_MTK_TOUCH_PANEL" out/.config; then
            echo "✅ SUCCESS: Both Motorola drivers and HID drivers are present."
            tail -n 15 out/.config
          else
            echo "❌ ERROR: Merge failed. One or more layers are missing."
            exit 1
          fi

          # 4. FINALIZE CONFIG
          make O=out ARCH=arm64 \
            CROSS_COMPILE=$(pwd)/gcc64/bin/aarch64-linux-android- \
            CC=$(pwd)/clang-aosp/clang-r416183b1/bin/clang \
            olddefconfig

      - name: Compile
        run: |
          make O=out ARCH=arm64 \
            CROSS_COMPILE=$(pwd)/gcc64/bin/aarch64-linux-android- \
            CC=$(pwd)/clang-aosp/clang-r416183b1/bin/clang \
            -j$(nproc) Image.gz
