name: AOSP Native Protocol Ellis
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Motorola Internal Identifiers
      PROJECT: ellis
      TARGET_BUILD_VARIANT: eng
      ARCH: arm64
      LLVM: 1
      LLVM_IAS: 1

    steps:
      - name: 1. Clone Source
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git .

      - name: 2. Install AOSP Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex g++-multilib \
          gcc-multilib git gnupg gperf libncurses5-dev libssl-dev \
          libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
          xsltproc zip zlib1g-dev

      - name: 3. Locate AOSP Build Script
        id: locate
        run: |
          # Search for the native AOSP build entry point in the tree
          SCRIPT_PATH=$(find . -name "build.sh" | grep "build/" | head -n 1)
          if [ -z "$SCRIPT_PATH" ]; then
            # Fallback for MediaTek standalone repos
            SCRIPT_PATH="./scripts/build_kernel.sh"
          fi
          echo "Found script at: $SCRIPT_PATH"
          echo "SCRIPT=$SCRIPT_PATH" >> $GITHUB_OUTPUT

      - name: 4. Inject Verified HID Fragment
        run: |
          # Create the fragment in the path the verifier expects
          mkdir -p arch/arm64/configs/vendor/ext_config/
          cat <<EOF > arch/arm64/configs/vendor/ext_config/hid_custom.config
          CONFIG_USB_G_HID=y
          CONFIG_USB_CONFIGFS_F_HID=y
          EOF

      - name: 5. Execute Native AOSP Build
        run: |
          # We must export the BUILD_CONFIG for the script to accept our data
          # For Ellis/MediaTek, this is usually mtk_aarch64
          export BUILD_CONFIG=common/build.config.mtk.aarch64
          
          # Run the script found in step 3
          bash ${{ steps.locate.outputs.SCRIPT }} -j$(nproc)

      - name: 6. Archive Image
        uses: actions/upload-artifact@v4
        with:
          name: ellis-native-kernel
          path: out/arch/arm64/boot/Image.gz*
