name: Ellis NetHunter HID Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev libncurses6

      - name: Setup AOSP Clang & Fix Missing Libs
        run: |
          # 1. Install libtinfo5 for Ubuntu 24.04 compatibility
          wget http://azure.archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb

          # 2. Download Clang r416183b via direct commit-hash archive
          mkdir clang
          cd clang
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/3857008389202edac32d57008bb8c99d2c957f9d/clang-r416183b.tar.gz
          tar -xf clang-r416183b.tar.gz

      - name: Apply Targeted NetHunter Fixes
        run: |
          # DTC Fix: Prevents "multiple definition of yylloc"
          curl -LSs https://raw.githubusercontent.com/TiagoSanti/kali-nethunter-kernel-builder/master/patches/4.19/fix-yylloc.dtc-lexer.lex.c_shipped.patch -o dtc.patch
          patch -p1 < dtc.patch || echo "DTC patch already applied"

          # HID Descriptor Fix
          curl -LSs https://raw.githubusercontent.com/TiagoSanti/kali-nethunter-kernel-builder/master/patches/4.19/add-hid-support.patch -o hid.patch
          patch -p1 < hid.patch || echo "HID patch already present or failed"

      - name: Configure HID & Magic IDs
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          
          # Using your verified path: ext_config/ellis (omitting .defconfig)
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- ext_config/ellis_defconfig
          
          # Enable HID Arsenal switches
          ./scripts/config --file out/.config \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_F_HID \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_USB_LIBCOMPOSITE \
            --enable CONFIG_USB_CONFIGFS
            
          # Inject Magic USB IDs (Motorola Generic HID Mode)
          sed -i 's/CONFIG_USB_G_ANDROID_VID=.*/CONFIG_USB_G_ANDROID_VID=0x22b8/' out/.config
          sed -i 's/CONFIG_USB_G_ANDROID_PID=.*/CONFIG_USB_G_ANDROID_PID=0x2e76/' out/.config
          
          # Refresh the config
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- olddefconfig

      - name: Compile Kernel
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- KCFLAGS="-w"

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          # Ensure we grab the correct generated image from the 'out' folder
          cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/ || cp out/arch/arm64/boot/Image.gz AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r ../Ellis-HID-Kernel.zip ./*

      - name: Upload Flashable Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-NetHunter-HID
          path: Ellis-HID-Kernel.zip
