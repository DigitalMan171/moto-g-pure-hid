name: Motorola Ellis Factory Build v57
on: [workflow_dispatch]

jobs:
  prepare_source:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Persistent Source Cache
        id: cache-source
        uses: actions/cache@v4
        with:
          path: |
            prebuilts
            kernel
            build
            device
            external
          key: ${{ runner.os }}-moto-ellis-source-v57

      - name: 2. Sync (Only on Cache Miss)
        if: steps.cache-source.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b android-12.1.0_r27 https://android.googlesource.com/platform/build build/make
          git clone --depth=1 -b android-12.1.0_r27 https://android.googlesource.com/platform/build/soong build/soong
          git clone --depth=1 -b android-12.1.0_r27 https://android.googlesource.com/platform/build/blueprint build/blueprint
          mkdir -p external
          git clone --depth=1 -b android-12.1.0_r27 https://android.googlesource.com/platform/external/golang-protobuf external/golang-protobuf
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang/host/linux-x86
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/go/linux-x86 prebuilts/go/linux-x86
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/ninja/linux-x86 prebuilts/ninja/linux-x86
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/build-tools prebuilts/build-tools
          ln -s make/envsetup.sh build/envsetup.sh
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel

  build_kernel:
    needs: prepare_source
    runs-on: ubuntu-latest
    steps:
      - name: 3. Restore Environment
        uses: actions/cache@v4
        with:
          path: |
            prebuilts
            kernel
            build
            device
            external
            out
          key: ${{ runner.os }}-moto-ellis-source-v57

      - name: 4. The Full Stack Build
        run: |
          export TEMPORARY_DISABLE_PATH_RESTRICTIONS=true
          export TOP=$(pwd)
          source build/envsetup.sh
          
          # Factory Entry
          lunch full_ellis-eng
          
          # Toolchain Injection
          CLANG_BIN=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r*/bin | sort -V | tail -n 1)
          export PATH="$CLANG_BIN:$PATH"
          
          # First Pass: Assemble the "Sandwich"
          # This creates the .config at out/target/product/ellis/obj/KERNEL_OBJ/.config
          make -j2 bootimage
          
          # 5. Inject USB HID into the MERGED .config
          KERNEL_OUT="out/target/product/ellis/obj/KERNEL_OBJ"
          
          ./kernel/scripts/config --file $KERNEL_OUT/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./kernel/scripts/config --file $KERNEL_OUT/.config --enable CONFIG_UHID
          ./scripts/config --file $KERNEL_OUT/.config --disable CONFIG_STRICT_DEVMEM
          ./scripts/config --file $KERNEL_OUT/.config --enable CONFIG_DEVMEM
          
          # Second Pass: Compile with HID
          # Make detects the .config change and recompiles the kernel binary
          make -j2 bootimage

      - name: 5. Archive Factory Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-factory-boot
          path: |
            out/target/product/ellis/boot.img
            out/target/product/ellis/obj/KERNEL_OBJ/arch/arm64/boot/Image.gz-dtb
