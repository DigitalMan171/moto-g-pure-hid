name: Motorola Ellis HID Authoritative Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Ellis Source
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git .

      - name: 2. Unlock GKI Constraints
        run: |
          # Disable the watchdog that strips non-GKI flags
          sed -i 's/POST_DEFCONFIG_CMDS="check_defconfig"/POST_DEFCONFIG_CMDS=""/' build.config.gki
          
          # Force disable lockdown if it exists in the base GKI
          sed -i 's/CONFIG_SECURITY_LOCKDOWN_LSM=y/CONFIG_SECURITY_LOCKDOWN_LSM=n/' arch/arm64/configs/gki_defconfig

      - name: 3. Rewrite Ellis DNA (The Fragment)
        run: |
          export DEVICE_CONFIG=arch/arm64/configs/ext_config/ellis_defconfig.config
          
          # Overwriting to satisfy Motorola's 'mapphone_defconfig' concatenation logic
          cat <<EOF > $DEVICE_CONFIG
          CONFIG_CONSOLE_LOGLEVEL_DEFAULT=4
          
          # --- MASTER UNLOCKS ---
          CONFIG_EXPERT=y
          CONFIG_DEBUG_KERNEL=y
          
          # --- HID GADGET STACK ---
          CONFIG_USB_GADGET=y
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_USB_F_HID=y
          CONFIG_HID_GENERIC=y
          CONFIG_USB_HID=y

          # --- MEDIATEK IOMMU & FAST PATH ---
          CONFIG_IOMMU_SUPPORT=y
          CONFIG_IOMMU_IO_PGTABLE=y
          CONFIG_IOMMU_IO_PGTABLE_LPAE=y
          CONFIG_MTK_IOMMU=y
          CONFIG_MTK_IOMMU_V2=y
          CONFIG_IOMMU_IO_PGTABLE_FAST=y
          CONFIG_IOMMU_IO_PGTABLE_ARMV8L_FAST=y
          EOF
          
          # Ensure a trailing newline for legacy parser
          echo "" >> $DEVICE_CONFIG
          
          echo "--- VERIFIED ELLIS FRAGMENT ---"
          cat $DEVICE_CONFIG

      - name: 4. Merge and Build
        run: |
          export ARCH=arm64
          export KBUILD_OUTPUT=out
          export PATH=$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r416183b/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$PATH
          export CROSS_COMPILE=aarch64-linux-android-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          mkdir -p $KBUILD_OUTPUT

          # Motorola's stacking order
          bash scripts/kconfig/merge_config.sh -m -O $KBUILD_OUTPUT \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/ext_config/moto-mt6765.config \
            arch/arm64/configs/ext_config/ellis_defconfig.config

          # Resolve the IOMMU dependencies
          make O=$KBUILD_OUTPUT CC=clang CROSS_COMPILE=$CROSS_COMPILE CLANG_TRIPLE=$CLANG_TRIPLE -j$(nproc) olddefconfig
          
          # Start the compile
          make O=$KBUILD_OUTPUT CC=clang CROSS_COMPILE=$CROSS_COMPILE CLANG_TRIPLE=$CLANG_TRIPLE KCFLAGS="-w" -j$(nproc) Image.gz dtbs

      - name: 5. Upload Final Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-HID-Final-Verification
          path: |
            out/.config
            out/arch/arm64/boot/Image.gz
