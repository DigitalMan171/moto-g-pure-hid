name: Ellis Engineering Build - Root Logic

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          fetch-depth: 1
          path: kernel # Keeping it in a folder for organizational clarity

      - name: Fetch Legacy Clang (r416183b)
        run: |
          # Download toolchain to a separate sibling folder
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Build Engineering Stack
        run: |
          # 1. JUMP INTO THE SOURCE DRIVEWAY
          cd kernel
          
          # 2. MAP THE TOOLCHAIN (Absolute Path)
          # We use GITHUB_WORKSPACE so the path is valid even after the 'cd'
          export TOOLCHAIN_BIN=$GITHUB_WORKSPACE/clang-aosp/bin
          export PATH=$TOOLCHAIN_BIN:$PATH
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/clang-aosp/lib64:$LD_LIBRARY_PATH
          
          # 3. DEFINE OUTPUT
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          mkdir -p $OUT_DIR
          
          # 4. INITIALIZE CONFIG
          # Since we are INSIDE 'kernel', the relative path 'arch/arm64/...' now works
          make O=$OUT_DIR ARCH=arm64 \
               CC=clang HOSTCC=gcc HOSTCXX=g++ \
               LD=ld.lld AR=llvm-ar NM=llvm-nm \
               STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
               CROSS_COMPILE=aarch64-linux-android- \
               CROSS_COMPILE_ARM32=arm-linux-androideabi- \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               ellis_defconfig

          # 5. INJECT ENGINEERING & HID NODES
          ./scripts/config --file $OUT_DIR/.config \
            --enable CONFIG_MTK_ENG_BUILD \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_HID_GENERIC \
            --disable CONFIG_SECTION_MISMATCH_WARN_ONLY
            
          # 6. FINAL COMPILE
          make O=$OUT_DIR ARCH=arm64 \
               CC=clang HOSTCC=gcc HOSTCXX=g++ \
               LD=ld.lld AR=llvm-ar NM=llvm-nm \
               STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
               CROSS_COMPILE=aarch64-linux-android- \
               CROSS_COMPILE_ARM32=arm-linux-androideabi- \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               Image.gz dtbs -j$(nproc)

      - name: Package for Flashing
        run: |
          # Locate and Concatenate the Ellis DTB
          OUT_DIR=${{ github.workspace }}/kernel/out
          DTB_FILE=$(find $OUT_DIR/arch/arm64/boot/dts/ -name "*ellis*.dtb" | head -n 1)
          
          if [ -z "$DTB_FILE" ]; then
             DTB_FILE=$(find $OUT_DIR/arch/arm64/boot/dts/ -name "*6765*.dtb" | head -n 1)
          fi
          
          cat $OUT_DIR/arch/arm64/boot/Image.gz "$DTB_FILE" > $OUT_DIR/arch/arm64/boot/Image.gz-dtb
          echo "Successfully merged Image.gz-dtb"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ellis-hid-kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
