name: Moto G Pure HID Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential bison flex libssl-dev gcc-aarch64-linux-gnu

      - name: Fetch Kernel Source
        run: |
          # Reverting to the exact public URL that worked without auth errors
          git clone --depth=1 https://github.com/LineageOS/android_kernel_motorola_mt6762 kernel-source

      - name: Build Kernel
        run: |
          cd kernel-source
          
          # Use your uploaded running.config as the base
          cp ../running.config .config
          
          # Re-applying the surgical injections for HID and No-Panic
          echo "CONFIG_USB_G_HID=y" >> .config
          echo "CONFIG_USB_F_HID=y" >> .config
          echo "CONFIG_USB_CONFIGFS_F_HID=y" >> .config
          echo "CONFIG_MODVERSIONS=n" >> .config
          echo "CONFIG_SECTION_MISMATCH_WARN_ONLY=y" >> .config
          
          # The successful compiler prefix and config sync
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- Image.gz

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HID-Kernel-Build
          path: kernel-source/arch/arm64/boot/Image.gz
