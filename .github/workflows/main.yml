name: Motorola Ellis Official Factory Protocol
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Workspace Save Method (Cache)
        id: cache-all
        uses: actions/cache@v4
        with:
          path: |
            prebuilts/clang/host/linux-x86
            kernel
          key: ${{ runner.os }}-moto-ellis-v13

      - name: 2. Official Source Sync (Direct Hierarchy)
        if: steps.cache-all.outputs.cache-hit != 'true'
        run: |
          # A. Official Android Clang Toolchain (Standard Path)
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
          prebuilts/clang/host/linux-x86
          
          # B. Core Kernel Source (Official Motorola LLC Branch)
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          
          # C. Vendor Hardware Modules (Official Path)
          mkdir -p kernel/vendor/motorola
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/motorola-kernel-modules.git kernel/vendor/motorola/modules

      - name: 3. Environment Authorization (The "Lunch" Setup)
        run: |
          # 1. Locate the official Android Clang compiler
          CLANG_BIN=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r*/bin | sort -V | tail -n 1)
          echo "$CLANG_BIN" >> $GITHUB_PATH
          
          # 2. Motorola Protocol: The build script is located at 'kernel/build.sh' 
          # OR 'kernel/scripts/build.sh'. We authorize the internal kernel one.
          if [ -f "kernel/build.sh" ]; then
            chmod +x kernel/build.sh
            echo "MOTO_ENTRY=kernel/build.sh" >> $GITHUB_ENV
          else
            chmod +x kernel/scripts/build.sh
            echo "MOTO_ENTRY=kernel/scripts/build.sh" >> $GITHUB_ENV
          fi

      - name: 4. Execution (Motorola Factory Build)
        run: |
          # Official Lunch Parameters for Ellis (Moto G Pure)
          export ARCH=arm64
          export PROJECT=ellis
          export MTK_PLATFORM=mt6765
          export TARGET_BUILD_VARIANT=eng
          
          # Internal MediaTek Output Paths
          export OUT_DIR=$GITHUB_WORKSPACE/out
          export DIST_DIR=$GITHUB_WORKSPACE/dist
          mkdir -p $OUT_DIR $DIST_DIR
          
          # Trigger the build from the kernel root using the internal script
          # This is exactly what Motorola's 'm' command does
          cd kernel
          bash $(basename ${{ env.MOTO_ENTRY }}) -j$(nproc) \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            KBUILD_DEFCONFIG=ellis_defconfig

      - name: 5. Archive Factory Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-ellis-official
          path: |
            dist/Image.gz*
            dist/*.ko
            out/.config
