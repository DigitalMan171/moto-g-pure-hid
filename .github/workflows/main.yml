name: Ellis Official Build - Self-Contained Protocol
on: 
  push:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: 'MotorolaMobilityLLC/kernel-msm'
          ref: 'android-12-release-s3rhs32.20-42-10-4-11'

      - name: Sync Toolchains (LineageOS Clang & GCC)
        run: |
          git clone https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang --depth=1
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc32 --depth=1
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64 --depth=1

      - name: Surgical Configuration (HID Injection)
        run: |
          # Injecting HID flags directly into the Ellis defconfig
          ARCH=arm64 scripts/config --file arch/arm64/configs/vendor/ellis_defconfig --enable CONFIG_USB_CONFIGFS_F_HID
          ARCH=arm64 scripts/config --file arch/arm64/configs/vendor/ellis_defconfig --enable CONFIG_HID_GENERIC
          ARCH=arm64 scripts/config --file arch/arm64/configs/vendor/ellis_defconfig --enable CONFIG_USB_HID
          ARCH=arm64 scripts/config --file arch/arm64/configs/vendor/ellis_defconfig --enable CONFIG_INPUT_JOYSTICK
          ARCH=arm64 scripts/config --file arch/arm64/configs/vendor/ellis_defconfig --enable CONFIG_JOYSTICK_XPAD

      - name: Compile Kernel
        run: |
          export PATH=$(pwd)/clang/bin:$(pwd)/gcc64/bin:$(pwd)/gcc32/bin:$PATH
          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            vendor/ellis_defconfig
          
          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi-

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Kernel-HID
          path: |
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/dts/vendor/ellis*.dtb
