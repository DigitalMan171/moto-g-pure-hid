name: Ellis Engineering Build - Native MTK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          fetch-depth: 1
          path: kernel

      - name: Fetch Legacy Clang (r416183b)
        run: |
          # Fetching the stable AOSP Clang 12.0.5 for Android 12
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Build Engineering Stack
        run: |
          cd kernel
          # Setup Toolchain Path
          export PATH=$GITHUB_WORKSPACE/clang-aosp/bin:$PATH
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/clang-aosp/lib64:$LD_LIBRARY_PATH
          
          OUT_DIR=out
          
          # 1. Initialize Native Ellis Config
          # Using LLVM tools (LD, AR, NM) to solve the 'linker not found' error
          make O=$OUT_DIR ARCH=arm64 \
               CC=clang HOSTCC=gcc HOSTCXX=g++ \
               LD=ld.lld AR=llvm-ar NM=llvm-nm \
               OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
               CROSS_COMPILE=aarch64-linux-android- \
               CROSS_COMPILE_ARM32=arm-linux-androideabi- \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               ext_config/ellis_defconfig
          
          # 2. Inject Engineering/Factory Overrides
          if [ -f arch/arm64/configs/factory-k62v1_32_bsp-ellis.config ]; then
            ./scripts/kconfig/merge_config.sh -O $OUT_DIR $OUT_DIR/.config arch/arm64/configs/factory-k62v1_32_bsp-ellis.config
          fi
          
          # 3. Enable Kali HID & Engineering Hardware Access
          ./scripts/config --file $OUT_DIR/.config \
            --enable CONFIG_MTK_ENG_BUILD \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_MTK_SCHED_MONITOR \
            --disable CONFIG_ANDROID_LOW_MEMORY_KILLER
            
          # 4. Compile Kernel and DTBs
          make O=$OUT_DIR ARCH=arm64 \
               CC=clang HOSTCC=gcc HOSTCXX=g++ \
               LD=ld.lld AR=llvm-ar NM=llvm-nm \
               OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
               CROSS_COMPILE=aarch64-linux-android- \
               CROSS_COMPILE_ARM32=arm-linux-androideabi- \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               Image.gz dtbs -j$(nproc)

      - name: Package for Flashing
        run: |
          cd kernel/out
          # Find the specific MT6765 Ellis DTB
          DTB_FILE=$(find arch/arm64/boot/dts/ -name "*ellis*.dtb" | head -n 1)
          
          if [ -z "$DTB_FILE" ]; then
             echo "Ellis DTB not found, falling back to MT6765 generic"
             DTB_FILE=$(find arch/arm64/boot/dts/ -name "*6765*.dtb" | head -n 1)
          fi
          
          # Final Concatenation: Kernel + Hardware Map
          cat arch/arm64/boot/Image.gz "$DTB_FILE" > arch/arm64/boot/Image.gz-dtb
          echo "Build Complete: Image.gz-dtb created."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ellis-hid-kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
