name: Moto G Pure HID - Restoration
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi pahole device-tree-compiler

      - name: Fetch Toolchain & Source
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-mtk.git -b android-12-release-s3rhs32.20-42-10-4-11 kernel-source

      - name: Surgical Code Fixes
        run: |
          cd kernel-source
          # Fix the fatal 'uclamp_se_set' inlining failure from the 70% build
          sed -i 's/inline void uclamp_se_set/void uclamp_se_set/g' kernel/sched/sched.h
          
          # Fix the 'FUELGAUGE_TEMPERATURE' incomplete type failure
          sed -i '1i struct FUELGAUGE_TEMPERATURE { int Temperature; int Temp_Array[20]; };' drivers/power/supply/mtk_battery_table.h

      - name: Build Logic
        run: |
          export PATH=$(pwd)/clang-aosp/bin:$PATH
          cd kernel-source
          
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          mkdir -p out

          # Step A: Initialize the MediaTek Base
          make O=out k65v1_64_bsp_defconfig
          
          # Step B: Merge Motorola Vendor and Device Layers
          ./scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/ext_config/moto-mt6765.config
          ./scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/ext_config/ellis_defconfig.config
          
          # Step C: Explicitly Enable USB HID Gadget
          ./scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS
          ./scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --file out/.config --enable CONFIG_HID_GENERIC
          ./scripts/config --file out/.config --enable CONFIG_USB_HID
          
          make O=out olddefconfig

          # Step D: Final Compilation
          make O=out -j$(nproc) Image.gz dtbs

      - name: Append DTB & Upload
        run: |
          cd kernel-source
          DTB_FILE=$(find out/arch/arm64/boot/dts/mediatek/ -name "*ellis*.dtb" | head -n 1)
          if [ -z "$DTB_FILE" ]; then
             DTB_FILE=out/arch/arm64/boot/dts/mediatek/mt6765.dtb
          fi
          cat out/arch/arm64/boot/Image.gz "$DTB_FILE" > out/arch/arm64/boot/Image.gz-dtb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-HID-Kernel-Restored
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
