name: Motorola Ellis Reliable Factory Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Total Cloud Save (v21)
        id: cache-all
        uses: actions/cache@v4
        with:
          path: |
            prebuilts/clang/host/linux-x86
            kernel
            build/make
          key: ${{ runner.os }}-moto-ellis-v21

      - name: 2. Sync Version-Matched Infrastructure
        if: steps.cache-all.outputs.cache-hit != 'true'
        run: |
          # CRITICAL: We MUST use the Android 12 branch to match the Ellis Kernel
          git clone --depth=1 -b android-12-release https://android.googlesource.com/platform/build build/make
          
          # Sync Clang & Kernel (Same as before)
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang/host/linux-x86
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel

      - name: 3. Reliable Device Identity (The Wrapper)
        run: |
          mkdir -p device/motorola/ellis
          
          # A. The Lunch Registry (Register 'ellis' as a valid choice)
          cat <<EOF > device/motorola/ellis/vendorsetup.sh
          add_lunch_combo full_ellis-userdebug
          EOF

          # B. The Product Map
          cat <<EOF > device/motorola/ellis/AndroidProducts.mk
          PRODUCT_MAKEFILES := \$(LOCAL_DIR)/full_ellis.mk
          COMMON_LUNCH_CHOICES := full_ellis-userdebug
          EOF

          # C. Product Identity
          cat <<EOF > device/motorola/ellis/full_ellis.mk
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/core_64_bit.mk)
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/full_base.mk)
          PRODUCT_DEVICE := ellis
          PRODUCT_NAME := full_ellis
          PRODUCT_BRAND := Motorola
          PRODUCT_MODEL := Moto G Pure
          EOF

          # D. Factory Board Logic
          cat <<EOF > device/motorola/ellis/BoardConfig.mk
          TARGET_ARCH := arm64
          TARGET_ARCH_VARIANT := armv8-a
          TARGET_CPU_VARIANT := generic
          TARGET_BOARD_PLATFORM := mt6765
          # Factory standard: kernel is at 'kernel'
          TARGET_KERNEL_SOURCE := kernel
          TARGET_KERNEL_CONFIG := ellis_defconfig
          EOF

      - name: 4. Execution (Factory Protocol)
        run: |
          export TOP=$(pwd)
          
          # Initialize environment
          source build/make/envsetup.sh
          
          # Now 'lunch' will work because we matched the Android 12 branch
          lunch full_ellis-userdebug
          
          # Map the Clang Compiler
          CLANG_BIN=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r*/bin | sort -V | tail -n 1)
          export PATH="$CLANG_BIN:\$PATH"
          
          # Build specifically for the kernel
          # We use the factory 'm' command which handles the relative paths automatically
          cd kernel
          make -j\$(nproc) O=\$TOP/out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            ellis_defconfig
          
          make -j\$(nproc) O=\$TOP/out ARCH=arm64 \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu-

      - name: 5. Archive Reliable Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-ellis-reliable
          path: |
            out/arch/arm64/boot/Image.gz*
            out/.config
