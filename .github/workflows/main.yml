name: Moto G Pure HID Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Configs
        uses: actions/checkout@v4

      - name: Install Compiler and Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex gcc-aarch64-linux-gnu libssl-dev

      - name: Clone Motorola Source
        run: |
          # Fail-safe clone: tries your specific branch first, then falls back to the base release
          git clone --depth=1 --branch android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git source

      - name: Prepare the Blueprint
        run: |
          # 1. Copy your master config as the new base
          cp running.config source/arch/arm64/configs/ext_config/ellis_defconfig.config
          
          # 2. Append your HID modifications from your custom file
          cat ellis_defconfig.config >> source/arch/arm64/configs/ext_config/ellis_defconfig.config
          
          # 3. Apply the "Version Magic" fix to match your 4.19.191+ string
          sed -i 's/CONFIG_LOCALVERSION=""/CONFIG_LOCALVERSION="+"/' source/arch/arm64/configs/ext_config/ellis_defconfig.config

      - name: Build the Kernel
        run: |
          cd source
          mkdir -p out
          # Prepare the final configuration file
          cp arch/arm64/configs/ext_config/ellis_defconfig.config out/.config
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          # Start the long compilation using all cloud CPU cores
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: moto-hid-kernel
          path: source/out/arch/arm64/boot/Image.gz-dtb
