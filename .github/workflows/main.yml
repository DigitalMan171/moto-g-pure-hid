name: Build Moto G Pure Kernel
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libncurses5-dev flex bison pahole

      - name: Configure and Merge
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          mkdir -p out
          
          # Layered merge to fix ARM_V8L_FAST and platform symbols
          ./scripts/kconfig/merge_config.sh -m -O out/ \
            arch/arm64/configs/vendor/gki_defconfig \
            arch/arm64/configs/ext_config/moto-mt6765.config \
            arch/arm64/configs/ext_config/ellis_defconfig.config

          # Enable HID Gadget Support
          ./scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --file out/.config --enable CONFIG_HID_GENERIC
          ./scripts/config --file out/.config --enable CONFIG_USB_HID
          
          make O=out/ ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          # KCFLAGS="-w" silences the minor MediaTek enum/header warnings
          make O=out/ ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-w" -j$(nproc) Image.gz dtbs

      - name: Prepare Image.gz-dtb
        run: |
          # Find the DTB specifically for Ellis
          DTB_PATH=$(find out/arch/arm64/boot/dts/mediatek/ -name "*ellis*.dtb" | head -n 1)
          if [ -n "$DTB_PATH" ]; then
            echo "Found Ellis DTB at $DTB_PATH. Appending to Image.gz..."
            cat out/arch/arm64/boot/Image.gz "$DTB_PATH" > out/arch/arm64/boot/Image.gz-dtb
          else
            echo "Ellis DTB not found by name. Checking mt6765..."
            FALLBACK_DTB=$(find out/arch/arm64/boot/dts/mediatek/ -name "mt6765*.dtb" | head -n 1)
            cat out/arch/arm64/boot/Image.gz "$FALLBACK_DTB" > out/arch/arm64/boot/Image.gz-dtb
          fi

      - name: Upload for AIK
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-HID-Kernel-Result
          path: |
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/Image.gz-dtb
