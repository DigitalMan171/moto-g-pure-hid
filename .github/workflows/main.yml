name: Build Moto G Pure Kernel
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libncurses5-dev flex bison

      - name: Configure and Merge Build Files
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          mkdir out
          
          # Layered merge: Base -> SoC -> BSP -> Device
          ./scripts/kconfig/merge_config.sh -m -O out/ \
            arch/arm64/configs/vendor/gki_defconfig \
            arch/arm64/configs/ext_config/moto-mt6765.config \
            arch/arm64/configs/ext_config/ellis_defconfig.config

          # Injection: Enable USB HID and F2FS (Ensuring these overrides are set)
          echo "CONFIG_USB_CONFIGFS_F_HID=y" >> out/.config
          echo "CONFIG_F2FS_FS=y" >> out/.config
          
          # Finalize config
          make O=out/ ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          make O=out/ ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc) Image.gz Image.gz-dtb

      - name: Upload Kernel for AIK
        uses: actions/upload-artifact@v3
        with:
          name: moto-kernel-build
          path: |
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/Image.gz-dtb
            out/
