name: Moto G Pure Ellis - Official Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Cache Toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: |
            bin64
            bin32
            clang-flat
          key: ${{ runner.os }}-toolchains-v3

      - name: Fetch and Flatten Toolchains
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          # 1. Clone into temporary areas
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-tmp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc64-tmp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc32-tmp

          mkdir -p bin64 bin32 clang-flat

          # 2. Search for the actual binary locations and copy their parent folders
          # This handles the nesting issue (e.g., gcc64-tmp/aarch64-linux-android-4.9/bin)
          GCC64_PATH=$(find gcc64-tmp -name "aarch64-linux-android-gcc" -type f | xargs dirname)
          GCC32_PATH=$(find gcc32-tmp -name "arm-linux-androideabi-gcc" -type f | xargs dirname)
          CLANG_PATH=$(find clang-tmp -name "clang" -type f | grep "bin/clang" | head -n 1 | xargs dirname)

          cp -r $GCC64_PATH/. bin64/
          cp -r $GCC32_PATH/. bin32/
          cp -r $CLANG_PATH/.. clang-flat/

          # 3. Cleanup and Permissions
          rm -rf clang-tmp gcc64-tmp gcc32-tmp
          chmod +x bin64/* bin32/* clang-flat/bin/*

      - name: Build Kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/clang-flat/bin:$GITHUB_WORKSPACE/bin64:$GITHUB_WORKSPACE/bin32:$PATH"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # Verification Check
          aarch64-linux-android-gcc --version || (ls -R $GITHUB_WORKSPACE && exit 1)

          cd kernel-source
          mkdir -p out
          cp "$GITHUB_WORKSPACE/running.config" out/.config

          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_COMPILE ellis_defconfig
          make -j$(nproc) O=out ARCH=arm64 CC=clang CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 Image.gz-dtb
