name: "Ellis: Official Open-Source Build V5.9.6"
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Install Runner-Native Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi pahole device-tree-compiler

      - name: 🌐 Fetch Source & Public Clang 11
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk kernel-source
          # Reverting to the r383902 version found in your stock kernel image
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r383902 clang-aosp

      - name: 🚀 Build Kernel with Ellis Logic
        run: |
          export PATH=$(pwd)/clang-aosp/bin:$PATH
          cd kernel-source
          
          # --- STAGE 1: YOUR WORKING SOURCE PATCHES ---
          sed -i '1i struct FUELGAUGE_TEMPERATURE { int Temperature; int Temp_Array[20]; };' drivers/power/supply/mtk_battery_table.h
          sed -i 's/inline void ksm_flock/void ksm_flock/g' include/linux/keyslot-manager.h
          sed -i 's/inline void blk_crypto_flock/void blk_crypto_flock/g' include/linux/blk-crypto.h
          sed -i 's/inline void uclamp_se_set/void uclamp_se_set/g' kernel/sched/sched.h
          
          # Linker Stubs
          echo 'struct moto_chg_tcmd_client;' >> drivers/power/supply/mtk_battery.c
          echo 'int moto_chg_tcmd_register(struct moto_chg_tcmd_client *client) { return 0; }' >> drivers/power/supply/mtk_battery.c
          echo 'int moto_chg_tcmd_unregister(struct moto_chg_tcmd_client *client) { return 0; }' >> drivers/power/supply/mtk_battery.c

          # --- STAGE 2: ELLIS CONFIGURATION ---
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export HOSTCC=clang
          
          mkdir -p out
          # Load the base MTK config
          make O=out k65v1_64_bsp_defconfig
          
          # Merge the Ellis-specific Motorola overlay
          if [ -f "arch/arm64/configs/ext_config/ellis_defconfig.config" ]; then
            ./scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/ext_config/ellis_defconfig.config
          fi
          
          # HID Injection
          ./scripts/config --file out/.config \
            --disable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_HIDRAW \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_USB_HID \
            --enable CONFIG_INPUT_UINPUT
            
          make O=out olddefconfig

          # --- STAGE 3: COMPILATION ---
          make O=out KCFLAGS="-w" -j$(nproc) Image.gz dtbs

          # --- STAGE 4: PACKAGING ---
          DTB_FILE=$(find out/arch/arm64/boot/dts/mediatek/ -name "*ellis*.dtb" | head -n 1)
          cat out/arch/arm64/boot/Image.gz "$DTB_FILE" > out/arch/arm64/boot/Image.gz-dtb

      - name: 📦 Upload Verified HID Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-HID-Final-V5.9.6
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
