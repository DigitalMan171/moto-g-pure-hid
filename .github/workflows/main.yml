name: Ellis NetHunter Build & Verify

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev

      - name: Apply NetHunter HID Patches
        run: |
          # Clone only the patches to save time
          git clone --depth 1 https://gitlab.com/kalilinux/nethunter/build-scripts/kali-nethunter-kernel.git nethunter-repo
          
          # Navigate to 4.19 patches and apply them to your root source
          cd nethunter-repo/patches/4.19
          for patch in *.patch; do 
            echo "Applying $patch..."
            patch -p1 -d ../../../ < "$patch"
          done

      - name: Verify Patch Success (The Test)
        run: |
          # The NetHunter patch modifies f_hid.c to allow more than one HID device.
          # We search for 'ctm' or 'nethunter' tags usually added in the comments or code.
          # If grep fails to find evidence of the patch, the build stops here.
          grep -qi "nethunter" drivers/usb/gadget/function/f_hid.c || \
          grep -qi "hidg_plat_driver" drivers/usb/gadget/function/f_hid.c || \
          (echo "ERROR: HID Patch not detected in source code!" && exit 1)
          echo "SUCCESS: HID Patch verified in f_hid.c"

      - name: Configure and Unlock HID
        run: |
          # 1. Generate base ellis config
          make O=out ARCH=arm64 ellis_defconfig
          
          # 2. Use the kernel's own config tool to flip the switches
          ./scripts/config --file out/.config --enable CONFIG_USB_G_HID
          ./scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --file out/.config --enable CONFIG_HID_GENERIC
          
          # 3. Finalize config dependencies
          make O=out ARCH=arm64 olddefconfig

      - name: Compile Unlocked Kernel
        run: |
          # Note: Ensure you have your Clang toolchain path exported here
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-android-

      - name: Package with AnyKernel3 (Magisk Safe)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r ../Ellis-NetHunter-HID.zip ./*

      - name: Upload Flashable Result
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-HID-Kernel
          path: Ellis-NetHunter-HID.zip
