name: Moto G Pure Ellis - Official Manufacturer Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Fetch Official AOSP Toolchains
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc-64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc-32
          
          # Universal permission fix to prevent 'not found' execution blocks
          find clang-aosp -type f -exec chmod +x {} +
          find gcc-64 -type f -exec chmod +x {} +
          find gcc-32 -type f -exec chmod +x {} +

      - name: Compile Official Image
        run: |
          # 1. Establish Absolute Roots
          ROOT_DIR=$(pwd)
          CLANG_BIN="$ROOT_DIR/clang-aosp/clang-r416183b/bin"
          GCC64_BIN="$ROOT_DIR/gcc-64/bin"
          GCC32_BIN="$ROOT_DIR/gcc-32/bin"
          
          # 2. Force PATH injection for the 'gcc-version.sh' check
          export PATH="$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PATH"
          
          # 3. Environment Variables for MediaTek Multilib
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          cd kernel-source
          mkdir -p out

          # 4. Load Ellis Config (Fixes the failure in e07847.jpg)
          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_COMPILE ellis_defconfig

          # 5. Inject HID Support into the official base
          {
            echo "CONFIG_USB_CONFIGFS=y"
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_USB_F_HID=y"
            echo "CONFIG_USB_G_HID=y"
          } >> out/.config
          
          # 6. Final Sync and Compile using LLVM Integrated Assembler
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 olddefconfig
          make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 Image.gz-dtb

      - name: Upload Verified Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-Ellis-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
