name: Moto G Pure Kernel Build & Magisk Repack

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4

    - name: Set Up Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm git

    - name: Fetch Toolchains
      run: |
        mkdir toolchains
        cd toolchains
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc32
        echo "TOOLCHAIN_64=$GITHUB_WORKSPACE/toolchains/gcc64/bin" >> $GITHUB_ENV
        echo "TOOLCHAIN_32=$GITHUB_WORKSPACE/toolchains/gcc32/bin" >> $GITHUB_ENV

    - name: Configure HID Flags
      run: |
        chmod +x scripts/config
        ./scripts/config --file arch/arm64/configs/vendor/ellis_defconfig \
          -e CONFIG_USB_G_HID \
          -e CONFIG_USB_CONFIGFS_F_HID \
          -e CONFIG_USB_F_HID \
          -e CONFIG_INPUT_UINPUT \
          -e CONFIG_HIDRAW \
          -e CONFIG_HID_GENERIC \
          -e CONFIG_USB_CONFIGFS_UEVENT
        echo "Checklist Verification:"
        grep -E "CONFIG_USB_F_HID|CONFIG_HIDRAW" arch/arm64/configs/vendor/ellis_defconfig

    - name: Compile Kernel
      run: |
        export PATH="$TOOLCHAIN_64:$TOOLCHAIN_32:$PATH"
        make O=out ARCH=arm64 vendor/ellis_defconfig
        make -j$(nproc --all) O=out \
          ARCH=arm64 \
          CROSS_COMPILE=aarch64-linux-android- \
          CROSS_COMPILE_ARM32=arm-linux-androideabi- \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CC=clang

    - name: AIK Repack (Magisk Preservation)
      run: |
        git clone https://github.com/osm0sis/Android-Image-Kitchen.git AIK
        cp boot.img AIK/boot.img
        cd AIK
        chmod +x unpackimg.sh repackimg.sh bin/magiskboot
        ./unpackimg.sh boot.img
        # Overwrite only the kernel, keep the Magisk ramdisk
        cp ../out/arch/arm64/boot/Image.gz-dtb split_img/boot.img-kernel
        ./repackimg.sh
        mv image-new.img ../patched-boot-HID.img

    - name: Upload Finished Image
      uses: actions/upload-artifact@v4
      with:
        name: ellis-HID-patched-boot
        path: patched-boot-HID.img
