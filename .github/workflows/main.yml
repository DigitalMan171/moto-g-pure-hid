name: Ellis Engineering Build Test

on:
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-ellis # Adjust to your specific branch
          path: kernel

      - name: Sync Techpacks
        run: |
          cd kernel
          # Create the techpack directory structure
          mkdir -p techpack/display techpack/audio
          
          # Clone the specific techpacks for ellis hardware
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-msm-techpack-display techpack/display
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-msm-techpack-audio techpack/audio
          
          # Verification: Ensure techpack Makefiles exist
          ls techpack/display/Makefile

      - name: Set up Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev
          # Download AOSP Clang/LLVM for kernel 4.19+ compatibility
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 build-tools/clang

      - name: Build Engineering Stack
        run: |
          cd kernel
          export PATH=$GITHUB_WORKSPACE/build-tools/clang/clang-r416183b/bin:$PATH
          OUT_DIR=out
          
          # 1. Base Config
          make O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- ellis_defconfig
          
          # 2. Merge Factory/Eng Overrides
          if [ -f arch/arm64/configs/factory-k62v1_32_bsp-ellis.config ]; then
            ./scripts/kconfig/merge_config.sh -O $OUT_DIR $OUT_DIR/.config arch/arm64/configs/factory-k62v1_32_bsp-ellis.config
          fi
          
          # 3. Apply HID & Engineering Force-Flags
          ./scripts/config --file $OUT_DIR/.config \
            --enable CONFIG_MTK_ENG_BUILD \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_HID_GENERIC
            
          # 4. Finalize & Compile
          make O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- olddefconfig
          make O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- -j$(nproc)

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ellis-eng-kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
