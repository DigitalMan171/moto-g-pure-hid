name: "Ellis: Official Open-Source Build V5.7.9"
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf liblz4-tool libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync libelf-dev dwarves xsltproc zip zlib1g-dev device-tree-compiler
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libncurses5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libncurses5_6.3-2ubuntu0.1_amd64.deb
          rm *.deb

      - name: 🌐 Clone Official Motorola Source & Toolchains
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk source
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang
          
          # Cross-compilers (GCC 10.3)
          wget https://developer.arm.com/-/media/Files/downloads/gnu-a/10.3-2021.07/binrel/gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          tar -xf gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          mv gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu/ gcc64/
          
          wget https://developer.arm.com/-/media/Files/downloads/gnu-a/10.3-2021.07/binrel/gcc-arm-10.3-2021.07-x86_64-arm-none-linux-gnueabihf.tar.xz
          tar -xf gcc-arm-10.3-2021.07-x86_64-arm-none-linux-gnueabihf.tar.xz
          mv gcc-arm-10.3-2021.07-x86_64-arm-none-linux-gnueabihf/ gcc32/

      - name: 🧪 Apply Final Linker Stubs & Source Patches
        working-directory: source
        run: |
          # 1. Source Logic Patches from your successful build
          sed -i '1i struct FUELGAUGE_TEMPERATURE { int Temperature; int Temp_Array[20]; };' drivers/power/supply/mtk_battery_table.h
          sed -i 's/inline void ksm_flock/void ksm_flock/g' include/linux/keyslot-manager.h
          sed -i 's/inline void blk_crypto_flock/void blk_crypto_flock/g' include/linux/blk-crypto.h
          sed -i 's/inline void uclamp_se_set/void uclamp_se_set/g' kernel/sched/sched.h
          
          # 2. Motorola Charging Stubs
          echo 'struct moto_chg_tcmd_client;' >> drivers/power/supply/mtk_battery.c
          echo 'int moto_chg_tcmd_register(struct moto_chg_tcmd_client *client) { return 0; }' >> drivers/power/supply/mtk_battery.c
          echo 'int moto_chg_tcmd_unregister(struct moto_chg_tcmd_client *client) { return 0; }' >> drivers/power/supply/mtk_battery.c
          
          # 3. AEE Neutralization Stubs (Fixes Sound Driver Linker Errors)
          echo 'void aee_kernel_exception_api_func(void *s, ...) {}' >> drivers/power/supply/mtk_battery.c
          echo 'void aee_kernel_warning_api_func(void *s, ...) {}' >> drivers/power/supply/mtk_battery.c
          echo 'void aee_kernel_remoter_api_func(void *s, ...) {}' >> drivers/power/supply/mtk_battery.c
          echo 'int aee_kernel_dal_show(void *s) { return 0; }' >> drivers/power/supply/mtk_battery.c

      - name: 🛡️ Ellis Protocol Config (V5.7.9)
        working-directory: source
        run: |
          mkdir -p out
          export ARCH=arm64
          make O=out k65v1_64_bsp_defconfig
          
          ./scripts/config --file out/.config \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_HIDRAW \
            --enable CONFIG_INPUT_UINPUT \
            --disable CONFIG_BLK_INLINE_ENCRYPTION \
            --disable CONFIG_WERROR \
            --disable CONFIG_MTK_AEE_FEATURE
          
          make O=out olddefconfig

      - name: 🚀 Final Motorola Kernel Compilation
        working-directory: source
        run: |
          export PATH=$(pwd)/../clang/bin:$(pwd)/../gcc64/bin:$(pwd)/../gcc32/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-none-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-none-linux-gnueabihf-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CC=clang
          
          # Build Image.gz and Device Tree Blobs
          make -j$(nproc) O=out \
            AR=aarch64-none-linux-gnu-ar \
            NM=aarch64-none-linux-gnu-nm \
            LD=aarch64-none-linux-gnu-ld \
            KBUILD_WERROR=0 \
            KCFLAGS="-w" \
            Image.gz dtbs

      - name: 🔗 Create Ellis Image.gz-dtb
        working-directory: source
        run: |
          # Confirmed Page Size: 2048 | Header: 2
          DTB_FILE=$(find out/arch/arm64/boot/dts/mediatek/ -name "*ellis*.dtb" | head -n 1)
          if [ -z "$DTB_FILE" ]; then
            DTB_FILE=$(find out/arch/arm64/boot/dts/mediatek/ -name "*.dtb" | head -n 1)
          fi
          cat out/arch/arm64/boot/Image.gz "$DTB_FILE" > out/arch/arm64/boot/Image.gz-dtb

      - name: 📦 Upload Final Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-HID-Kernel-V5.7.9
          path: source/out/arch/arm64/boot/Image.gz-dtb
