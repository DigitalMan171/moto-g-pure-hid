name: Motorola Ellis HID Kernel Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Motorola Kernel Source
        run: |
          # IMPORTANT: Verify this URL is your specific Ellis source
          # I am using a depth of 1 to save time/space
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-mtk.git .

      - name: 2. Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu libssl-dev flex bison lz4 python3

      - name: 3. Fetch Prebuilt Clang (Direct Download)
        run: |
          mkdir -p prebuilts/clang/host/linux-x86/clang-r416183b
          # Use the Archive format to get the real binaries
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/bd96dfe349c962681f0e5388af874c771ef96670/clang-r416183b.tar.gz -o clang.tar.gz
          tar -xzf clang.tar.gz -C prebuilts/clang/host/linux-x86/clang-r416183b
          rm clang.tar.gz

      - name: 4. Build the Sandwich
        run: |
          export ARCH=arm64
          export CLANG_BIN=$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r416183b/bin
          export PATH=$CLANG_BIN:$PATH
          export KBUILD_OUTPUT=out
          mkdir -p $KBUILD_OUTPUT

          # Now the files exist, so we can run the merge
          bash scripts/kconfig/merge_config.sh -m -O $KBUILD_OUTPUT \
            arch/arm64/configs/vendor/gki_defconfig \
            arch/arm64/configs/ext_config/moto-mt6765.config \
            arch/arm64/configs/ext_config/ellis_defconfig.config

          # Enable your HID Toppings
          bash scripts/config --file $KBUILD_OUTPUT/.config --enable CONFIG_USB_CONFIGFS_F_HID

          make O=$KBUILD_OUTPUT CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- -j$(nproc) olddefconfig
          make O=$KBUILD_OUTPUT CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- KCFLAGS="-w" -j$(nproc) Image.gz dtbs

      - name: 5. Run Your Install Script
        run: |
          mkdir -p ./dist
          # Use the exact path you gave me
          VERSION=$(cat out/include/config/kernel.release 2>/dev/null || echo "ellis-hid")
          bash arch/arm64/boot/install.sh $VERSION out/arch/arm64/boot/Image.gz out/System.map ./dist

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Kernel
          path: dist/*
