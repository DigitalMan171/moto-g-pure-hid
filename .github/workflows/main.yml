name: Moto G Pure Ellis - Hard-Pinned Production Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Workspace
        uses: actions/checkout@v4
        with:
          path: config-data  # Separates your running.config from the source

      - name: Clone Motorola Kernel
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libelf-dev clang lld llvm-15

      - name: Configure Hybrid Bridge
        run: |
          cd kernel-source
          mkdir -p out
          
          # Fix the file path issue from eda082.jpg
          cp ../config-data/running.config out/.config
          
          # Force the kernel to 64-bit to support the Helio G25 registers (w0)
          sed -i 's/CONFIG_ARM=y/CONFIG_ARM64=y/' out/.config
          
          # Keep 32-bit compatibility for your OS and WiFi
          echo "CONFIG_COMPAT=y" >> out/.config
          
          # Inject HID requirements
          {
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_USB_G_HID=y"
          } >> out/.config
          
          # Use CC=clang and LLVM=1 to force the correct internal assembler
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: Compile Official Image
        run: |
          cd kernel-source
          # Image.gz-dtb is the mandatory target for this specific chipset
          make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 Image.gz-dtb
