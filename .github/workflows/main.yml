name: Ellis Authoritative Hybrid V7
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Source
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git .

      - name: 2. Toolchain Setup
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            prebuilts/clang/host/linux-x86/clang-r416183b
            prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          key: toolchain-ellis-v24-${{ runner.os }}

      - name: 3. Download Toolchain (If Cache Miss)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p prebuilts/clang/host/linux-x86/clang-r416183b
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/bd96dfe349c962681f0e5388af874c771ef96670/clang-r416183b.tar.gz -o clang.tar.gz
          tar -xzf clang.tar.gz -C prebuilts/clang/host/linux-x86/clang-r416183b
          mkdir -p prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          curl -L https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-12.0.0_r1.tar.gz -o binutils.tar.gz
          tar -xzf binutils.tar.gz -C prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9

      - name: 4. Create Custom Fragment
        run: |
          cat <<EOF > custom_hid.cfg
          # Hardware Gatekeepers
          CONFIG_ARCH_MEDIATEK=y
          CONFIG_MTK_PLATFORM="mt6765"
          CONFIG_MTK_CMDQ=y
          CONFIG_MTK_SMI=y
          
          # Memory Path Preservation
          CONFIG_MTK_M4U=y
          CONFIG_MTK_M4U_V2=y
          CONFIG_MTK_IOMMU=y
          CONFIG_MTK_IOMMU_V2=y
          CONFIG_IOMMU_IO_PGTABLE_ARMV8L_FAST=y
          CONFIG_IOMMU_IO_PGTABLE_FAST=y
          
          # GKI Unhiding
          CONFIG_GKI_HIDDEN_USB_CONFIGS=y
          CONFIG_GKI_HIDDEN_IOMMU_CONFIGS=y
          
          # Input & Touchscreen Support
          CONFIG_INPUT_TOUCHSCREEN=y
          CONFIG_I2C_MTK=y
          CONFIG_TOUCHSCREEN_MTK_HIMAX_HX83102P=y
          CONFIG_TOUCHSCREEN_HIMAX_INCELL=y
          
          # USB HID Stack
          CONFIG_USB_LIBCOMPOSITE=y
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_USB_F_HID=y
          CONFIG_USB_HID=y
          CONFIG_HID_GENERIC=y
          EOF

      - name: 5. Execute Authoritative Merge
        run: |
          export ARCH=arm64
          export KBUILD_OUTPUT=out
          export PATH=$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r416183b/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$PATH
          
          mkdir -p out
          
          # Phase 1: Standard Motorola Merge (Ordered for priority)
          bash scripts/kconfig/merge_config.sh -m -r -O out \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/ext_config/moto-mt6765.config \
            arch/arm64/configs/ext_config/ellis_defconfig.config \
            custom_hid.cfg
          
          # Phase 2: Authoritative Append (Overrides GKI safety scripts)
          echo "" >> out/.config
          echo "# --- AUTHORITATIVE OVERRIDES ---" >> out/.config
          cat custom_hid.cfg >> out/.config
          
          # Phase 3: Validation
          make O=$KBUILD_OUTPUT ARCH=arm64 PROJECT=ellis olddefconfig

      - name: 6. Verification Check
        run: |
          echo "Verifying driver survival..."
          grep "CONFIG_MTK_M4U=y" out/.config || (echo "CRITICAL FAIL: M4U still stripped" && exit 1)
          grep "CONFIG_USB_F_HID=y" out/.config || (echo "CRITICAL FAIL: HID still stripped" && exit 1)
          echo "Hardware bridge confirmed."

      - name: 7. Compile
        run: |
          export ARCH=arm64
          export KBUILD_OUTPUT=out
          export PATH=$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r416183b/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$PATH
          make O=$KBUILD_OUTPUT PROJECT=ellis TARGET_BOARD_PLATFORM=mt6765 KERNEL_DEFCONFIG=ellis_defconfig CC=clang LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- KCFLAGS="-w" -j$(nproc) Image.gz

      - name: 8. Package & Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Final-V7
          path: |
            out/arch/arm64/boot/Image.gz
            out/.config
