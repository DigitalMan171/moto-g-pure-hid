name: Moto G Pure HID Build (Final Architecture Fix)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Configs
        uses: actions/checkout@v4

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev git libelf-dev

      - name: Clone AOSP Legacy Toolchains
        run: |
          # Clang for the C code
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b master clang-toolchain
          # GCC for the Linker/Assembler (Crucial for -EL and x0 fixes)
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b master gcc64
          # Optional but recommended for MTK: 32-bit cross-compiler
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 -b master gcc32
          
          # Absolute Path Priority
          echo "$(pwd)/clang-toolchain/clang-r353983c/bin:$(pwd)/gcc64/bin:$(pwd)/gcc32/bin:$PATH" >> $GITHUB_PATH

      - name: Clone Motorola Source
        run: |
          git clone --depth=1 --branch android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git source

      - name: Configure & Version Lock
        run: |
          cd source
          mkdir -p out
          ARCH=arm64 ./scripts/kconfig/merge_config.sh -O out/ ../ellis_defconfig.config ../running.config
          
          echo "+" > .scmversion
          echo "+" > out/.scmversion
          
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-android- \
            CROSS_COMPILE=aarch64-linux-android- \
            olddefconfig

      - name: Build Kernel (Forced Toolchain Path)
        run: |
          cd source
          # LD=ld.lld and AR=llvm-ar ensure we stay within the LLVM toolchain where possible
          # CROSS_COMPILE_ARM32 is sometimes needed for MediaTek compatibility checks
          make -j$(nproc) O=out ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-android- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            KCFLAGS="-w -target aarch64-linux-android" \
            LOCALVERSION="+" \
            Image.gz dtbs

      - name: Verify Version
        run: |
          gunzip -c source/out/arch/arm64/boot/Image.gz > kernel_raw
          VER_STR=$(strings kernel_raw | grep "Linux version 4.19.191" | head -n 1)
          echo "Verified: $VER_STR"
          if [[ "$VER_STR" != *"+"* ]]; then exit 1; fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-hid-v4.19.191-final
          path: |
            source/out/arch/arm64/boot/Image.gz
            source/out/arch/arm64/boot/dts/mediatek/*.dtb
