name: Moto G Pure Ellis - Official Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Fetch Toolchains
        run: |
          # Use depth 1 to save time and space
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc32

      - name: Verify Toolchain Locations
        run: |
          # This step identifies exactly where the binaries are before we try to use them
          echo "Checking GCC64..."
          ls -d $GITHUB_WORKSPACE/gcc64/bin/aarch64-linux-android-gcc || exit 1
          echo "Checking GCC32..."
          ls -d $GITHUB_WORKSPACE/gcc32/bin/arm-linux-androideabi-gcc || exit 1
          echo "Checking Clang..."
          ls -d $GITHUB_WORKSPACE/clang-aosp/clang-r*/bin/clang || exit 1

      - name: Build Kernel
        run: |
          # Dynamically grab the exact Clang folder name (e.g., clang-r416183b)
          CLANG_DIR=$(ls -d $GITHUB_WORKSPACE/clang-aosp/clang-r*)
          
          # Set up absolute paths to avoid any "command not found" issues
          export PATH="$CLANG_DIR/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # One final check to confirm the shell 'sees' the compiler
          aarch64-linux-android-gcc --version

          cd kernel-source
          mkdir -p out
          
          # Copy your config from the repo root
          cp "$GITHUB_WORKSPACE/running.config" out/.config

          # Build Sequence
          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_COMPILE ellis_defconfig
          make -j$(nproc) O=out ARCH=arm64 CC=clang CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 Image.gz-dtb

      - name: Upload Kernel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-Ellis-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
