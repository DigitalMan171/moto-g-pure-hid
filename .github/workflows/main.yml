name: Motorola Ellis Factory Chain (Balanced Debug)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Workspace Topology Setup
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-prebuilts-kernel-build-tools.git moto-tools
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/motorola-kernel-modules.git vendor/motorola/modules

      - name: 2. Toolchain Cache
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: prebuilts/clang/host/linux-x86
          key: ${{ runner.os }}-moto-clang-v1

      - name: 3. Conditional Toolchain Download
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
          prebuilts/clang/host/linux-x86

      - name: 4. VM Path Alignment & Bridging
        run: |
          mkdir -p kernel/vendor/motorola
          ln -s $GITHUB_WORKSPACE/vendor/motorola/modules kernel/vendor/motorola/modules
          
          MOTO_BIN=$(find $GITHUB_WORKSPACE/moto-tools -name "bin" -type d | grep "linux-x86" | head -n 1)
          CLANG_BIN=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r*/bin | sort -V | tail -n 1)
          
          echo "$MOTO_BIN" >> $GITHUB_PATH
          echo "$CLANG_BIN" >> $GITHUB_PATH
          echo "MOTO_BUILD_SCRIPT=$(find $GITHUB_WORKSPACE/moto-tools -name "build.sh" | head -n 1)" >> $GITHUB_ENV

      - name: 5. Execution (Balanced Debug Settings)
        run: |
          chmod +x ${{ env.MOTO_BUILD_SCRIPT }}
          cd kernel
          
          export ARCH=arm64
          export PROJECT=ellis
          export MTK_PLATFORM=mt6765
          export TARGET_BUILD_VARIANT=eng
          
          # Balanced Trimming: Keep symbols needed for dmesg/stack traces
          # We use '--strip-unneeded' instead of a full wipe
          export INSTALL_MOD_STRIP="--strip-unneeded"
          
          # Inject Debug Fragments into the build
          cat <<EOF > balanced_debug.config
          CONFIG_DYNAMIC_DEBUG=y
          CONFIG_PRINTK=y
          CONFIG_BUG=y
          CONFIG_DEBUG_FS=y
          EOF
          
          # Note: build.sh will merge these if they aren't in the defconfig
          
          bash ${{ env.MOTO_BUILD_SCRIPT }} -j$(nproc) \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            KBUILD_DEFCONFIG=ellis_defconfig \
            OUT_DIR=$GITHUB_WORKSPACE/out \
            DIST_DIR=$GITHUB_WORKSPACE/dist

      - name: 6. Archive Final Image
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-ellis-balanced
          path: |
            dist/Image.gz*
            dist/*.ko
            out/.config
