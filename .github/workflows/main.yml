name: Motorola Ellis AOSP-Native Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # These simulate the AOSP 'lunch' environment
      PROJECT: ellis
      ARCH: arm64
      SUBARCH: arm64
      LLVM: 1
      LLVM_IAS: 1
    
    steps:
      - name: 1. Clone Source
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git .

      - name: 2. Locate Vendor Config
        id: find_config
        run: |
          # Replicate the AOSP 'lunch' search logic to find the ellis config
          # It's usually in arch/arm64/configs/vendor/
          CONFIG_PATH=$(find arch/arm64/configs/vendor -name "*ellis*" | head -n 1)
          
          if [ -z "$CONFIG_PATH" ]; then
            echo "ERROR: Could not find ellis_defconfig in vendor tree!"
            exit 1
          fi
          
          # Strip the prefix to get the name for 'make' (e.g., vendor/ellis_defconfig)
          CONFIG_NAME=${CONFIG_PATH#arch/arm64/configs/}
          echo "FULL_PATH=$CONFIG_PATH" >> $GITHUB_OUTPUT
          echo "MAKE_TARGET=$CONFIG_NAME" >> $GITHUB_OUTPUT
          echo "Selected Config: $CONFIG_NAME"

      - name: 3. Inject HID Fragment
        run: |
          # Native AOSP fragments are merged using merge_config.sh
          mkdir -p arch/arm64/configs/vendor/ext_config/
          cat <<EOF > arch/arm64/configs/vendor/ext_config/hid_custom.config
          CONFIG_USB_G_HID=y
          CONFIG_USB_CONFIGFS_F_HID=y
          EOF

      - name: 4. Compile (AOSP Process)
        run: |
          # 1. Initialize the base config using the vendor path we found
          make ${{ steps.find_config.outputs.MAKE_TARGET }}
          
          # 2. Use the NATIVE AOSP merger to add the HID data
          # This ensures all dependencies (like IOMMU) are recalculated
          ./scripts/kconfig/merge_config.sh -m .config arch/arm64/configs/vendor/ext_config/hid_custom.config
          
          # 3. Finalize and Build
          make olddefconfig
          make -j$(nproc) CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu-

      - name: 5. Archive Kernel
        uses: actions/upload-artifact@v4
        with:
          name: ellis-kernel-aosp
          path: arch/arm64/boot/Image.gz*
