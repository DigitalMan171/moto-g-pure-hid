name: Ellis NetHunter - Hardware Verified Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Setup Environment & Toolchains
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libelf-dev libc6:i386 libstdc++6:i386 lib32z1 wget python2.7 libncurses5 curl git
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          
          mkdir tc
          git clone --depth=1 https://github.com/Ancient-Lab/prebuilts_clang_host_linux-x86_clang-r383902 tc/clang
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 tc/gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 tc/gcc32

      - name: 2. Checkout Kernel Source
        run: |
          git clone --depth=1 https://github.com/motorola-MT6765-devs/kernel_motorola_hawaiipl kernel

      - name: 3. Pull Hardware Maps (Private Repo)
        env:
          MY_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          # Manual clone using the token in the URL to bypass API visibility issues
          git clone https://x-access-token:${MY_TOKEN}@github.com/DigitalMan171/Ellis-DTB dt_files

      - name: 4. HawaiiPL Build (4.19.191+)
        run: |
          export PATH=$GITHUB_WORKSPACE/tc/clang/bin:$GITHUB_WORKSPACE/tc/gcc64/bin:$GITHUB_WORKSPACE/tc/gcc32/bin:$PATH
          export OUT=$GITHUB_WORKSPACE/kernel/out
          mkdir -p $OUT
          
          cd kernel
          
          # Force the '+' version string to match stock exactly
          export KBUILD_BUILD_VERSION=1
          touch .scmversion
          
          # 1. Load HawaiiPL Base Config
          make O=$OUT ARCH=arm64 hawaiipl-perd_defconfig
          
          # 2. Match stock version suffix
          ./scripts/config --file $OUT/.config --set-str CONFIG_LOCALVERSION "+"
          
          # 3. Surgical Monolithic: Bake in HID & Display
          ./scripts/config --file $OUT/.config \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_F_HID \
            --enable CONFIG_USB_HID \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_MTK_DISPLAY \
            --enable CONFIG_INPUT_TOUCHSCREEN
            
          # 4. Compilation
          make -j$(nproc) O=$OUT ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            Image.gz

      - name: 5. Package Artifacts
        run: |
          mkdir final_files
          cp kernel/out/arch/arm64/boot/Image.gz final_files/
          # Utilizing verified files from the DigitalMan171/Ellis-DTB clone
          cp dt_files/boot.img.img-dtb final_files/
          cp dt_files/boot.img.img-dtb_offset final_files/

      - name: 6. Upload Final Build
        uses: actions/upload-artifact@v4
        with:
          name: ellis-nethunter-verified-bundle
          path: final_files/
