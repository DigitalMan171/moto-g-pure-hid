name: Ellis Surgical Build - Submodule Recovery
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source (with Submodules)
        uses: actions/checkout@v4
        with:
          repository: 'MotorolaMobilityLLC/kernel-mtk'
          ref: 'android-12-release-s3rhs32.20-42-10-4-11'
          submodules: 'recursive' # THIS IS THE FIX: Pulls the missing 'vendor' folders
          path: './'

      - name: Checkout GCC64 Toolchain
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9'
          path: 'gcc64'

      - name: Checkout Clang Toolchain
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b'
          path: 'clang-aosp'

      - name: Layered Configuration & Verification
        run: |
          mkdir -p out
          
          # PROTOCOL: FIND THE HIDDEN LAYERS
          # If they aren't in /vendor/, this will find where they are hiding.
          MOTO_COMMON=$(find arch/arm64/configs -name "moto-common.config" -o -name "moto-consolidate.config" | head -n 1)
          ELLIS_SPEC=$(find arch/arm64/configs -name "ellis.config" -o -name "ellis_defconfig.config" | head -n 1)
          
          echo "Found Platform Layer: $MOTO_COMMON"
          echo "Found Hardware Layer: $ELLIS_SPEC"

          # MOTOROLA LAYERED CAKE
          # We use the discovered paths to ensure no more "No such file" errors.
          cat arch/arm64/configs/k65v1_64_bsp_defconfig \
              "$MOTO_COMMON" \
              "$ELLIS_SPEC" > out/.config
          
          # HID INJECTION
          {
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_HID_GENERIC=y"
            echo "CONFIG_USB_HID=y"
          } >> out/.config
          
          # VERIFICATION
          grep "CONFIG_MTK_PLATFORM" out/.config && echo "✅ Layer 1 Present"
          grep "CONFIG_MTK_TOUCH_PANEL" out/.config && echo "✅ Layer 3 Present"

          # FINALIZE
          make O=out ARCH=arm64 \
            CROSS_COMPILE=$(pwd)/gcc64/bin/aarch64-linux-android- \
            CC=$(pwd)/clang-aosp/bin/clang \
            olddefconfig

      - name: Compile
        run: |
          make O=out ARCH=arm64 \
            CROSS_COMPILE=$(pwd)/gcc64/bin/aarch64-linux-android- \
            CC=$(pwd)/clang-aosp/bin/clang \
            -j$(nproc) Image.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Surgical-Kernel
          path: out/arch/arm64/boot/Image.gz
