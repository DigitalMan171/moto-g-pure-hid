name: Moto G Pure HID Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Git Fix and Fetch Toolchains
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://".insteadOf git://
          
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc32
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: Checkout Kernel Source
        run: |
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-msm.git -b android-12-release-s3rhs32.20-42-10-4-11 kernel-source

      - name: Build Kernel
        run: |
          export CLANG_PATH=$(pwd)/clang-aosp/bin
          export GCC64_PATH=$(pwd)/gcc64/bin
          export GCC32_PATH=$(pwd)/gcc32/bin
          export PATH=$CLANG_PATH:$GCC64_PATH:$GCC32_PATH:$PATH
          
          cd kernel-source
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-

          make O=out vendor/houston_defconfig
          
          ./scripts/config --file out/.config --enable CONFIG_USB_G_HID
          ./scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --file out/.config --enable CONFIG_HID_GENERIC
          ./scripts/config --file out/.config --enable CONFIG_USB_HID
          
          make O=out -j$(nproc)

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-dtb
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
