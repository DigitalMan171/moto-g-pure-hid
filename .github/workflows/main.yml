name: AOSP Native Motorola Protocol
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Maximize Workspace Storage
        run: |
          # Remove heavy pre-installed tools to make room for AOSP skeletons
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: 2. Install Repo & AOSP Dependencies
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex g++-multilib \
          gcc-multilib git gnupg gperf libncurses5-dev libssl-dev \
          libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip

      - name: 3. Partial AOSP Sync (The Ellis Skeleton)
        run: |
          # Initialize the Motorola Manifest
          repo init -u https://github.com/MotorolaMobilityLLC/android_manifest.git \
                    -b android-12-release-s3rhs32.20-42-10-4-11 --depth=1
          
          # Sync ONLY the folders required for 'lunch' and the Kernel
          # This keeps the footprint small enough for the GitHub VM
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle \
            build/make \
            prebuilts/clang/host/linux-x86 \
            device/motorola/ellis \
            vendor/motorola/ellis \
            kernel/motorola/msm8953  # Verify this path in your specific manifest

      - name: 4. Native AOSP Build (Verified Protocol)
        run: |
          # Engage the 'Closed System'
          source build/envsetup.sh
          
          # This command injects the IOMMU and HID variable groups natively
          lunch v_ellis-eng
          
          # Build the kernel/bootimage using the AOSP wrapper
          # This ensures the 'undeclared identifier' logic is resolved by the verifier
          m KERNEL_EXTRA_CONFIG=mtk_hid_extension bootimage

      - name: 5. Archive Verified Boot Image
        uses: actions/upload-artifact@v4
        with:
          name: ellis-native-boot
          path: out/target/product/ellis/boot.img
