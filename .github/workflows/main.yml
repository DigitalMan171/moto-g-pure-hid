name: Motorola Native Source Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Maximize Workspace
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: 2. Clone Motorola Source (Direct Branch)
        run: |
          # Pulling the exact source you provided
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git .

      - name: 3. Setup Native Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex g++-multilib \
          gcc-multilib git gnupg gperf libncurses5-dev libssl-dev \
          libxml2-utils lzop rsync schedtool squashfs-tools xsltproc zip

      - name: 4. Execute Motorola Native Wrapper
        env:
          # These are the "Magic" variables the Motorola build system listens for
          # to prevent 'rejection' of the build environment.
          PROJECT: ellis
          VARIANT: eng
          ARCH: arm64
          LLVM: 1
          # If the script requires a path to the prebuilts, we set it here
          # but usually, the script looks for them in the root.
        run: |
          # In this specific Motorola tree, the build entry point is 
          # usually scripts/build_kernel.sh or build/build.sh
          
          # We call the script that handles the 'add_moto_defconfig_fragments'
          # and the toolchain verification automatically.
          chmod +x scripts/build_kernel.sh
          ./scripts/build_kernel.sh ellis
          
      - name: 5. Archive Native Output
        uses: actions/upload-artifact@v4
        with:
          name: moto-ellis-kernel
          path: out/target/product/ellis/obj/KERNEL_OBJ/arch/arm64/boot/Image.gz*
