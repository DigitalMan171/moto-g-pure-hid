name: Ellis Surgical Build - HID Enable
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential bison flex libssl-dev libelf-dev python3
          sudo apt-get install -y clang-11 lld-11 llvm-11 gcc-aarch64-linux-gnu

      - name: Motorola Native Build
        run: |
          # 1. PREP THE ENVIRONMENT
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang-11
          
          # 2. RUN THE OFFICIAL MOTO BUILD SCRIPT
          # This script handles the 'hide and seek' of the defconfigs for us.
          # We target 'ellis' specifically.
          chmod +x build.sh
          ./build.sh ellis
          
          # 3. INJECT HID & SECURITY FLAGS INTO THE GENERATED .CONFIG
          # The build.sh script creates 'out/.config'. We patch it here.
          {
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_HID_GENERIC=y"
            echo "CONFIG_USB_HID=y"
            echo "CONFIG_SECURITY_SELINUX=y"
            echo "CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE=0"
          } >> out/.config
          
          # Finalize the manual injections
          make O=out ARCH=arm64 CC=clang-11 olddefconfig

      - name: Compile Image
        run: |
          # Resume the build using the patched config
          make O=out ARCH=arm64 \
          CC=clang-11 \
          LD=ld.lld-11 \
          -j$(nproc) Image.gz

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Surgical-Kernel
          path: out/arch/arm64/boot/Image.gz
