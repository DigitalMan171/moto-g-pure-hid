name: Motorola Factory Vendor Build (Lunch Protocol)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Maximize Workspace & Restore Cloud Toolchain
        uses: actions/cache@v4
        with:
          path: prebuilts/clang/host/linux-x86
          key: ${{ runner.os }}-moto-toolchain-v1

      - name: 2. Setup Factory Build Environment (Lunch Stubs)
        run: |
          mkdir -p build device/motorola/ellis
          cat <<EOF > build/envsetup.sh
          function lunch() {
            # Target Identifiers
            export ARCH=arm64
            export PROJECT=ellis
            export MTK_PROJECT=ellis
            export TARGET_PRODUCT=ellis
            export TARGET_BUILD_VARIANT=eng
            
            # Hardware Parameters (Synced from Magiskboot Unpack)
            export BOARD_KERNEL_PAGESIZE=2048
            export BOARD_BOOT_HEADER_VER=2
            export BOARD_MKBOOTIMG_ARGS="--header_version 2"
            
            # Toolchain Triple (Clang-Native)
            export CROSS_COMPILE=aarch64-linux-gnu-
            export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            export CLANG_TRIPLE=aarch64-linux-gnu-
            
            # Master Engineering Flags
            export MTK_EARA_IO_SUPPORT=yes
            export MTK_BLOCK_TAG_SUPPORT=yes
            
            echo "============================================"
            echo "LUNCHED: ellis-eng (Motorola Factory Mode)"
            echo "Hardware Sync: Header V2 | Page 2048"
            echo "============================================"
          }
          EOF

      - name: 3. Fetch Source Assets
        run: |
          if [ ! -d "kernel" ]; then
            git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
            https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          fi
          if [ ! -d "prebuilts/clang/host/linux-x86" ]; then
            git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            prebuilts/clang/host/linux-x86
          fi

      - name: 4. Execute Protocol-Compliant Build
        run: |
          source build/envsetup.sh
          lunch ellis-eng
          
          # Map Toolchain
          CLANG_DIR=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r* | sort -V | tail -n 1)
          export PATH="$CLANG_DIR/bin:$PATH"
          
          # Prep carry-over fragment
          cat <<EOF > kernel/hid_unlock.config
          CONFIG_USB_G_HID=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_MTK_EARA_IO_SUPPORT=y
          CONFIG_MTK_BLOCK_TAG_SUPPORT=y
          EOF

          cd kernel
          
          # Define Common Build Arguments for Clang/LLVM
          COMMON_FLAGS="ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CLANG_TRIPLE=aarch64-linux-gnu-"

          # STEP A: Try both standard and extended defconfig paths
          make O=out $COMMON_FLAGS ellis_defconfig || \
          make O=out $COMMON_FLAGS KBUILD_DEFCONFIG=ext_config/ellis_defconfig.config defconfig

          # STEP B: Official Fragment Merge
          ./scripts/kconfig/merge_config.sh -m -O out out/.config hid_unlock.config
          
          # STEP C: Finalize Configuration
          make O=out $COMMON_FLAGS olddefconfig
          
          # STEP D: Full Factory Compilation
          make O=out -j$(nproc) $COMMON_FLAGS

      - name: 5. Archive Build Artifacts (Image.gz)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-ellis-custom
          path: |
            kernel/out/arch/arm64/boot/Image.gz*
            kernel/out/.config
