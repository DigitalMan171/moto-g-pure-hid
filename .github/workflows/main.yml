name: Moto G Pure HID Kernel Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm git

    - name: Toolchain Setup
      run: |
        mkdir tc
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 tc/gcc64
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 tc/gcc32
        echo "PATH=$GITHUB_WORKSPACE/tc/gcc64/bin:$GITHUB_WORKSPACE/tc/gcc32/bin:$PATH" >> $GITHUB_ENV

    - name: Configure HID Drivers
      run: |
        chmod +x scripts/config
        ./scripts/config --file arch/arm64/configs/vendor/ellis_defconfig \
          -e CONFIG_USB_G_HID \
          -e CONFIG_USB_CONFIGFS_F_HID \
          -e CONFIG_USB_F_HID \
          -e CONFIG_INPUT_UINPUT \
          -e CONFIG_HIDRAW \
          -e CONFIG_HID_GENERIC \
          -e CONFIG_USB_CONFIGFS_UEVENT
        
        echo "Verifying Flags in Vendor Config:"
        grep -E "CONFIG_USB_F_HID|CONFIG_HIDRAW" arch/arm64/configs/vendor/ellis_defconfig

    - name: Compile Kernel
      run: |
        # MediaTek builds require O=out and the vendor/ prefix
        make O=out ARCH=arm64 vendor/ellis_defconfig
        make -j$(nproc --all) O=out \
          ARCH=arm64 \
          CROSS_COMPILE=aarch64-linux-android- \
          CROSS_COMPILE_ARM32=arm-linux-androideabi- \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu-

    - name: Export Image
      uses: actions/upload-artifact@v4
      with:
        name: Image-ellis-HID
        path: out/arch/arm64/boot/Image.gz-dtb
