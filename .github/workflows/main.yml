name: Moto G Pure (MTK) HID Build
run-name: HID Kernel Build - ${{ github.ref_name }}

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi pahole dtc

      - name: Fetch Clang Toolchain
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://".insteadOf git://
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: Checkout MTK Kernel Source
        run: |
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-mtk.git -b android-12-release-s3rhs32.20-42-10-4-11 kernel-source

      - name: Build Kernel
        run: |
          # 1. SETUP ENVIRONMENT PATHS
          export PATH=$(pwd)/clang-aosp/bin:$PATH
          cd kernel-source
          
          # 2. ESSENTIAL INLINE PATCHES (Necessary for modern Clang compatibility)
          sed -i 's/inline void ksm_flock/void ksm_flock/g' include/linux/keyslot-manager.h
          sed -i 's/inline void uclamp_se_set/void uclamp_se_set/g' kernel/sched/sched.h

          # 3. DEFINE COMPILER VARIABLES (The 'Protocol' way)
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export HOSTCC=clang
          export HOSTCXX=clang++

          # 4. CONFIGURATION
          # Clean the output directory first
          make O=out clean
          make O=out k65v1_64_bsp_defconfig
          
          if [ -f "arch/arm64/configs/ext_config/ellis_defconfig.config" ]; then
            ./scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/ext_config/ellis_defconfig.config
          fi

          # 5. HID INJECTION
          ./scripts/config --file out/.config --disable CONFIG_USB_G_HID
          ./scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --file out/.config --enable CONFIG_HID_GENERIC
          ./scripts/config --file out/.config --enable CONFIG_USB_HID
          
          make O=out olddefconfig
          
          # 6. COMPILATION
          # We use LLVM=1 if the kernel supports it, otherwise standard CC=clang
          make O=out KCFLAGS="-Wno-error" -j$(nproc) Image.gz-dtb || make O=out KCFLAGS="-Wno-error" -j1 Image.gz-dtb

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-HID-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
