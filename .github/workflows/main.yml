name: Ellis Engineering Unlock V22
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Source
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git .

      - name: 2. Toolchain Setup
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            prebuilts/clang/host/linux-x86/clang-r416183b
            prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9
          key: toolchain-ellis-v35-${{ runner.os }}

      - name: 3. Create Engineering Fragment
        run: |
          cat <<EOF > custom_hid.cfg
          # --- Motorola Developer/Engineering Toggles ---
          CONFIG_MTK_ENG_BUILD=y
          CONFIG_MTK_COMBO=y
          CONFIG_MTK_LEGACY_HAL=y
          CONFIG_GKI_LEGACY_DEVICE=y
          # CONFIG_MOTOROLA_LOCKED_GKI is not set
          
          # --- Hardware Bus Core ---
          CONFIG_ARCH_MEDIATEK=y
          CONFIG_MTK_PLATFORM="mt6765"
          CONFIG_ARCH_MT6765=y
          CONFIG_MTK_PLATFORM_MT6765=y
          
          # --- SMI & M4U (The Stripping Targets) ---
          CONFIG_MTK_SMI=y
          CONFIG_MTK_SMI_COMMON=y
          CONFIG_MTK_SMI_BWP=y
          CONFIG_MTK_M4U_SUPPORT=y
          CONFIG_MTK_M4U=y
          CONFIG_MTK_M4U_V2=y
          CONFIG_DEBUG_MTK_M4U=y
          
          # --- USB HID Stack ---
          CONFIG_MTK_USB_GADGET=y
          CONFIG_USB_LIBCOMPOSITE=y
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_F_HID=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_USB_HID=y
          CONFIG_HID_GENERIC=y
          
          # --- Visibility & Clocks ---
          CONFIG_GKI_HIDDEN_IOMMU_CONFIGS=y
          CONFIG_COMMON_CLK_MT6765=y
          EOF

      - name: 4. The Engineering Merge
        run: |
          export ARCH=arm64
          export KBUILD_OUTPUT=out
          export PATH=$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r416183b/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$PATH
          
          mkdir -p out
          
          # Permissive merge to override GKI defaults
          bash scripts/kconfig/merge_config.sh -m -O out \
            arch/arm64/configs/gki_defconfig \
            arch/arm64/configs/ext_config/moto-mt6765.config \
            arch/arm64/configs/ext_config/ellis_defconfig.config \
            custom_hid.cfg
          
          # Force 'olddefconfig' with the engineering flags
          make O=$KBUILD_OUTPUT ARCH=arm64 PROJECT=ellis olddefconfig

      - name: 5. Verification
        run: |
          echo "Verifying Engineering Mode survival..."
          grep "CONFIG_MTK_ENG_BUILD=y" out/.config || (echo "ENG_BUILD STRIPPED" && exit 1)
          grep "CONFIG_MTK_SMI_COMMON=y" out/.config || (echo "SMI_COMMON STRIPPED" && exit 1)
          grep "CONFIG_MTK_M4U=y" out/.config || (echo "M4U STRIPPED" && exit 1)
          grep "CONFIG_USB_F_HID=y" out/.config || (echo "HID STRIPPED" && exit 1)
          echo "Developer Hardware Access confirmed."

      - name: 6. Compile
        run: |
          export ARCH=arm64
          export KBUILD_OUTPUT=out
          export PATH=$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r416183b/bin:$GITHUB_WORKSPACE/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/bin:$PATH
          
          # Target ellis with full LLVM/Clang toolchain
          make O=$KBUILD_OUTPUT PROJECT=ellis TARGET_BOARD_PLATFORM=mt6765 CC=clang LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- KCFLAGS="-w" -j$(nproc) Image.gz

      - name: 7. Package & Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Engineering-V22
          path: |
            out/arch/arm64/boot/Image.gz
            out/.config
