name: Ellis NetHunter HID Build

on:
  workflow_dispatch: # Allows manual start

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev libtinfo5

      - name: Setup AOSP Clang
        run: |
          mkdir clang
          cd clang
          # Using r416183b - the stable choice for Android 12 era kernels
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r416183b.tar.gz
          tar -xf clang-r416183b.tar.gz

      - name: Apply Targeted NetHunter Fixes
        run: |
          # 1. DTC Fix: Prevents "multiple definition of yylloc" errors on Ubuntu 22.04+
          wget https://gitlab.com/kalilinux/nethunter/build-scripts/kali-nethunter-kernel/-/raw/master/patches/4.19/fix-yylloc.dtc-lexer.lex.c_shipped.patch
          patch -p1 < fix-yylloc.dtc-lexer.lex.c_shipped.patch || echo "DTC patch already applied"

          # 2. HID Descriptor Fix: Ensures multiple HID endpoints work correctly
          # We pull just this specific patch to avoid the WiFi driver crash
          wget https://gitlab.com/kalilinux/nethunter/build-scripts/kali-nethunter-kernel/-/raw/master/patches/4.19/add-hid-support.patch -O hid.patch
          # We use --forward to ignore if already patched, and -p1 for standard kernel trees
          patch -p1 < hid.patch || echo "HID patch partially failed or already present - continuing..."

      - name: Configure HID & Magic IDs
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          # Generate base config
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- ellis_defconfig
          
          # Force-Enable NetHunter HID Arsenal
          ./scripts/config --file out/.config \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_F_HID \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_USB_LIBCOMPOSITE \
            --enable CONFIG_USB_CONFIGFS
            
          # Inject Magic USB IDs (Generic HID Mode)
          sed -i 's/CONFIG_USB_G_ANDROID_VID=.*/CONFIG_USB_G_ANDROID_VID=0x22b8/' out/.config
          sed -i 's/CONFIG_USB_G_ANDROID_PID=.*/CONFIG_USB_G_ANDROID_PID=0x2e76/' out/.config
          
          # Refresh config
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- olddefconfig

      - name: Compile Kernel
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          # -j$(nproc) uses all available CPU cores for speed
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- KCFLAGS="-w"

      - name: Package with AnyKernel3 (Magisk Preservation)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          # Disable device check so it flashes on Ellis without errors
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r ../Ellis-HID-Kernel.zip ./*

      - name: Upload Flashable Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-NetHunter-HID
          path: Ellis-HID-Kernel.zip
