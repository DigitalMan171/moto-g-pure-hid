name: "Ellis Pro-Build: Toolchain-Locked & Security-Unlocked"
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      SUBARCH: arm64
      CLANG_PATH: ${{ github.workspace }}/clang-aosp/bin
      GCC_PATH: ${{ github.workspace }}/toolchains/bin
      OUT_DIR: ${{ github.workspace }}/out
      MTK_PLATFORM: mt6765

    steps:
      - name: "Checkout Motorola Official Source"
        uses: actions/checkout@v4
        with:
          repository: 'MotorolaMobilityLLC/kernel-mtk'
          ref: 'android-12-release-s3rhs32.20-42-10-4-11'
          path: './'

      - name: "Provision Version-Specific Toolchains"
        run: |
          mkdir -p toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu-a/10.3-2021.07/binrel/gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          tar -xJf gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz -C toolchains --strip-components=1
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: "Tier 1: Surgical Fixes (Surgical I2C & Path Alignment)"
        run: |
          # 1. FIX: CPUFreq Redefinition (Isolated Guard Method)
          FILE="drivers/misc/mediatek/include/mt-plat/mt6765/include/mach/mtk_cpufreq_api.h"
          sed -i '/enum mt_cpu_dvfs_id {/i #ifndef _MT_CPU_DVFS_ID_\n#define _MT_CPU_DVFS_ID_' $FILE
          sed -i '/MT_CPU_DVFS_ID_MAX/!b;n;s/};/};\n#endif/' $FILE

          # 2. FIX: Camera (imgsensor) Redundancy & Visibility
          # Stripping duplicate sensor constants causing linker collisions
          find drivers/misc/mediatek/imgsensor -name "*.h" -exec sed -i 's/extern unsigned int img_sensor_num;/unsigned int img_sensor_num;/g' {} +
          find drivers/misc/mediatek/imgsensor -name "Makefile" -exec sed -i "s|-I\$(srctree)/drivers/misc/mediatek/include|-I\$(srctree)/drivers/misc/mediatek/include -I\$(srctree)/drivers/misc/mediatek/imgsensor/inc -I\$(srctree)/drivers/misc/mediatek/imgsensor/src/$MTK_PLATFORM/camera_hw|g" {} +

          # 3. FIX: Platform Path Injection (EMI & ECCCI)
          find drivers/misc/mediatek/emi -name "Makefile" -exec sed -i "s|-I\$(srctree)/drivers/misc/mediatek/include|-I\$(srctree)/drivers/misc/mediatek/include -I\$(srctree)/drivers/misc/mediatek/include/mt-plat/$MTK_PLATFORM|g" {} +
          find drivers/misc/mediatek/eccci -name "Makefile" -exec sed -i 's/-I$(srctree)\/drivers\/misc\/mediatek\/include/-I$(srctree)\/drivers\/misc\/mediatek\/include -I$(srctree)\/drivers\/misc\/mediatek\/include\/mt-plat/g' {} +

          # 4. FIX: Architecture & Compiler Strictness
          sed -i 's/%x/%llx/g' drivers/misc/mediatek/aee/mrdump/mrdump_panic.c
          sed -i 's/mrdump_cbaddr/(unsigned long long)mrdump_cbaddr/g' drivers/misc/mediatek/aee/mrdump/mrdump_panic.c
          sed -i '1i struct FUELGAUGE_TEMPERATURE { int Temperature; int Temp_Array; };' drivers/power/supply/mtk_battery_table.h
          sed -i 's/inline void ksm_flock/void ksm_flock/g' include/linux/keyslot-manager.h
          sed -i 's/inline void uclamp_se_set/void uclamp_se_set/g' kernel/sched/sched.h

      - name: "Tier 2: Kconfig Merge & Security Bypass"
        run: |
