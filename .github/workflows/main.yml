name: Moto G Pure Ellis - Hermetic Production Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Workspace
        uses: actions/checkout@v4
        with:
          path: config-data

      - name: Clone Motorola Kernel
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Download Official AOSP Toolchain
        run: |
          # This is the 'secret sauce'—it's the exact compiler used for this phone
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc-64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc-32

      - name: Configure & Compile
        run: |
          cd kernel-source
          mkdir -p out
          cp ../config-data/running.config out/.config
          
          # Force 64-bit for hardware registers while keeping 32-bit compat
          sed -i 's/CONFIG_ARM=y/CONFIG_ARM64=y/' out/.config
          echo "CONFIG_COMPAT=y" >> out/.config
          
          # Set Paths to the Official AOSP tools
          export PATH=$GITHUB_WORKSPACE/clang-aosp/clang-r416183b/bin:$GITHUB_WORKSPACE/gcc-64/bin:$GITHUB_WORKSPACE/gcc-32/bin:$PATH
          
          # The Proper Command: No host-system tools allowed
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LLVM=1 LLVM_IAS=1 Image.gz-dtb
