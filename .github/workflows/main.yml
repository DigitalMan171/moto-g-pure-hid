name: Moto G Pure Ellis - Production Multilib Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Config Repository
        uses: actions/checkout@v4
        with:
          path: my-config  # Isolates your running.config

      - name: Checkout Motorola Kernel
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libelf-dev clang lld llvm

      - name: Configure & Sync Architecture
        run: |
          cd kernel-source
          mkdir -p out
          
          # Use absolute path to ensure config is found
          cp ../my-config/running.config out/.config
          
          # BRIDGE: Force 64-bit kernel with 32-bit app support
          sed -i 's/CONFIG_ARM=y/CONFIG_ARM64=y/' out/.config
          echo "CONFIG_COMPAT=y" >> out/.config
          
          # HID REQUIREMENTS
          {
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_USB_G_HID=y"
          } >> out/.config
          
          # Use LLVM_IAS=1 to force the correct internal ARM assembler
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: Compile Official Image
        run: |
          cd kernel-source
          # Image.gz-dtb is the mandatory target for this chipset
          make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 Image.gz-dtb
