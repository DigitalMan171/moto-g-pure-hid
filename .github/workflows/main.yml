name: "Ellis Open Source Build - Motorola Protocol"
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: "Checkout Official Source"
        uses: actions/checkout@v4
        with:
          repository: 'MotorolaMobilityLLC/kernel-mtk'
          ref: 'android-12-release-s3rhs32.20-42-10-4-11'
          submodules: 'recursive'
          path: './'

      - name: "Environment: Official GCC 10.3 & Clang"
        run: |
          mkdir -p toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu-a/10.3-2021.07/binrel/gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          tar -xJf gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz -C toolchains --strip-components=1

      - name: "Checkout AOSP Clang"
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b'
          path: 'clang-aosp'

      - name: "Official Build Protocol: Application of Patches"
        run: |
          mkdir -p out
          
          # 1. PR_NOTICE ARCHITECTURE ALIGNMENT
          # Official fix for phys_addr_t mismatch in mrdump_panic.c
          # Using %llx and casting is the kernel-approved method for arch-dependent prints.
          sed -i 's/%x/%llx/g' drivers/misc/mediatek/aee/mrdump/mrdump_panic.c
          sed -i 's/mrdump_cbaddr/(unsigned long long)mrdump_cbaddr/g' drivers/misc/mediatek/aee/mrdump/mrdump_panic.c
          sed -i 's/mrdump_cbsize/(unsigned long long)mrdump_cbsize/g' drivers/misc/mediatek/aee/mrdump/mrdump_panic.c

          # 2. HEADER STRUCT INTEGRITY
          # Official forward-declaration for the fuel gauge structure
          sed -i '1i struct FUELGAUGE_TEMPERATURE { int Temperature; int Temp_Array; };' drivers/power/supply/mtk_battery_table.h
          
          # 3. COMPILER STRICTNESS (De-Inlining)
          # These satisfy modern GCC without altering driver logic
          sed -i 's/inline void ksm_flock/void ksm_flock/g' include/linux/keyslot-manager.h
          sed -i 's/inline void blk_crypto_flock/void blk_crypto_flock/g' include/linux/blk-crypto.h
          sed -i 's/inline void uclamp_se_set/void uclamp_se_set/g' kernel/sched/sched.h

          # 4. GLOBAL ENVIRONMENT HANDSHAKE
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=$(pwd)/toolchains/bin/aarch64-none-linux-gnu-
          export CC=$(pwd)/clang-aosp/bin/clang
          export HOSTCC=$(pwd)/toolchains/bin/aarch64-none-linux-gnu-gcc
          export LD_LIBRARY_PATH=$(pwd)/clang-aosp/lib64:$LD_LIBRARY_PATH

          # 5. CONFIG MERGE & COMPILE
          make O=out ARCH=arm64 k65v1_64_bsp_defconfig
          # Append ellis specific hardware config
          ELLIS_CFG=$(find arch/arm64/configs -name "ellis_defconfig.config")
          [ -f "$ELLIS_CFG" ] && cat "$ELLIS_CFG" >> out/.config
          
          # Inject HID drivers as requested
          echo "CONFIG_USB_CONFIGFS_F_HID=y" >> out/.config
          
          make O=out ARCH=arm64 olddefconfig
          make O=out -j$(nproc) Image.gz dtbs

      - name: "Package Official Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "Ellis-Official-Build"
          path: out/arch/arm64/boot/Image.gz
