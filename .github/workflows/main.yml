name: Build Ellis Kernel

on:
  workflow_dispatch: # Allows you to start the build manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev ccache

      - name: Fetch AOSP Clang
        run: |
          mkdir clang
          cd clang
          # Using Android 12/13 era Clang (r416183b) which is stable for 4.19
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r416183b.tar.gz
          tar -xf clang-r416183b.tar.gz

      - name: Setup Kernel Config
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          # 1. Generate the base config
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- ellis_defconfig
          
          # 2. THE HID INJECTION: Force enable HID Gadget drivers
          echo "CONFIG_USB_G_HID=y" >> out/.config
          echo "CONFIG_USB_CONFIGFS_F_HID=y" >> out/.config
          echo "CONFIG_HID_GENERIC=y" >> out/.config
          
          # 3. Refresh config to handle dependencies
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- olddefconfig

      - name: Compile Kernel
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android-

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-HID-Kernel
          path: out/arch/arm64/boot/Image.gz-dtb
