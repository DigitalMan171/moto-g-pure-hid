name: Moto G Pure HID Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Configs
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex gcc-aarch64-linux-gnu libssl-dev git clang lld

      - name: Clone Motorola Source
        run: |
          git clone --depth=1 --branch android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git source || \
          git clone --depth=1 --branch android-12-release-s3rhs32.20-42 https://github.com/MotorolaMobilityLLC/kernel-mtk.git source

      - name: Prepare the Blueprint
        run: |
          cp running.config source/arch/arm64/configs/ext_config/ellis_defconfig.config
          cat ellis_defconfig.config >> source/arch/arm64/configs/ext_config/ellis_defconfig.config
          sed -i 's/CONFIG_LOCALVERSION=""/CONFIG_LOCALVERSION="+"/' source/arch/arm64/configs/ext_config/ellis_defconfig.config

      - name: Build the Kernel
        run: |
          cd source
          mkdir -p out
          cp arch/arm64/configs/ext_config/ellis_defconfig.config out/.config
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make O=out ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          KCFLAGS="-w -Wno-error -Wno-unused-label" \
          W=O \
          -j$(nproc) Image.gz-dtb
          
      - name: Upload Finished Kernel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-hid-kernel
          path: source/out/arch/arm64/boot/Image.gz-dtb
