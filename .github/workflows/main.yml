name: Motorola Ellis Factory Save & Verify
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Workspace Save Method (Cache)
        id: cache-all
        uses: actions/cache@v4
        with:
          path: |
            prebuilts/clang/host/linux-x86
            kernel
            build
          key: ${{ runner.os }}-moto-ellis-v11

      - name: 2. Fresh Sync (If Cache Miss)
        if: steps.cache-all.outputs.cache-hit != 'true'
        run: |
          # A. Official Android Clang Toolchain
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
          prebuilts/clang/host/linux-x86
          
          # B. Core Kernel Source
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          
          # C. Official Build Tools
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-prebuilts-kernel-build-tools.git build
          
          # D. Supplemental Modules
          mkdir -p kernel/vendor/motorola
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/motorola-kernel-modules.git kernel/vendor/motorola/modules

      - name: 3. Topology Verification & Pathing
        run: |
          echo "--- DETECTED BASE DIRECTORY STRUCTURE ---"
          ls -d $GITHUB_WORKSPACE/*
          
          echo "--- VERIFYING BUILD TOOLS CONTENTS ---"
          if [ -d "build" ]; then
            ls -R build | head -n 20
          else
            echo "ERROR: Build directory not found!"
            exit 1
          fi
          
          # Authorized Bin Paths
          MOTO_BIN="$GITHUB_WORKSPACE/build/linux-x86/bin"
          CLANG_BIN=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r*/bin | sort -V | tail -n 1)
          
          echo "$MOTO_BIN" >> $GITHUB_PATH
          echo "$CLANG_BIN" >> $GITHUB_PATH
          
          # Use 'find' only once here to authorize the exact path for the next step
          REAL_SCRIPT=$(find $GITHUB_WORKSPACE/build -name "build.sh" | head -n 1)
          echo "MOTO_SCRIPT_PATH=$REAL_SCRIPT" >> $GITHUB_ENV
          chmod +x "$REAL_SCRIPT"

      - name: 4. Execution (Lunch Protocol)
        run: |
          export ARCH=arm64
          export PROJECT=ellis
          export MTK_PLATFORM=mt6765
          export TARGET_BUILD_VARIANT=eng
          
          export OUT_DIR=$GITHUB_WORKSPACE/out
          export DIST_DIR=$GITHUB_WORKSPACE/dist
          export INSTALL_MOD_STRIP="--strip-unneeded"
          
          # Trigger the detected script path
          bash "${{ env.MOTO_SCRIPT_PATH }}" -j$(nproc) \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            KBUILD_DEFCONFIG=ellis_defconfig

      - name: 5. Archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-verify-run
          path: |
            dist/Image.gz*
            dist/*.ko
            out/.config
