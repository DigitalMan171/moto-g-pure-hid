name: Moto G Pure - Manufacturer Spec Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Fetch Official Toolchains (Branch Targeted)
        run: |
          # We are targeting the 'master' branch explicitly but disabling filters 
          # to ensure we get the actual binaries, not just metadata.
          git clone --depth=1 --single-branch https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp
          git clone --depth=1 --single-branch https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc64
          git clone --depth=1 --single-branch https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc32

      - name: Deep File Discovery
        id: locate
        run: |
          # This is the "Truth" step. We search the entire workspace for the binaries.
          # If they exist ANYWHERE on the runner, we will find them.
          GCC64_BIN=$(find $GITHUB_WORKSPACE/gcc64 -name "aarch64-linux-android-gcc" -type f | head -n 1)
          GCC32_BIN=$(find $GITHUB_WORKSPACE/gcc32 -name "arm-linux-androideabi-gcc" -type f | head -n 1)
          CLANG_BIN=$(find $GITHUB_WORKSPACE/clang-aosp -name "clang" -type f | grep "bin/clang" | head -n 1)

          if [ -z "$GCC64_BIN" ]; then
            echo "FAILED: GCC64 not found. Printing directory structure for help:"
            ls -R $GITHUB_WORKSPACE/gcc64
            exit 1
          fi

          # Save the directories (not the files) to the environment
          echo "GCC64_PATH=$(dirname $GCC64_BIN)" >> $GITHUB_ENV
          echo "GCC32_PATH=$(dirname $GCC32_BIN)" >> $GITHUB_ENV
          echo "CLANG_PATH=$(dirname $CLANG_BIN)" >> $GITHUB_ENV

      - name: Build Kernel
        run: |
          # Use the exact paths found in the Discovery step
          export PATH="$CLANG_PATH:$GCC64_PATH:$GCC32_PATH:$PATH"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-

          cd kernel-source
          mkdir -p out
          cp $GITHUB_WORKSPACE/running.config out/.config

          # Ensure your HID project drivers are set
          scripts/config --file out/.config --enable CONFIG_USB_G_HID
          scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_HID

          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_COMPILE ellis_defconfig
          make -j$(nproc) O=out ARCH=arm64 CC=clang CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 Image.gz-dtb

      - name: Upload Kernel
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-Ellis-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
