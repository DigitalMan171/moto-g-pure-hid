name: Motorola Ellis Blueprint Discovery
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Total Cloud Save (v17)
        id: cache-all
        uses: actions/cache@v4
        with:
          path: |
            prebuilts/clang/host/linux-x86
            kernel
          key: ${{ runner.os }}-moto-ellis-v17

      - name: 2. Sync Kernel & Secondary Device Tree
        if: steps.cache-all.outputs.cache-hit != 'true'
        run: |
          # Kernel Source
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          
          # Secondary Device Tree (Community Repo)
          git clone --depth=1 https://github.com/juic3b0x/device_motorola_ellis device/motorola/ellis
          
          # Android Clang
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang/host/linux-x86

      - name: 3. Search for the Blueprint (.dts)
        run: |
          echo "--- SEARCHING KERNEL FOR ELLIS DTS ---"
          find kernel/arch/arm64/boot/dts -name "*ellis*" || echo "Not in Kernel"
          
          echo "--- SEARCHING SECONDARY REPO ---"
          find device/motorola/ellis -name "*.dts*" || echo "Not in Device Repo"
          
          # If we find nothing, we will need to extract from boot.img in the next run
          if ! find . -name "*ellis*.dts" | grep -q "."; then
            echo "STATUS: Blueprint Missing. Protocol Plan B Required (boot.img extraction)."
          fi

      - name: 4. Path Authorization
        run: |
          CLANG_BIN=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r*/bin | sort -V | tail -n 1)
          echo "$CLANG_BIN" >> $GITHUB_PATH

      - name: 5. Kbuild Execution (Attempt)
        run: |
          cd kernel
          KBUILD_ARGS="-j$(nproc) O=../out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CLANG_TRIPLE=aarch64-linux-gnu-"
          
          # Attempting to load the Ellis config
          # This will likely fail if the device tree isn't linked correctly
          make $KBUILD_ARGS ellis_defconfig || make $KBUILD_ARGS mt6765_defconfig
