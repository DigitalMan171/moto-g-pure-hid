name: Moto G Pure HID Final (LLVM Hybrid)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Configs
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev git libelf-dev clang lld llvm

      - name: Clone Motorola Source
        run: |
          git clone --depth=1 --branch android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git source

      - name: Sync 32-bit Config to 64-bit Build
        run: |
          cd source
          mkdir -p out
          cp ../running.config out/.config
          
          # Force the kernel to 64-bit while keeping 32-bit app support
          sed -i 's/CONFIG_ARM=y/CONFIG_ARM64=y/' out/.config
          echo "CONFIG_COMPAT=y" >> out/.config
          
          # Inject HID requirements
          {
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_USB_G_HID=y"
          } >> out/.config
          
          # olddefconfig bypasses the 'manual input' hang seen in f1c6bd.jpg
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: Build Image.gz (LLVM Path)
        run: |
          cd source
          # Using LLVM=1 ensures the assembler understands 'LSE atomics'
          make -j$(nproc) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 Image.gz
