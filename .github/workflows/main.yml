name: Moto G Pure HID Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Configs
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex gcc-aarch64-linux-gnu libssl-dev git

      - name: Install Official Android Clang
        run: |
          # This is the 100% reliable way to get the Google toolchain
          git clone --depth=1 https://android.googlesource.com clang-toolchain
          # This registers the compiler so the build script can find 'clang'
          echo "$(pwd)/clang-toolchain/clang-r416183b/bin" >> $GITHUB_PATH

      - name: Clone Motorola Source
        run: |
          # Verified branch for Moto G Pure (ellis)
          git clone --depth=1 --branch android-12-release-s3rhs32.20-42-10-4-11 https://github.com source || \
          git clone --depth=1 --branch android-12-release-s3rhs32.20-42 https://github.com source

      - name: Prepare the Blueprint
        run: |
          # Copy your config into the source environment
          cp running.config source/arch/arm64/configs/ext_config/ellis_defconfig.config
          # Injects the HID drivers from your custom file
          cat ellis_defconfig.config >> source/arch/arm64/configs/ext_config/ellis_defconfig.config
          # Fixes the Version Magic (+) suffix for WiFi compatibility
          sed -i 's/CONFIG_LOCALVERSION=""/CONFIG_LOCALVERSION="+"/' source/arch/arm64/configs/ext_config/ellis_defconfig.config

      - name: Build the Kernel
        run: |
          cd source
          mkdir -p out
          cp arch/arm64/configs/ext_config/ellis_defconfig.config out/.config
          
          # Sync the configuration using the Clang toolchain we just downloaded
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            olddefconfig
          
          # Start the 20-minute build (using Clang to bypass the 'fs/' error)
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            -j$(nproc) Image.gz-dtb

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: moto-hid-kernel
          path: source/out/arch/arm64/boot/Image.gz-dtb
