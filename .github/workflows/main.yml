name: Ellis Precise Build - Clang r383902
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          path: kernel

      - name: Environment Setup
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libelf-dev libc6:i386 libstdc++6:i386 lib32z1 wget python2.7
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python

      - name: Sync EXACT Factory Toolchain (r383902)
        run: |
          mkdir tc
          # This is the exact Clang 11.0.1 used by Motorola for the Ellis build
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 tc/clang-raw
          # We need the specific r383902 directory
          mv tc/clang-raw/clang-r383902 tc/clang
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 tc/gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 tc/gcc32

      - name: Build and Verify
        run: |
          export PATH=$GITHUB_WORKSPACE/tc/clang/bin:$GITHUB_WORKSPACE/tc/gcc64/bin:$GITHUB_WORKSPACE/tc/gcc32/bin:$PATH
          export OUT=$GITHUB_WORKSPACE/kernel/out
          mkdir -p $OUT
          cd kernel
          make O=$OUT ARCH=arm64 mgk_64_k510_defconfig
          ./scripts/config --file $OUT/.config --enable CONFIG_USB_G_HID --enable CONFIG_USB_CONFIGFS_F_HID
          
          # Build with Clang 11
          make -j$(nproc) O=$OUT ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            Image.gz dtbs

      - name: Driver Verification
        run: |
          if find kernel/out -name "f_hid.o" | grep -q "f_hid.o"; then
            echo "SUCCESS: f_hid.o compiled with Clang 11.0.1 (r383902)"
          else
            echo "CRITICAL ERROR: f_hid.o missing even with correct toolchain."
            exit 1
          fi

      - name: Upload Matched Kernel
        uses: upload-artifact@v4
        with:
          name: ellis-kernel-r383902
          path: kernel/out/arch/arm64/boot/Image.gz
