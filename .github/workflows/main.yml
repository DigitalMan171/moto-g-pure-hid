name: AOSP Native Motorola Protocol (Master-Linked)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MOTO_VER: "12.0.0"
      ARCH: arm64
      LLVM: 1
      LLVM_IAS: 1
      CROSS_COMPILE: aarch64-linux-android-

    steps:
      - name: 1. Maximize Workspace & Restore Cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            prebuilts/clang/host/linux-x86
            out
          key: ${{ runner.os }}-moto-toolchain-v1
          restore-keys: |
            ${{ runner.os }}-moto-toolchain-

      - name: 2. Clone Official Motorola Source & Setup Toolchain
        run: |
          if [ ! -d ".git" ]; then
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git .
          fi

          if [ ! -d "prebuilts/clang/host/linux-x86" ]; then
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
          prebuilts/clang/host/linux-x86
          fi
          
          CLANG_DIR=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r* | sort -V | tail -n 1)
          echo "CLANG_PATH=$CLANG_DIR" >> $GITHUB_ENV
          echo "$CLANG_DIR/bin" >> $GITHUB_PATH

      - name: 3. Save Toolchain Checkpoint
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: prebuilts/clang/host/linux-x86
          key: ${{ runner.os }}-moto-toolchain-v1

      - name: 4. Execute Native Motorola Build (Master-Linked)
        run: |
          # A. Setup Custom Configuration Fragments
          cat <<EOF > hid_unlock.config
          CONFIG_USB_G_HID=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_MTK_EARA_IO_SUPPORT=y
          CONFIG_MTK_BLOCK_TAG_SUPPORT=y
          EOF

          # B. Generate Master Config
          make O=out ARCH=$ARCH \
          PROJECT=ellis \
          MTK_PROJECT=ellis \
          MTK_PLATFORM=mt6765 \
          TARGET_BOARD_PLATFORM=mt6765 \
          TARGET_PRODUCT=ellis \
          TARGET_BUILD_VARIANT=eng \
          MTK_EARA_IO_SUPPORT=yes \
          MTK_BLOCK_TAG_SUPPORT=yes \
          CONFIG_MOTOROLA_KERNEL_VERSION=$MOTO_VER \
          KBUILD_DEFCONFIG=ext_config/ellis_defconfig.config \
          KERNEL_EXTRA_CONFIG=hid_unlock.config \
          defconfig

          # C. VERIFICATION LINE: Confirm MTK flags are in the final .config
          echo "Checking for MTK Master Blocks..."
          grep -E "CONFIG_MTK_EARA_IO_SUPPORT|CONFIG_MTK_BLOCK_TAG_SUPPORT" out/.config

          # D. Main Compilation
          make O=out -j$(nproc) \
          ARCH=$ARCH \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-android- \
          PROJECT=ellis \
          MTK_PROJECT=ellis \
          MTK_PLATFORM=mt6765 \
          TARGET_BOARD_PLATFORM=mt6765 \
          TARGET_PRODUCT=ellis \
          TARGET_BUILD_VARIANT=eng \
          MTK_EARA_IO_SUPPORT=yes \
          MTK_BLOCK_TAG_SUPPORT=yes \
          CONFIG_MOTOROLA_KERNEL_VERSION=$MOTO_VER \
          KERNEL_EXTRA_CONFIG=hid_unlock.config

      - name: 5. Archive Verified Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-custom-kernel
          path: out/arch/arm64/boot/Image.gz*
