name: Moto G Pure HID Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Configs
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex gcc-aarch64-linux-gnu libssl-dev git

      - name: Install Compatible Legacy Clang
        run: |
          # Use the Clang URL from Phase 2 below
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-toolchain
          echo "$(pwd)/clang-toolchain/clang-r383902/bin" >> $GITHUB_PATH

      - name: Clone Motorola Source
        run: |
          # Use the Motorola URL from Phase 2 below
          git clone --depth=1 --branch android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git source

      - name: Prepare the Blueprint
        run: |
          cp running.config source/arch/arm64/configs/ext_config/ellis_defconfig.config
          sed -i 's/.*CONFIG_USB_CONFIGFS.*/CONFIG_USB_CONFIGFS=y/' source/arch/arm64/configs/ext_config/ellis_defconfig.config
          sed -i 's/.*CONFIG_USB_CONFIGFS_F_HID.*/CONFIG_USB_CONFIGFS_F_HID=y/' source/arch/arm64/configs/ext_config/ellis_defconfig.config
          sed -i 's/.*CONFIG_USB_CONFIGFS_F_FS.*/CONFIG_USB_CONFIGFS_F_FS=y/' source/arch/arm64/configs/ext_config/ellis_defconfig.config
          echo "CONFIG_USB_G_HID=y" >> source/arch/arm64/configs/ext_config/ellis_defconfig.config

      - name: Build the Kernel
        run: |
          cd source
          mkdir -p out
          cp arch/arm64/configs/ext_config/ellis_defconfig.config out/.config
          
          # Sync and Build using Legacy Clang (r383902)
          make O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            KCFLAGS="-w -Wno-error" \
            KERNELRELEASE="4.19.191+" \
            -j$(nproc) Image.gz-dtb

      - name: Upload Finished Kernel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-hid-kernel
          path: source/out/arch/arm64/boot/Image.gz-dtb
