name: Ellis Directory Diagnostic

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          fetch-depth: 1
          path: kernel

      - name: Print Directory Structure
        run: |
          echo "--- STARTING DIRECTORY DIAGNOSTIC ---"
          cd kernel
          
          echo "Checking arch/arm64/configs contents:"
          # We use -R to see if there are vendor subdirectories
          ls -R arch/arm64/configs/
          
          echo "--- SEARCHING FOR ELLIS_DEFCONFIG ---"
          find . -name "ellis_defconfig"
          
          echo "--- CHECKING ENVIRONMENT ---"
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          echo "ARCH: $ARCH"
          echo "CROSS_COMPILE: $CROSS_COMPILE"
          
          echo "--- VERIFYING KCONFIG ROOT ---"
          if [ -f "Kconfig" ]; then
            head -n 20 Kconfig
          else
            echo "Kconfig not found in root!"
          fi
          
          echo "--- DIAGNOSTIC COMPLETE ---"
