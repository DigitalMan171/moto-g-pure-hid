name: Ellis Surgical Build - FINAL PATH FIX
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Ensure we get the vendor/scripts folders

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential bison flex libssl-dev libelf-dev python3
          sudo apt-get install -y clang-11 lld-11 llvm-11 gcc-aarch64-linux-gnu

      - name: Configure and Build
        run: |
          # 1. FIND THE KERNEL ROOT
          # Sometimes 'checkout' puts things in a subfolder. We find the Makefile.
          KERNEL_ROOT=$(find . -name Makefile -exec dirname {} + | head -n 1)
          cd "$KERNEL_ROOT"
          echo "Current working directory is: $(pwd)"
          
          # 2. FIND THE CONFIG
          # We look for ANY ellis config or use the 'running.config' we saved.
          REAL_CONFIG=$(find . -name "*ellis_defconfig*" -o -name "running.config" | head -n 1)
          
          if [ -z "$REAL_CONFIG" ]; then
            echo "STILL NO CONFIG FOUND. Listing files for manual review:"
            ls -R | grep "defconfig" | head -n 20
            exit 1
          fi
          
          # 3. PREP & MERGE
          mkdir -p out
          cp "$REAL_CONFIG" out/.config
          
          # 4. INJECT HID DRIVERS (The Goal)
          {
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_HID_GENERIC=y"
            echo "CONFIG_USB_HID=y"
            echo "CONFIG_SECURITY_SELINUX=y"
            echo "CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE=0"
          } >> out/.config

          # 5. COMPILE
          make O=out ARCH=arm64 CC=clang-11 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make O=out ARCH=arm64 CC=clang-11 LD=ld.lld-11 -j$(nproc) Image.gz

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Surgical-Kernel
          path: "**/out/arch/arm64/boot/Image.gz"
