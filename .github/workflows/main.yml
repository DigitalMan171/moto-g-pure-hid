name: AOSP Native Motorola Protocol (Version-Locked)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # THE MASTER IDENTITY KEYS
      MOTO_VER: "12.0.0"
      ARCH: arm64
      LLVM: 1
      LLVM_IAS: 1
      CROSS_COMPILE: aarch64-linux-android-

    steps:
      - name: 1. Maximize Workspace
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: 2. Clone Official Motorola Source
        run: |
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git .
          
      - name: 3. Setup Native Toolchain (The Link)
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
          prebuilts/clang/host/linux-x86
          
          # We must find the EXACT 'bin' folder containing ld.lld
          TOOLCHAIN_BIN=$(find $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86 -name "ld.lld" -exec dirname {} \;)
          echo "$TOOLCHAIN_BIN" >> $GITHUB_PATH
          echo "Linker found at: $TOOLCHAIN_BIN"

      - name: 4. Execute Native Motorola Build
        run: |
          # 1. CREATE THE EXTRA KEY
          cat <<EOF > hid_unlock.config
          CONFIG_USB_G_HID=y
          CONFIG_USB_CONFIGFS_F_HID=y
          EOF

          # 2. THE NATIVE MASTER COMMAND
          # We use 'defconfig' as the goal. 
          # The Makefile then uses KBUILD_DEFCONFIG to find 'ellis'
          # and KERNEL_EXTRA_CONFIG to find our 'hid' flags.
          make O=out ARCH=$ARCH \
            CONFIG_MOTOROLA_KERNEL_VERSION=$MOTO_VER \
            KBUILD_DEFCONFIG=ext_config/ellis_defconfig.config \
            KERNEL_EXTRA_CONFIG=hid_unlock.config \
            defconfig

          # 3. COMPILE WITH AOSP LINKS
          # Now that .config exists and is merged, we build it.
          make O=out -j$(nproc) \
            ARCH=$ARCH \
            CC=clang \
            LD=ld.lld \
            CROSS_COMPILE=$CROSS_COMPILE \
            CONFIG_MOTOROLA_KERNEL_VERSION=$MOTO_VER \
            KERNEL_EXTRA_CONFIG=hid_unlock.config

      - name: 5. Archive Verified Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-custom-kernel
          path: out/arch/arm64/boot/Image.gz*
