name: Ellis NetHunter - Authenticated Sync
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. Setup Environment & Toolchains
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libelf-dev libc6:i386 libstdc++6:i386 lib32z1 wget python2.7 libncurses5 curl git
          
          # OpenSSL 1.1 Support
          wget http://archive.ubuntu.com/ubuntu/pool/main/o/openssl/libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo dpkg -i libssl1.1_1.1.1f-1ubuntu2_amd64.deb
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          
          # Toolchain Sync
          mkdir tc
          git clone --depth=1 https://github.com/Ancient-Lab/prebuilts_clang_host_linux-x86_clang-r383902 tc/clang
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 tc/gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 tc/gcc32

      - name: 2. Authenticated Clone & Build Block
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use the token to authenticate the clone and avoid the 'Username' prompt
          git clone --depth=1 -b lineage-19.1 https://x-access-token:${GH_TOKEN}@github.com/LineageOS/android_kernel_motorola_mt6765 kernel
          
          # Setup Environment
          export PATH=$GITHUB_WORKSPACE/tc/clang/bin:$GITHUB_WORKSPACE/tc/gcc64/bin:$GITHUB_WORKSPACE/tc/gcc32/bin:$PATH
          export OUT=$GITHUB_WORKSPACE/kernel/out
          mkdir -p $OUT
          
          cd kernel
          
          # Pick the correct config (ellis vs mt6765)
          if [ -f "arch/arm64/configs/ellis_defconfig" ]; then
            make O=$OUT ARCH=arm64 ellis_defconfig
          else
            make O=$OUT ARCH=arm64 mt6765_defconfig
          fi
          
          # NetHunter HID & USB Injection Configs
          ./scripts/config --file $OUT/.config \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_F_HID \
            --enable CONFIG_USB_HID \
            --enable CONFIG_HID_GENERIC \
            --module CONFIG_ATH9K_HTC \
            --module CONFIG_RTL8812AU
          
          # Execute Build (Clang 11.0.1 / r383902)
          make -j$(nproc) O=$OUT ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            Image.gz dtbs

      - name: 3. Artifact Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ellis-nethunter-kernel
          path: |
            kernel/out/arch/arm64/boot/Image.gz
            kernel/out/arch/arm64/boot/dts/mediatek/*.dtb
