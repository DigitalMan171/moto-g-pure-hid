name: Moto G Pure Ellis - Official Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Fetch and Flatten Toolchains
        run: |
          # Clone into temporary spots
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-temp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc64-temp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc32-temp

          # FORCE them into a single-level directory structure we define
          mkdir -p $GITHUB_WORKSPACE/toolchain/clang
          mkdir -p $GITHUB_WORKSPACE/toolchain/gcc64
          mkdir -p $GITHUB_WORKSPACE/toolchain/gcc32

          # Move only the contents of the internal bin folders to our new guaranteed paths
          cp -r clang-temp/clang-r*/. $GITHUB_WORKSPACE/toolchain/clang/
          cp -r gcc64-temp/. $GITHUB_WORKSPACE/toolchain/gcc64/
          cp -r gcc32-temp/. $GITHUB_WORKSPACE/toolchain/gcc32/

          # Clean up the massive temp folders to save space
          rm -rf clang-temp gcc64-temp gcc32-temp
          chmod +x $GITHUB_WORKSPACE/toolchain/gcc64/bin/*

      - name: Set Permanent Paths
        run: |
          # Use the absolute, unchangeable paths we just created
          echo "$GITHUB_WORKSPACE/toolchain/clang/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/toolchain/gcc64/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/toolchain/gcc32/bin" >> $GITHUB_PATH
          
          echo "FINAL_GCC64=$GITHUB_WORKSPACE/toolchain/gcc64/bin/aarch64-linux-android-" >> $GITHUB_ENV
          echo "FINAL_GCC32=$GITHUB_WORKSPACE/toolchain/gcc32/bin/arm-linux-androideabi-" >> $GITHUB_ENV

      - name: Build with Guaranteed Paths
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=$FINAL_GCC64
          export CROSS_COMPILE_ARM32=$FINAL_GCC32
          
          # Verify the file actually exists before starting
          ls -l ${CROSS_COMPILE}gcc || (echo "FILE STILL NOT FOUND" && exit 1)
          
          cd $GITHUB_WORKSPACE/kernel-source
          mkdir -p out
          cp "$GITHUB_WORKSPACE/running.config" out/.config

          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_COMPILE ellis_defconfig
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 olddefconfig
          make -j2 O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 Image.gz-dtb
