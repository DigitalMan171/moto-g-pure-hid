name: Moto G Pure Kernel Build (USB-HID)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4

    - name: Set Up Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm git

    - name: Fetch Toolchains
      run: |
        mkdir toolchains
        cd toolchains
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc32
        echo "TOOLCHAIN_64=$GITHUB_WORKSPACE/toolchains/gcc64/bin" >> $GITHUB_ENV
        echo "TOOLCHAIN_32=$GITHUB_WORKSPACE/toolchains/gcc32/bin" >> $GITHUB_ENV

    - name: Configure and Verify HID Flags
      run: |
        # 1. Locate files dynamically
        CONFIG_TOOL=$(find . -name "config" -path "*/scripts/*" | head -n 1)
        DEFCONFIG=$(find arch/arm64/configs -name "ellis_defconfig" | head -n 1)

        if [ -z "$CONFIG_TOOL" ] || [ -z "$DEFCONFIG" ]; then
          echo "ERROR: Required files (config script or defconfig) not found!"
          exit 1
        fi

        echo "Using Config Tool: $CONFIG_TOOL"
        echo "Using Defconfig: $DEFCONFIG"
        chmod +x "$CONFIG_TOOL"

        # 2. Apply Flags
        "$CONFIG_TOOL" --file "$DEFCONFIG" \
          -e CONFIG_USB_G_HID \
          -e CONFIG_USB_CONFIGFS_F_HID \
          -e CONFIG_USB_F_HID \
          -e CONFIG_INPUT_UINPUT \
          -e CONFIG_HIDRAW \
          -e CONFIG_HID_GENERIC \
          -e CONFIG_USB_CONFIGFS_UEVENT

        # 3. Verification Step (Our "Checklist")
        echo "--- Verification of HID Flags ---"
        grep -E "CONFIG_USB_F_HID|CONFIG_HIDRAW|CONFIG_INPUT_UINPUT" "$DEFCONFIG"
        echo "----------------
