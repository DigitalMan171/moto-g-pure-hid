name: Ellis NetHunter HID Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Checkout Motorola Source
        uses: actions/checkout@v4
        with:
          repository: 'MotorolaMobilityLLC/kernel-mtk'
          ref: 'android-12-release-s3rhs32.20-42-10-4-11'
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev libncurses6 curl wget

      - name: Setup AOSP Clang
        run: |
          wget http://azure.archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/3857008389202edac32d57008bb8c99d2c957f9d/clang-r416183b.tar.gz
          tar -xf clang-r416183b.tar.gz

      - name: Apply HID & DTC Fixes
        run: |
          # 1. DTC Fix: Using find to ensure we hit the right path regardless of nesting
          DTC_FILE=$(find . -name "dtc-lexer.lex.c_shipped")
          sed -i 's/YYSTYPE yylval;//g' "$DTC_FILE"

          # 2. HID Fix: Manual 'sed' instead of patch to avoid Hunk Failures
          # This inserts the required line into f_hid.c precisely
          HID_FILE=$(find . -name "f_hid.c")
          sed -i '/if (opts->refcnt) {/,/}/ s/}/}\n\n\tif (len > PAGE_SIZE) { ret = -ENOSPC; goto end; }/' "$HID_FILE"
          
          echo "DTC and HID patches applied via sed."

      - name: Configure HID & Magic IDs
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          
          # Simplified config call - MTK Makefiles usually handle the path internally
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- ellis_defconfig
          
          ./scripts/config --file out/.config \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_F_HID \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_USB_LIBCOMPOSITE \
            --enable CONFIG_USB_CONFIGFS
            
          # Motorola Magic IDs
          sed -i 's/CONFIG_USB_G_ANDROID_VID=.*/CONFIG_USB_G_ANDROID_VID=0x22b8/' out/.config
          sed -i 's/CONFIG_USB_G_ANDROID_PID=.*/CONFIG_USB_G_ANDROID_PID=0x2e76/' out/.config
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- olddefconfig

      - name: Compile Kernel
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          # We add -k to keep going even if there's a non-critical driver warning
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- KCFLAGS="-w"

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp out/arch/arm64/boot/Image.gz AnyKernel3/ || cp out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r ../Ellis-HID-Kernel.zip ./*

      - name: Upload Flashable Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-NetHunter-HID
          path: Ellis-HID-Kernel.zip
