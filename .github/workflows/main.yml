name: Moto G Pure Ellis - Final Verified Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Config Repository
        uses: actions/checkout@v4
        with:
          path: config-source

      - name: Checkout Motorola Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Install Essential Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libelf-dev libncurses-dev

      - name: Fetch Official AOSP Toolchain
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc-64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc-32
          
          # This fixes the 'not found' error from e2c243.jpg
          chmod -R +x clang-aosp/
          chmod -R +x gcc-64/
          chmod -R +x gcc-32/

      - name: Configure Hybrid HID Architecture
        run: |
          cd kernel-source
          mkdir -p out
          cp ../config-source/running.config out/.config
          
          # Force 64-bit for hardware support while enabling 32-bit compat
          sed -i 's/CONFIG_ARM=y/CONFIG_ARM64=y/' out/.config
          echo "CONFIG_COMPAT=y" >> out/.config
          
          # Inject HID Gadget components (The successful part of e2bef8.jpg)
          {
            echo "CONFIG_USB_CONFIGFS=y"
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_USB_F_HID=y"
            echo "CONFIG_USB_G_HID=y"
          } >> out/.config
          
          export T=$GITHUB_WORKSPACE/clang-aosp/clang-r416183b/bin
          export PATH=$T:$GITHUB_WORKSPACE/gcc-64/bin:$GITHUB_WORKSPACE/gcc-32/bin:$PATH
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

      - name: Final Production Compilation
        run: |
          cd kernel-source
          
          # Set absolute tool paths to prevent any 'command not found' errors
          export T=$GITHUB_WORKSPACE/clang-aosp/clang-r416183b/bin
          export G64=$GITHUB_WORKSPACE/gcc-64/bin/aarch64-linux-android-
          export G32=$GITHUB_WORKSPACE/gcc-32/bin/arm-linux-androideabi-
          
          # Use LLVM_IAS=1 to solve the 'w0' register errors from ed9449.jpg
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=$T/clang \
            LD=$T/ld.lld \
            AR=$T/llvm-ar \
            NM=$T/llvm-nm \
            OBJCOPY=$T/llvm-objcopy \
            OBJDUMP=$T/llvm-objdump \
            READELF=$T/llvm-readelf \
            STRIP=$T/llvm-strip \
            CROSS_COMPILE=$G64 \
            CROSS_COMPILE_ARM32=$G32 \
            LLVM=1 LLVM_IAS=1 Image.gz-dtb

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-HID-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
