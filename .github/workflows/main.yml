name: Moto G Pure Manual Toolchain Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repository
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Fetch Kernel Source
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_motorola_mt6762.git kernel-source

      - name: Download & Setup Manual Toolchain
        run: |
          # Downloading the specific GCC 10.3 toolchain
          wget https://developer.arm.com/-/media/Files/downloads/gnu-a/10.3-2021.07/binrel/gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          tar -xvf gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          mv gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu toolchain

      - name: Build Kernel
        run: |
          # 1. Setup paths
          cd kernel-source
          export TOOLCHAIN_PATH=$(pwd)/../toolchain/bin/aarch64-none-linux-gnu-
          cp ../main-repo/running.config .config
          
          # 2. Inject HID & Permissive flags
          echo "CONFIG_SECURITY_SELINUX_BOOTPARAM=y" >> .config
          echo "CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE=0" >> .config
          echo "CONFIG_SECURITY_SELINUX_DEVELOP=y" >> .config
          echo "CONFIG_USB_G_HID=y" >> .config
          echo "CONFIG_USB_F_HID=y" >> .config
          echo "CONFIG_USB_CONFIGFS_F_HID=y" >> .config
          echo "CONFIG_MODVERSIONS=n" >> .config
          
          # 3. Patch & Compile using the manual toolchain
          sed -i 's/YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true
          make ARCH=arm64 CROSS_COMPILE=$TOOLCHAIN_PATH olddefconfig
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=$TOOLCHAIN_PATH KCFLAGS="-Wno-error" Image.gz
          
          # 4. Final Fusion
          cat arch/arm64/boot/Image.gz arch/arm64/boot/dts/motorola/ellis.dtb > arch/arm64/boot/Image.gz-dtb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HID-Kernel-Manual-Build
          path: kernel-source/arch/arm64/boot/Image.gz-dtb
