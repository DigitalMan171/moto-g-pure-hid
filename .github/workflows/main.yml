name: Ellis Surgical Build - HID Enable
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential bison flex libssl-dev libelf-dev python3
          sudo apt-get install -y clang-11 lld-11 llvm-11 gcc-aarch64-linux-gnu

      - name: Configure and Patch
        run: |
          # 1. VERSION TRICKING
          touch .scmversion
          export LOCALVERSION=""
          
          # 2. LOCATE MERGE SCRIPT DYNAMICALLY
          # Sometimes the script is in /scripts/kconfig, sometimes elsewhere.
          MERGE_SCRIPT=$(find . -name merge_config.sh | head -n 1)
          if [ -z "$MERGE_SCRIPT" ]; then
            echo "Error: merge_config.sh not found in repository!"
            exit 1
          fi
          chmod +x "$MERGE_SCRIPT"
          echo "Using merge script at: $MERGE_SCRIPT"
          
          # 3. THE OFFICIAL MOTO MERGE
          # Fusing Chipset (k65v1) + Device (Ellis)
          ARCH=arm64 "$MERGE_SCRIPT" -O out \
            arch/arm64/configs/k65v1_64_bsp_defconfig \
            arch/arm64/configs/vendor/ellis_defconfig.config
          
          # 4. APPLY SURGICAL FIXES (The Loop Killers)
          ./scripts/config --file out/.config --enable CONFIG_SECURITY_SELINUX
          ./scripts/config --file out/.config --disable CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE
          ./scripts/config --file out/.config --disable CONFIG_SECURITY_SELINUX_DEVELOP
          ./scripts/config --file out/.config --set-val CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE 0
          
          # Disable Module Signing 
          ./scripts/config --file out/.config --disable CONFIG_MODULE_SIG
          ./scripts/config --file out/.config --disable CONFIG_MODVERSIONS
          
          # 5. ENABLE PERIPHERAL DRIVERS
          ./scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --file out/.config --enable CONFIG_HID_GENERIC
          ./scripts/config --file out/.config --enable CONFIG_USB_HID
          
          # Finalize the merged config
          make O=out ARCH=arm64 olddefconfig

      - name: Compile Kernel
        run: |
          make O=out ARCH=arm64 \
          CC=clang-11 \
          LD=ld.lld-11 \
          AR=llvm-ar-11 \
          NM=llvm-nm-11 \
          OBJCOPY=llvm-objcopy-11 \
          OBJDUMP=llvm-objdump-11 \
          STRIP=llvm-strip-11 \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-gnu- \
          -j$(nproc) Image.gz

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Surgical-Kernel
          path: out/arch/arm64/boot/Image.gz
