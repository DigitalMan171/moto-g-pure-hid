name: Moto G Pure HID Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential bison flex libssl-dev gcc-aarch64-linux-gnu

      - name: Git Fix and Fetch Source
        run: |
          # This is the EXACT fix we used when it worked:
          # It forces the runner to ignore SSH and use standard HTTPS without asking for credentials
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://".insteadOf git://
          
          git clone --depth=1 https://github.com/LineageOS/android_kernel_motorola_mt6762 kernel-source

      - name: Build Kernel
        run: |
          cd kernel-source
          
          # 1. Start with your phone's real config
          cp ../running.config .config
          
          # 2. HID and No-Panic Injections
          echo "CONFIG_USB_G_HID=y" >> .config
          echo "CONFIG_USB_F_HID=y" >> .config
          echo "CONFIG_USB_CONFIGFS_F_HID=y" >> .config
          echo "CONFIG_MODVERSIONS=n" >> .config
          echo "CONFIG_SECTION_MISMATCH_WARN_ONLY=y" >> .config
          
          # 3. PREEMPTIVE PATCHES (The fixes that allowed the build to finish at 4:27 AM)
          # Fixing common MTK 'yylloc' and 'ksm_flock' errors
          sed -i 's/YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true
          
          # 4. Finalize and Compile
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          # We use -Wno-error to prevent warnings from stopping the build on newer GCC versions
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error" Image.gz

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HID-Kernel-Build
          path: kernel-source/arch/arm64/boot/Image.gz
