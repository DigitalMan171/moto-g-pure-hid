name: Motorola Ellis Fresh Factory Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Fresh Environment Sync (No Cache)
        run: |
          # A. Official Android Clang Toolchain
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
          prebuilts/clang/host/linux-x86
          
          # B. Core Kernel Source
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          
          # C. Official Build Tools (Cloned directly into 'build')
          # This avoids the 'build/build/build.sh' nested folder error
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-prebuilts-kernel-build-tools.git build
          
          # D. Vendor Modules (Nesting into the expected factory path)
          mkdir -p kernel/vendor/motorola
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/motorola-kernel-modules.git kernel/vendor/motorola/modules

      - name: 2. Toolchain Authorization
        run: |
          # Identify the exact Clang version folder
          CLANG_BIN=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r*/bin | sort -V | tail -n 1)
          
          # Add Motorola's internal tools and Clang to the system PATH
          echo "$GITHUB_WORKSPACE/build/linux-x86/bin" >> $GITHUB_PATH
          echo "$CLANG_BIN" >> $GITHUB_PATH
          
          # Grant execution permission to the factory orchestrator
          chmod +x build/build.sh

      - name: 3. Execution (Motorola Lunch Protocol)
        run: |
          # Required variables for the 'ellis' (Moto G Pure) project config
          export ARCH=arm64
          export PROJECT=ellis
          export MTK_PLATFORM=mt6765
          export TARGET_BUILD_VARIANT=eng
          
          # Hardware Feature Toggles
          export MTK_TOUCH_PANEL=yes
          export MTK_USB_DUAL_ROLE_SUPPORT=yes
          
          # Output and Optimization
          export OUT_DIR=$GITHUB_WORKSPACE/out
          export DIST_DIR=$GITHUB_WORKSPACE/dist
          export INSTALL_MOD_STRIP="--strip-unneeded"
          
          # Run the build from the root workspace
          ./build/build.sh -j$(nproc) \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            KBUILD_DEFCONFIG=ellis_defconfig

      - name: 4. Archive Verified Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-ellis-fresh-build
          path: |
            dist/Image.gz*
            dist/*.ko
            out/.config
