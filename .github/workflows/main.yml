name: Moto G Pure Ellis - Official Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Cache Toolchains
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            clang-aosp
            gcc-64
            gcc-32
          key: ${{ runner.os }}-toolchains-v7

      - name: Fetch Toolchains
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc-64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc-32
          find clang-aosp gcc-64 gcc-32 -type f -exec chmod +x {} +

      - name: Set Toolchain Environments
        run: |
          # 1. Capture the exact bin directory for Clang
          # Using head -n 1 ensures we don't get the double-colon error from d3339a.jpg
          CLANG_BIN=$(ls -d $GITHUB_WORKSPACE/clang-aosp/clang-r*/bin | head -n 1)
          
          # 2. Define absolute paths for GCC
          GCC64_BIN="$GITHUB_WORKSPACE/gcc-64/bin"
          GCC32_BIN="$GITHUB_WORKSPACE/gcc-32/bin"

          # 3. Store in GITHUB_ENV for persistence across steps
          echo "CLANG_PATH=$CLANG_BIN" >> $GITHUB_ENV
          echo "GCC64_PATH=$GCC64_BIN" >> $GITHUB_ENV
          echo "GCC32_PATH=$GCC32_BIN" >> $GITHUB_ENV
          
          # 4. Add to global PATH for the runner
          echo "$CLANG_BIN" >> $GITHUB_PATH
          echo "$GCC64_BIN" >> $GITHUB_PATH
          echo "$GCC32_BIN" >> $GITHUB_PATH

      - name: Verify and Compile
        run: |
          # Use absolute prefixes to bypass "command not found"
          export ARCH=arm64
          export CROSS_COMPILE=$GCC64_PATH/aarch64-linux-android-
          export CROSS_COMPILE_ARM32=$GCC32_PATH/arm-linux-androideabi-
          
          # Verify the binary is reachable
          ${CROSS_COMPILE}gcc --version || (echo "GCC NOT FOUND AT $CROSS_COMPILE" && exit 1)
          
          cd $GITHUB_WORKSPACE/kernel-source
          mkdir -p out
          
          # Copy your config (Verified in d50c7a.jpg)
          cp "$GITHUB_WORKSPACE/running.config" out/.config

          # Build commands with LLVM integration
          make O=out ARCH=arm64 CROSS_COMPILE=$CROSS_COMPILE ellis_defconfig
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 olddefconfig
          
          # Use -j2 for stability to prevent silent crashes
          make -j2 O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=$CROSS_COMPILE CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 Image.gz-dtb

      - name: Upload Kernel Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-Ellis-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
