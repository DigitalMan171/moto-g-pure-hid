name: Moto G Pure Ellis - Final Verified Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Config Repository
        uses: actions/checkout@v4
        with:
          path: config-source

      - name: Checkout Motorola Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Install Essential Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex libssl-dev libelf-dev libncurses-dev

      - name: Fetch Official AOSP Toolchain
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc-64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc-32
          
          # Force execute permissions on EVERYTHING to stop the 'not found' errors
          find clang-aosp -type f -exec chmod +x {} +
          find gcc-64 -type f -exec chmod +x {} +
          find gcc-32 -type f -exec chmod +x {} +

      - name: Compile Official Image
        run: |
          # Use absolute, non-nested variables for maximum shell compatibility
          export ROOT_DIR=$(pwd)
          export T=$ROOT_DIR/clang-aosp/clang-r416183b/bin
          export G64=$ROOT_DIR/gcc-64/bin/aarch64-linux-android-
          export G32=$ROOT_DIR/gcc-32/bin/arm-linux-androideabi-
          
          # Move into source
          cd kernel-source
          mkdir -p out
          cp ../config-source/running.config out/.config
          
          # Standard Moto Configuration
          sed -i 's/CONFIG_ARM=y/CONFIG_ARM64=y/' out/.config
          echo "CONFIG_COMPAT=y" >> out/.config
          {
            echo "CONFIG_USB_CONFIGFS=y"
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_USB_F_HID=y"
            echo "CONFIG_USB_G_HID=y"
          } >> out/.config
          
          # Update PATH once and for all
          export PATH=$T:$ROOT_DIR/gcc-64/bin:$ROOT_DIR/gcc-32/bin:$PATH

          # Build Config first to ensure syntax is valid
          make O=out ARCH=arm64 CROSS_COMPILE=$G64 CROSS_COMPILE_ARM32=$G32 LLVM=1 LLVM_IAS=1 olddefconfig
          
          # Full Build
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            READELF=llvm-readelf \
            STRIP=llvm-strip \
            CROSS_COMPILE=$G64 \
            CROSS_COMPILE_ARM32=$G32 \
            LLVM=1 LLVM_IAS=1 Image.gz-dtb

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-HID-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
