name: Ellis Engineering Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          fetch-depth: 1 # Shallow clone to save time/space
          path: kernel

      - name: Setup Build Tools & Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev
          
          # Increase Git buffers for large transfers
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
          
          # Clone Proton Clang (Much more reliable than AOSP Clang for CI)
          git clone --depth=1 https://github.com/kdrag0n/proton-clang toolchain

      - name: Sync Techpacks
        run: |
          cd kernel
          mkdir -p techpack/display techpack/audio
          # Using shallow clones for techpacks as well
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-msm-techpack-display techpack/display
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-msm-techpack-audio techpack/audio

      - name: Build Engineering Stack
        run: |
          cd kernel
          # Setup paths for Proton Clang
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          
          OUT_DIR=out
          # Initialize Config
          make O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- CC=clang ellis_defconfig
          
          # Inject Engineering/Factory Overrides
          if [ -f arch/arm64/configs/factory-k62v1_32_bsp-ellis.config ]; then
            ./scripts/kconfig/merge_config.sh -O $OUT_DIR $OUT_DIR/.config arch/arm64/configs/factory-k62v1_32_bsp-ellis.config
          fi
          
          # Force-Enable HID and Engineering logic
          ./scripts/config --file $OUT_DIR/.config \
            --enable CONFIG_MTK_ENG_BUILD \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_MTK_SCHED_MONITOR
            
          # Compile using LLVM/Clang
          make O=$OUT_DIR ARCH=arm64 \
               CROSS_COMPILE=aarch64-linux-gnu- \
               CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
               CC=clang \
               AR=llvm-ar \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ellis-eng-kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
