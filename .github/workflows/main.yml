name: Ellis NetHunter HID Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lz4 libssl-dev libelf-dev libncurses6 curl wget

      - name: Setup AOSP Clang
        run: |
          wget http://azure.archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo dpkg -i libtinfo5_6.3-2ubuntu0.1_amd64.deb
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/3857008389202edac32d57008bb8c99d2c957f9d/clang-r416183b.tar.gz
          tar -xf clang-r416183b.tar.gz

      - name: Detect Kernel Root and Apply Fixes
        run: |
          # 1. Find where the Makefile actually is
          KERNEL_ROOT=$(find . -name "Makefile" -exec grep -l "VERSION =" {} + | head -n 1 | xargs dirname)
          echo "KERNEL_ROOT=$KERNEL_ROOT" >> $GITHUB_ENV
          cd $KERNEL_ROOT
          echo "Real Kernel Root is: $(pwd)"

          # 2. Create and Apply DTC Fix
          cat <<EOF > dtc.patch
          --- a/scripts/dtc/dtc-lexer.lex.c_shipped
          +++ b/scripts/dtc/dtc-lexer.lex.c_shipped
          @@ -637,7 +637,6 @@
           char *yytext;
           #endif
           
          -YYSTYPE yylval;
           
           int yyleng;
          EOF

          # 3. Create and Apply HID Fix
          cat <<EOF > hid.patch
          --- a/drivers/usb/gadget/function/f_hid.c
          +++ b/drivers/usb/gadget/function/f_hid.c
          @@ -223,6 +223,7 @@ static ssize_t f_hid_opts_report_desc_store(struct config_item *item,
           	if (opts->refcnt) {
           		ret = -EBUSY;
           		goto end;
          +	}
           
           	if (len > PAGE_SIZE) {
           		ret = -ENOSPC;
          EOF

          patch -p1 < dtc.patch || echo "DTC patch skip"
          patch -p1 < hid.patch || echo "HID patch skip"

      - name: Configure HID & Magic IDs
        run: |
          cd ${{ env.KERNEL_ROOT }}
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          
          # Find the defconfig
          CONF_PATH=$(find . -name "ellis_defconfig" | head -n 1)
          cp "$CONF_PATH" arch/arm64/configs/ellis_nh_defconfig
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- ellis_nh_defconfig
          
          ./scripts/config --file out/.config \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_F_HID \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_USB_LIBCOMPOSITE \
            --enable CONFIG_USB_CONFIGFS
            
          sed -i 's/CONFIG_USB_G_ANDROID_VID=.*/CONFIG_USB_G_ANDROID_VID=0x22b8/' out/.config
          sed -i 's/CONFIG_USB_G_ANDROID_PID=.*/CONFIG_USB_G_ANDROID_PID=0x2e76/' out/.config
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- olddefconfig

      - name: Compile Kernel
        run: |
          cd ${{ env.KERNEL_ROOT }}
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- KCFLAGS="-w"

      - name: Package with AnyKernel3
        run: |
          cd ${{ env.KERNEL_ROOT }}
          git clone https://github.com/osm0sis/AnyKernel3.git
          find out/arch/arm64/boot/ -name "Image.gz*" -exec cp {} AnyKernel3/ \;
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r ../../Ellis-HID-Kernel.zip ./*

      - name: Upload Flashable Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-NetHunter-HID
          path: Ellis-HID-Kernel.zip
