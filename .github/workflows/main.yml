name: Motorola Factory Vendor Build (Order-of-Operations Fix)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Toolchain & Workspace Prep
        uses: actions/cache@v4
        with:
          path: prebuilts/clang/host/linux-x86
          key: ${{ runner.os }}-moto-toolchain-v1

      - name: 2. Setup Factory Environment (Master Lunch Sync)
        run: |
          mkdir -p build device/motorola/ellis
          cat <<EOF > build/envsetup.sh
          function lunch() {
            # --- PRIMARY TARGET ---
            export ARCH=arm64
            export PROJECT=ellis
            export MTK_PROJECT=ellis
            export MTK_PLATFORM=mt6765
            export TARGET_BUILD_VARIANT=eng
            
            # --- VENDOR MASTER SWITCHES (Order of Operations Fix) ---
            # Exporting these ensures the headers are indexed globally
            export MTK_SMI_SUPPORT=yes           
            export MTK_IOMMU_SUPPORT=yes         
            export MTK_EARA_IO_SUPPORT=yes        
            export MTK_BLOCK_TAG_SUPPORT=yes      
            export MTK_USB_DUAL_ROLE_SUPPORT=yes 
            export MTK_COMBO_CHIP=MT6765
            
            # --- HARDWARE & COMPILER METADATA ---
            export BOARD_KERNEL_PAGESIZE=2048
            export BOARD_BOOT_HEADER_VER=2
            export CROSS_COMPILE=aarch64-linux-gnu-
            export CLANG_TRIPLE=aarch64-linux-gnu-
            echo "LUNCHED: ellis-eng (Vendor Protocol Verified)"
          }
          EOF

      - name: 3. Fetch Source Assets
        run: |
          if [ ! -d "kernel" ]; then
            git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
            https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          fi
          if [ ! -d "prebuilts/clang/host/linux-x86" ]; then
            git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            prebuilts/clang/host/linux-x86
          fi

      - name: 4. Build with Corrected Hardware Hierarchy
        run: |
          source build/envsetup.sh
          lunch ellis-eng
          
          CLANG_DIR=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r* | sort -V | tail -n 1)
          export PATH="$CLANG_DIR/bin:$PATH"
          
          # We define the hierarchy here: SMI -> IOMMU -> USB -> Engineering Tools
          cat <<EOF > kernel/ellis_master_sync.config
          # 1. SMI Infrastructure (The Base)
          CONFIG_MTK_SMI=y
          
          # 2. IOMMU & DMA Unlocks
          CONFIG_MTK_IOMMU=y
          CONFIG_MTK_IOMMU_MISC=y
          CONFIG_REMOTE_IOMMU=y
          
          # 3. USB HID Suite
          CONFIG_USB_MTK_HDRC=y
          CONFIG_USB_MTK_PHY=y
          CONFIG_USB_GADGET=y
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_USB_G_HID=y
          
          # 4. Engineering & Blocktag Fixes (Merged to prevent 'undeclared identifier')
          CONFIG_MTK_EARA_IO_SUPPORT=y
          CONFIG_MTK_BLOCK_TAG_SUPPORT=y
          CONFIG_DEBUG_FS=y
          EOF

          cd kernel
          COMMON_FLAGS="ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CLANG_TRIPLE=aarch64-linux-gnu- MTK_PLATFORM=mt6765"

          # STEP A: Base Defconfig
          make O=out $COMMON_FLAGS ellis_defconfig || \
          make O=out $COMMON_FLAGS KBUILD_DEFCONFIG=ext_config/ellis_defconfig.config defconfig

          # STEP B: Synchronize Vendor Fragments
          ./scripts/kconfig/merge_config.sh -m -O out out/.config ellis_master_sync.config
          
          # STEP C: Final Judge (Satisfy all dependencies before compile)
          make O=out $COMMON_FLAGS olddefconfig
          
          # STEP D: Final Compilation
          make O=out -j$(nproc) $COMMON_FLAGS

      - name: 5. Archive Verified Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-ellis-master-sync
          path: |
            kernel/out/arch/arm64/boot/Image.gz*
            kernel/out/.config
