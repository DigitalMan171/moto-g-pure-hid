name: Ellis Engineering Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          # Removing the specific 'ref' so it defaults to the main branch
          # We will checkout the correct branch manually in the next step
          fetch-depth: 0 
          path: kernel

      - name: Sync Ellis Branch and Techpacks
        run: |
          cd kernel
          # Find the actual branch name for ellis on Android 12
          ACTUAL_BRANCH=$(git branch -r | grep "ellis" | grep "android-12" | head -n 1 | sed 's/origin\///' | xargs)
          echo "Found branch: $ACTUAL_BRANCH"
          git checkout $ACTUAL_BRANCH

          # Create techpack structure and sync
          mkdir -p techpack/display techpack/audio
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-msm-techpack-display techpack/display
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-msm-techpack-audio techpack/audio

      - name: Set up Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev
          # Link to AOSP Clang (Standard for Moto/MTK Android 12)
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 build-tools/clang

      - name: Build Engineering Stack
        run: |
          cd kernel
          # Set up Toolchain Path
          CLANG_BIN=$(pwd)/../build-tools/clang/clang-r416183b/bin
          export PATH=$CLANG_BIN:$PATH
          
          OUT_DIR=out
          # 1. Initialize Base Config
          make O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- ellis_defconfig
          
          # 2. Inject Engineering/Factory Overrides
          # This specifically enables the "Eng" hardware logic you found
          if [ -f arch/arm64/configs/factory-k62v1_32_bsp-ellis.config ]; then
            ./scripts/kconfig/merge_config.sh -O $OUT_DIR $OUT_DIR/.config arch/arm64/configs/factory-k62v1_32_bsp-ellis.config
          fi
          
          # 3. Force-Enable HID and Kernel Monitors for your Controller
          ./scripts/config --file $OUT_DIR/.config \
            --enable CONFIG_MTK_ENG_BUILD \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_MTK_SCHED_MONITOR \
            --enable CONFIG_HID_GENERIC
            
          # 4. Compile
          make O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- olddefconfig
          make O=$OUT_DIR ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CLANG_TRIPLE=aarch64-linux-gnu- -j$(nproc)

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: ellis-eng-kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
