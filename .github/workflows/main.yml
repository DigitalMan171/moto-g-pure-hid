- name: 🛡️ Restoration of Line 4000 Logic
        working-directory: source
        run: |
          mkdir -p out
          export ARCH=arm64
          # Step 1: Initialize with the Manufacturer Baseline
          make O=out k65v1_64_bsp_defconfig
          
          # Step 2: Apply the "Line 4000" Bypasses
          # We disable the AEE modules (Line 660 fix) and the WEXT modules (Line 3920 fix)
          ./scripts/config --file out/.config \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_HIDRAW \
            --enable CONFIG_INPUT_UINPUT \
            --disable CONFIG_MTK_AEE_FEATURE \
            --disable CONFIG_MTK_AEE_MRDUMP \
            --disable CONFIG_WEXT_PRIV \
            --disable CONFIG_WEXT_CORE \
            --disable CONFIG_BLK_INLINE_ENCRYPTION \
            --disable CONFIG_WERROR
          
          make O=out olddefconfig

      - name: 🚀 Resume Build (Protocol Lock)
        working-directory: source
        run: |
          export PATH=$(pwd)/../clang/bin:$(pwd)/../gcc64/bin:$(pwd)/../gcc32/bin:$PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-none-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-none-linux-gnueabihf-
          export CC=clang
          
          # Protocol-standard flags to bypass the 'Bad Grammar' in the 3400 range
          export KCFLAGS="-fcommon -fgnu89-inline -w -Wno-error"
          
          # Hard-lock the flags in the Make command to ensure progress past 4000
          make -j$(nproc) O=out \
            KBUILD_WERROR=0 \
            CONFIG_MTK_AEE_FEATURE=n \
            CONFIG_WEXT_PRIV=n \
            CONFIG_BLK_INLINE_ENCRYPTION=n
