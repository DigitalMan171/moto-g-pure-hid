name: Ellis Engineering Build - Makefile Sovereign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          fetch-depth: 1
          path: kernel

      - name: Fetch Legacy Clang (r416183b)
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev

      - name: Build Engineering Stack
        run: |
          # 1. ENTER COMMAND CENTER
          cd kernel
          
          # 2. EXPORT ENGINE VARIABLES
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          export CC=clang
          export HOSTCC=clang
          
          # 3. TOOLCHAIN MAPPING
          export TOOLCHAIN_BIN=$GITHUB_WORKSPACE/clang-aosp/bin
          export PATH=$TOOLCHAIN_BIN:$PATH
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/clang-aosp/lib64:$LD_LIBRARY_PATH
          
          # 4. DEFINE OUTPUT
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          mkdir -p $OUT_DIR
          
          # 5. INITIALIZE BASE CONFIG (The Makefile Target)
          # We use the verified mgk_64_k510_defconfig found in the diagnostic
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=$CC HOSTCC=$HOSTCC \
               LD=ld.lld AR=llvm-ar NM=llvm-nm \
               STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
               mgk_64_k510_defconfig

          # 6. INJECT HID & ENGINEERING NODES
          # Modifying the .config directly using the kernel's own tools
          ./scripts/config --file $OUT_DIR/.config \
            --enable CONFIG_MTK_ENG_BUILD \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_HID_GENERIC \
            --disable CONFIG_SECTION_MISMATCH_WARN_ONLY
            
          # 7. SEAL THE CONFIG (olddefconfig)
          # This forces the Makefile to resolve dependencies for your new HID nodes
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=$CC HOSTCC=$HOSTCC \
               LD=ld.lld AR=llvm-ar NM=llvm-nm \
               olddefconfig
            
          # 8. FINAL COMPILE
          # Only standard targets (Image.gz and dtbs) are called here
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=$CC HOSTCC=$HOSTCC \
               LD=ld.lld AR=llvm-ar NM=llvm-nm \
               STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
               Image.gz dtbs -j$(nproc)

      - name: Package Image.gz-dtb
        run: |
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          # Find the DTB and merge it with the kernel image
          DTB_FILE=$(find $OUT_DIR/arch/arm64/boot/dts/ -name "*6765*.dtb" | head -n 1)
          
          if [ -z "$DTB_FILE" ]; then
             echo "ERROR: DTB not found. Check build logs for dtbs compilation."
             exit 1
          fi
          
          cat $OUT_DIR/arch/arm64/boot/Image.gz "$DTB_FILE" > $OUT_DIR/arch/arm64/boot/Image.gz-dtb
          echo "Build Complete: Image.gz-dtb generated."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ellis-hid-kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
