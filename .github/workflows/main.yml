name: Moto G Pure (MTK) HID Build
run-name: HID Kernel Build - ${{ github.ref_name }}

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libncurses5-dev libssl-dev bison flex libelf-dev gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi pahole

      - name: Fetch Clang Toolchain
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://".insteadOf git://
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: Checkout MTK Kernel Source
        run: |
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-mtk.git -b android-12-release-s3rhs32.20-42-10-4-11 kernel-source

      - name: Build Kernel
        run: |
          export PATH=$(pwd)/clang-aosp/bin:$PATH
          cd kernel-source
          
          # --- REFINED SYNTAX PATCHES ---
          # 1. Targeted Fix: Only add -W where it is specifically missing for implicit declarations
          # This avoids mangling other flags like =return-type
          find . -type f \( -name "Makefile*" -o -name "Kbuild*" \) -exec sed -i 's/ -implicit-function-declaration/ -Wimplicit-function-declaration/g' {} +

          # 2. Global Inline Fixes
          find include/ -name "*.h" -exec sed -i 's/inline void ksm_flock/void ksm_flock/g' {} +
          find kernel/sched/ -name "*.h" -exec sed -i 's/inline void uclamp_se_set/void uclamp_se_set/g' {} +
          
          # 3. Fix 'yylloc' multiple definition
          find . -name "dtc-lexer.lex.c_shipped" -exec sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' {} + || true

          # 4. FORCE REMOVE -Werror (Broad cleanup)
          find . -name "Makefile" -o -name "Kbuild" | xargs sed -i 's/-Werror//g'

          # Environment Setup
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER=build
          export KBUILD_BUILD_HOST=build
          export LOCALVERSION="-HID"
          touch .scmversion

          # Toolchain Prefixes
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # 1. Base Config
          make O=out k65v1_64_bsp_defconfig
          
          # 2. Hardware Fragment Merge
          if [ -f "arch/arm64/configs/ext_config/ellis_defconfig.config" ]; then
            ./scripts/kconfig/merge_config.sh -O out out/.config arch/arm64/configs/ext_config/ellis_defconfig.config
          fi

          # 3. HID Injection
          ./scripts/config --file out/.config --disable CONFIG_USB_G_HID
          ./scripts/config --file out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --file out/.config --enable CONFIG_HID_GENERIC
          ./scripts/config --file out/.config --enable CONFIG_USB_HID
          
          # 4. Sync Config
          make O=out ARCH=arm64 olddefconfig
          
          # 5. Compile
          make O=out ARCH=arm64 KCFLAGS="-Wno-error" -j$(nproc) Image.gz-dtb || make O=out ARCH=arm64 KCFLAGS="-Wno-error" -j1 Image.gz-dtb

      - name: Upload Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Moto-G-Pure-HID-Kernel
          path: kernel-source/out/arch/arm64/boot/Image.gz-dtb
