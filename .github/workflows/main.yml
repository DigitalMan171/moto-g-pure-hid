name: Ellis Engineering Build - Factory Hybrid

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          fetch-depth: 1
          path: kernel

      - name: Fetch Factory Toolchains (Clang & GCC 4.9)
        run: |
          # Primary Compiler: Clang r416183b
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp
          # Legacy Bridge: GCC 4.9 (Required for Binutils/Gas)
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc-arm64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc-arm32

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev

      - name: Build Engineering Stack
        run: |
          cd kernel
          
          # 1. PATHS & BINARIES
          CLANG_BIN=$GITHUB_WORKSPACE/clang-aosp/bin
          GCC64_BIN=$GITHUB_WORKSPACE/gcc-arm64/bin
          GCC32_BIN=$GITHUB_WORKSPACE/gcc-arm32/bin
          
          # Add all three to PATH (Clang first)
          export PATH=$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PATH
          
          # 2. FACTORY VARIABLES
          export ARCH=arm64
          export SUBARCH=arm64
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          export CROSS_COMPILE_ARM32=arm-linux-androideabi-
          
          # We use Clang for C, but we do NOT use LLVM_IAS=1.
          # This forces the build to use the 'aarch64-linux-android-as' from GCC 4.9.
          export CC=clang
          export HOSTCC=clang
          
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/clang-aosp/lib64:$LD_LIBRARY_PATH
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          mkdir -p $OUT_DIR
          
          # 3. INITIALIZE DEFCONFIG
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=$CC HOSTCC=$HOSTCC \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               CROSS_COMPILE=$CROSS_COMPILE \
               CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
               mgk_64_k510_defconfig

          # 4. MOTOROLA HARDWARE MERGE
          ./scripts/kconfig/merge_config.sh -O $OUT_DIR \
            $OUT_DIR/.config arch/arm64/configs/ext_config/moto-mgk_64_k510.config

          # 5. INJECT HID & NATIVE STORAGE
          ./scripts/config --file $OUT_DIR/.config \
            --enable CONFIG_MTK_ENG_BUILD \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_USB_GADGET \
            --enable CONFIG_MTK_MSDC \
            --enable CONFIG_MMC_MTK \
            --enable CONFIG_MTK_RPMB \
            --enable CONFIG_MTK_RPMB_SUPPORT \
            --disable CONFIG_SECTION_MISMATCH_WARN_ONLY
            
          # 6. SEAL CONFIG
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=$CC HOSTCC=$HOSTCC \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               CROSS_COMPILE=$CROSS_COMPILE \
               olddefconfig
            
          # 7. FINAL COMPILE
          # Note: We are NOT passing LLVM=1. This allows the Makefile to pick up
          # the 'as', 'ld', and 'ar' from the GCC 4.9 path automatically.
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=$CC HOSTCC=$HOSTCC \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               CROSS_COMPILE=$CROSS_COMPILE \
               CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
               Image.gz dtbs -j$(nproc)

      - name: Package Image.gz-dtb
        run: |
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          DTB_FILE=$(find $OUT_DIR/arch/arm64/boot/dts/ -name "*6765*.dtb" | head -n 1)
          cat $OUT_DIR/arch/arm64/boot/Image.gz "$DTB_FILE" > $OUT_DIR/arch/arm64/boot/Image.gz-dtb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ellis-factory-hid-kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
