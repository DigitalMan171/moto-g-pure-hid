name: "Ellis Pro-Build: Toolchain-Locked & Security-Unlocked"
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ARCH: arm64
      SUBARCH: arm64
      CLANG_PATH: ${{ github.workspace }}/clang-aosp/bin
      GCC_PATH: ${{ github.workspace }}/toolchains/bin
      OUT_DIR: ${{ github.workspace }}/out
      MTK_PLATFORM: mt6765

    steps:
      - name: "Checkout Motorola Official Source"
        uses: actions/checkout@v4
        with:
          repository: 'MotorolaMobilityLLC/kernel-mtk'
          ref: 'android-12-release-s3rhs32.20-42-10-4-11'
          path: './'

      - name: "Provision Version-Specific Toolchains"
        run: |
          mkdir -p toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu-a/10.3-2021.07/binrel/gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz
          tar -xJf gcc-arm-10.3-2021.07-x86_64-aarch64-none-linux-gnu.tar.xz -C toolchains --strip-components=1
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: "Tier 1: Surgical Fixes & Developer Protocol"
        run: |
          # 1. GLOBAL STANDARDIZATION
          sed -i 's/-Werror//g' Makefile
          sed -i 's/KBUILD_CFLAGS   :=/KBUILD_CFLAGS   := -fcommon /g' Makefile

          # 2. SYMBOL DE-CONFLICTION: Neutralize vendor HID overlaps
          # Renaming mtk-specific hidg variables to ensure standard f_hid.c has priority
          find drivers/misc/mediatek -type f \( -name "*.c" -o -name "*.h" \) -exec sed -i 's/hidg_/mtk_hidg_/g' {} +

          # 3. FIX: CPUFreq Redefinition & Header Guards
          FILE="drivers/misc/mediatek/include/mt-plat/mt6765/include/mach/mtk_cpufreq_api.h"
          sed -i '/enum mt_cpu_dvfs_id {/i #ifndef _MT_CPU_DVFS_ID_\n#define _MT_CPU_DVFS_ID_' $FILE
          sed -i '/MT_CPU_DVFS_ID_MAX/!b;n;s/};/};\n#endif/' $FILE

          # 4. FIX: Path Injections for official sensor/video headers
          SENSOR_PATH="drivers/misc/mediatek/sensors-1.0"
          find $SENSOR_PATH -name "Makefile" -exec sed -i "s|-I\$(srctree)/drivers/misc/mediatek/include|-I\$(srctree)/drivers/misc/mediatek/include -I\$(srctree)/$SENSOR_PATH/sensorHub/inc -I\$(srctree)/$SENSOR_PATH/sensorHub/nanohub|g" {} +
          find drivers/misc/mediatek/video -name "Makefile" -exec sed -i "s|-I\$(srctree)/drivers/misc/mediatek/include|-I\$(srctree)/drivers/misc/mediatek/include -I\$(srctree)/drivers/misc/mediatek/video/include -I\$(srctree)/drivers/misc/mediatek/video/common/include|g" {} +

      - name: "Tier 2: Kconfig 'Standardization' Logic"
        run: |
          mkdir -p $OUT_DIR
          export PATH="$CLANG_PATH:$GCC_PATH:$PATH"
          make O=$OUT_DIR k65v1_64_bsp_defconfig
          
          # DE-CONFLICTION: Disable legacy monolithic gadget that blocks multi-function USB
          ./scripts/config --file $OUT_DIR/.config -d USB_G_ANDROID
          ./scripts/config --file $OUT_DIR/.config -d USB_MTK_OTG
          
          # STANDARD: Enable modern ConfigFS (Industry standard for multi-function USB)
          ./scripts/config --file $OUT_DIR/.config -e USB_CONFIGFS
          ./scripts/config --file $OUT_DIR/.config -e USB_CONFIGFS_F_FS
          ./scripts/config --file $OUT_DIR/.config -e USB_CONFIGFS_F_MTP
          ./scripts/config --file $OUT_DIR/.config -e USB_CONFIGFS_F_HID
          ./scripts/config --file $OUT_DIR/.config -e HIDRAW
          ./scripts/config --file $OUT_DIR/.config -e INPUT_EVDEV
