name: Ellis Final Build Protocol
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          repository: 'MotorolaMobilityLLC/kernel-mtk'
          ref: 'android-12-release-s3rhs32.20-42-10-4-11'

      - name: Restore Toolchains
        run: |
          git clone https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang --depth=1
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc32 --depth=1
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64 --depth=1

      - name: Apply Surgical Config
        run: |
          # Confirmed path from yesterday: arch/arm64/configs/ellis_defconfig
          CONF=arch/arm64/configs/ellis_defconfig
          ARCH=arm64 scripts/config --file $CONF --enable CONFIG_USB_CONFIGFS_F_HID
          ARCH=arm64 scripts/config --file $CONF --enable CONFIG_HID_GENERIC
          ARCH=arm64 scripts/config --file $CONF --enable CONFIG_USB_HID
          ARCH=arm64 scripts/config --file $CONF --enable CONFIG_INPUT_JOYSTICK
          ARCH=arm64 scripts/config --file $CONF --disable CONFIG_SECURITY_SELINUX_DEVELOP

      - name: Build Execution
        run: |
          export PATH=$(pwd)/clang/bin:$(pwd)/gcc64/bin:$(pwd)/gcc32/bin:$PATH
          ARGS="ARCH=arm64 O=out CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi-"
          
          make $ARGS ellis_defconfig
          make -j$(nproc) $ARGS

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-HID-Kernel
          path: out/arch/arm64/boot/Image.gz
