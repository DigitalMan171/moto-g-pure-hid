name: Motorola Ellis HID Kernel Build
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull EXACT Motorola Kernel Source
        run: |
          # The -b flag ensures we pull the Ellis branch, not the default branch.
          # Replace YOUR_ELLIS_BRANCH_NAME with the exact branch from the GitHub dropdown.
          git clone --depth=1 -b YOUR_ELLIS_BRANCH_NAME https://github.com/MotorolaMobilityLLC/kernel-mtk.git .

      - name: 2. Toolchain Prep
        run: |
          mkdir -p prebuilts/clang/host/linux-x86/clang-r416183b
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/bd96dfe349c962681f0e5388af874c771ef96670/clang-r416183b.tar.gz -o clang.tar.gz
          tar -xzf clang.tar.gz -C prebuilts/clang/host/linux-x86/clang-r416183b
          rm clang.tar.gz

      - name: 3. Assemble Config Fragments
        run: |
          export ARCH=arm64
          export KBUILD_OUTPUT=out
          mkdir -p $KBUILD_OUTPUT

          # Since the files end in .config, they are strictly fragments.
          # merge_config.sh is the official, untouched kernel tool for this.
          # We use absolute paths to ensure the script cannot lose them.
          bash scripts/kconfig/merge_config.sh -m -O $KBUILD_OUTPUT \
            $GITHUB_WORKSPACE/arch/arm64/configs/gki_defconfig \
            $GITHUB_WORKSPACE/arch/arm64/configs/ext_config/moto-mt6765.config \
            $GITHUB_WORKSPACE/arch/arm64/configs/ext_config/ellis_defconfig.config

          # Inject the USB HID modules
          bash scripts/config --file $KBUILD_OUTPUT/.config --enable CONFIG_USB_CONFIGFS_F_HID
          bash scripts/config --file $KBUILD_OUTPUT/.config --enable CONFIG_HID_GENERIC
          bash scripts/config --file $KBUILD_OUTPUT/.config --enable CONFIG_USB_HID

      - name: 4. Compile Kernel
        run: |
          export ARCH=arm64
          export CLANG_BIN=$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r416183b/bin
          export PATH=$CLANG_BIN:$PATH
          export KBUILD_OUTPUT=out

          # olddefconfig locks in the merged file so we don't overlap compiler commands
          make O=$KBUILD_OUTPUT CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- -j$(nproc) olddefconfig
          make O=$KBUILD_OUTPUT CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android- KCFLAGS="-w" -j$(nproc) Image.gz dtbs

      - name: 5. Execute Motorola Install Script
        run: |
          mkdir -p ./dist
          VERSION=$(cat out/include/config/kernel.release 2>/dev/null || echo "ellis-hid")
          
          # Run the installer script exactly as required
          bash arch/arm64/boot/install.sh \
            "$VERSION" \
            out/arch/arm64/boot/Image.gz \
            out/System.map \
            ./dist

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Kernel-HID
          path: dist/*
