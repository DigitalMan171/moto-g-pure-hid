name: Ellis Surgical Build - Protocol Fix
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Official Motorola Source
        uses: actions/checkout@v4
        with:
          # We pull DIRECTLY from the source to ensure layers exist
          repository: 'MotorolaMobilityLLC/kernel-mtk'
          ref: 'android-12-release-s3rhs32.20-42-10-4-11'
          fetch-depth: 1

      - name: Fetch Restored Toolchains
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_host_linux-x86 clang-aosp

      - name: Layered Configuration & Verification
        run: |
          mkdir -p out
          
          # MOTOROLA SPEC MERGE
          # Layer 1: Base | Layer 2: Consolidated | Layer 3: Ellis
          cat arch/arm64/configs/k65v1_64_bsp_defconfig \
              arch/arm64/configs/vendor/moto-consolidate.config \
              arch/arm64/configs/vendor/ellis_defconfig.config > out/.config
          
          # INJECT OUR HID FIXES
          {
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_HID_GENERIC=y"
            echo "CONFIG_USB_HID=y"
          } >> out/.config
          
          # PROTOCOL VERIFICATION
          echo "--- STARTING PROTOCOL VERIFICATION ---"
          grep "CONFIG_MTK_PLATFORM" out/.config && echo "✅ Layer 1 Present"
          grep "CONFIG_MTK_TOUCH_PANEL" out/.config && echo "✅ Layer 3 Present"
          grep "CONFIG_USB_HID=y" out/.config && echo "✅ HID Patch Present"

          # FINALIZE
          make O=out ARCH=arm64 \
            CROSS_COMPILE=$(pwd)/gcc64/bin/aarch64-linux-android- \
            CC=$(pwd)/clang-aosp/clang-r416183b1/bin/clang \
            olddefconfig

      - name: Compile
        run: |
          make O=out ARCH=arm64 \
            CROSS_COMPILE=$(pwd)/gcc64/bin/aarch64-linux-android- \
            CC=$(pwd)/clang-aosp/clang-r416183b1/bin/clang \
            -j$(nproc) Image.gz
