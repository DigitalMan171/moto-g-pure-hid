name: Moto Ellis Factory Build v62
on: [workflow_dispatch]

jobs:
  build_kernel:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Workspace Cache
        uses: actions/cache@v4
        with:
          path: |
            prebuilts
            kernel
            build
            out
          key: ${{ runner.os }}-moto-ellis-v62

      - name: 2. Sync and Build
        run: |
          # --- Infrastructure Sync ---
          if [ ! -d "build/make" ]; then
            mkdir -p build/make
            git clone --depth=1 -b android-12.1.0_r27 https://android.googlesource.com/platform/build/make build/make
            cp build/make/envsetup.sh build/envsetup.sh
          fi

          if [ ! -d "kernel" ]; then
            git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          fi

          if [ ! -d "prebuilts/clang/host/linux-x86" ]; then
            mkdir -p prebuilts/clang/host/linux-x86
            git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 prebuilts/clang/host/linux-x86
          fi

          # --- Build Execution ---
          export TOP=$(pwd)
          export TEMPORARY_DISABLE_PATH_RESTRICTIONS=true
          
          # Source and Lunch
          source build/envsetup.sh
          lunch full_ellis-eng
          
          # Toolchain Setup
          CLANG_BIN=$(ls -d $TOP/prebuilts/clang/host/linux-x86/clang-r*/bin | sort -V | tail -n 1)
          export PATH="$CLANG_BIN:$PATH"
          
          # Kernel Configuration
          cd kernel
          make -j2 O=../out ARCH=arm64 LLVM=1 LLVM_IAS=1 mt6765_defconfig
          
          # USB HID Injection
          ./scripts/config --file ../out/.config --enable CONFIG_USB_CONFIGFS_F_HID
          ./scripts/config --file ../out/.config --enable CONFIG_UHID
          ./scripts/config --file ../out/.config --disable CONFIG_STRICT_DEVMEM
          ./scripts/config --file ../out/.config --enable CONFIG_DEVMEM
          
          # Main Compilation
          make -j2 O=../out ARCH=arm64 LLVM=1 LLVM_IAS=1

      - name: 3. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-kernel
          path: out/arch/arm64/boot/Image.gz-dtb
