name: Ellis Engineering Build - Clean Slate

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          fetch-depth: 1
          path: kernel

      - name: Fetch Legacy Clang (r416183b)
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b clang-aosp

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libncurses5-dev libelf-dev

      - name: Build Engineering Stack
        run: |
          cd kernel
          
          # 1. ENVIRONMENT
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-android-
          
          # 2. TOOLCHAIN MAPPING
          export TOOLCHAIN_BIN=$GITHUB_WORKSPACE/clang-aosp/bin
          export PATH=$TOOLCHAIN_BIN:$PATH
          
          # Symlink only the binary utilities, NOT gcc
          ln -sf $TOOLCHAIN_BIN/ld.lld $TOOLCHAIN_BIN/${CROSS_COMPILE}ld
          ln -sf $TOOLCHAIN_BIN/llvm-ar $TOOLCHAIN_BIN/${CROSS_COMPILE}ar
          ln -sf $TOOLCHAIN_BIN/llvm-objcopy $TOOLCHAIN_BIN/${CROSS_COMPILE}objcopy
          ln -sf $TOOLCHAIN_BIN/llvm-nm $TOOLCHAIN_BIN/${CROSS_COMPILE}nm
          
          export LD_LIBRARY_PATH=$GITHUB_WORKSPACE/clang-aosp/lib64:$LD_LIBRARY_PATH
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          mkdir -p $OUT_DIR
          
          # 3. BASE CONFIG
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=clang HOSTCC=clang \
               CROSS_COMPILE=$CROSS_COMPILE \
               LLVM=1 LLVM_IAS=1 mgk_64_k510_defconfig

          # 4. MOTOROLA HARDWARE MERGE
          # This fragment should resolve the "unmet dependencies" for cameras/wifi
          ./scripts/kconfig/merge_config.sh -O $OUT_DIR \
            $OUT_DIR/.config arch/arm64/configs/ext_config/moto-mgk_64_k510.config

          # 5. TARGET INJECTION (HID & Storage)
          # We've removed the manual 'skips' - letting the system resolve naturally
          ./scripts/config --file $OUT_DIR/.config \
            --enable CONFIG_MTK_ENG_BUILD \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_CONFIGFS \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_USB_GADGET \
            --enable CONFIG_MMC_MTK \
            --enable CONFIG_MTK_MSDC \
            --enable CONFIG_MTK_RPMB \
            --enable CONFIG_MTK_RPMB_SUPPORT \
            --disable CONFIG_SECTION_MISMATCH_WARN_ONLY
            
          # 6. SEALING THE CONFIG
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=clang HOSTCC=clang \
               CROSS_COMPILE=$CROSS_COMPILE \
               LLVM=1 LLVM_IAS=1 olddefconfig
            
          # 7. THE COMPILE
          make O=$OUT_DIR ARCH=$ARCH SUBARCH=$SUBARCH \
               CC=clang HOSTCC=clang AS=clang \
               CROSS_COMPILE=$CROSS_COMPILE \
               LLVM=1 LLVM_IAS=1 \
               STRIP=llvm-strip OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
               Image.gz dtbs -j$(nproc)

      - name: Package Image.gz-dtb
        run: |
          OUT_DIR=$GITHUB_WORKSPACE/kernel/out
          DTB_FILE=$(find $OUT_DIR/arch/arm64/boot/dts/ -name "*6765*.dtb" | head -n 1)
          
          if [ -z "$DTB_FILE" ]; then
             echo "ERROR: DTB not found."
             exit 1
          fi
          
          cat $OUT_DIR/arch/arm64/boot/Image.gz "$DTB_FILE" > $OUT_DIR/arch/arm64/boot/Image.gz-dtb
          echo "Package created successfully."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ellis-hid-kernel
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
