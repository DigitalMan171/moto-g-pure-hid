name: Moto G Pure Ellis - Header Space Fix
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Config Repository
        uses: actions/checkout@v4
        with:
          path: config-source

      - name: Checkout Motorola Source
        uses: actions/checkout@v4
        with:
          repository: MotorolaMobilityLLC/kernel-mtk
          ref: android-12-release-s3rhs32.20-42-10-4-11
          path: kernel-source

      - name: Fetch Official AOSP Toolchain
        run: |
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang-aosp
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 gcc-64
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9 gcc-32
          
          # Recursive permission fix
          find clang-aosp -type f -exec chmod +x {} +
          find gcc-64 -type f -exec chmod +x {} +
          find gcc-32 -type f -exec chmod +x {} +

      - name: Compile With Strict Pathing
        run: |
          # Define absolute paths once
          ROOT_DIR=$(pwd)
          CLANG_BIN="$ROOT_DIR/clang-aosp/clang-r416183b/bin"
          GCC64_BIN="$ROOT_DIR/gcc-64/bin"
          GCC32_BIN="$ROOT_DIR/gcc-32/bin"
          
          # Add to system PATH for sub-scripts
          export PATH="$CLANG_BIN:$GCC64_BIN:$GCC32_BIN:$PATH"
          
          cd kernel-source
          mkdir -p out
          cp ../config-source/running.config out/.config
          
          # Configuration injection
          sed -i 's/CONFIG_ARM=y/CONFIG_ARM64=y/' out/.config
          echo "CONFIG_COMPAT=y" >> out/.config
          {
            echo "CONFIG_USB_CONFIGFS=y"
            echo "CONFIG_USB_CONFIGFS_F_HID=y"
            echo "CONFIG_USB_F_HID=y"
            echo "CONFIG_USB_G_HID=y"
          } >> out/.config

          # Sync the config to ensure headers are generated correctly
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- LLVM=1 LLVM_IAS=1 olddefconfig

          # Build execution with explicit tool mapping
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            READELF=llvm-readelf \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LLVM=1 LLVM_IAS=1 Image.gz-dtb
