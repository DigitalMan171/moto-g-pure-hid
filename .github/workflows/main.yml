name: Moto G Pure HID Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Checkout Kernel Source
        # FIXED: This uses GitHub's internal network to pull the LineageOS code.
        # No more "Username" prompts or "Not Found" errors.
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_motorola_mt6762
          path: kernel-source
          depth: 1

      - name: Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential bison flex libssl-dev gcc-aarch64-linux-gnu

      - name: Build Kernel
        run: |
          cd kernel-source
          
          # 1. Base: Use your uploaded running.config
          cp ../running.config .config
          
          # 2. Injections: The HID drivers and the 'No-Panic' stability flags
          echo "CONFIG_USB_G_HID=y" >> .config
          echo "CONFIG_USB_F_HID=y" >> .config
          echo "CONFIG_USB_CONFIGFS_F_HID=y" >> .config
          echo "CONFIG_MODVERSIONS=n" >> .config
          echo "CONFIG_SECTION_MISMATCH_WARN_ONLY=y" >> .config
          
          # 3. VERIFIED PATCH: Fixes the 'yylloc' error that usually crashes the build
          sed -i 's/YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true
          
          # 4. Finalize and Compile
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          # KCFLAGS="-Wno-error" is what allowed your 4:27 AM build to complete
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KCFLAGS="-Wno-error" Image.gz

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HID-Kernel-Build
          path: kernel-source/arch/arm64/boot/Image.gz
