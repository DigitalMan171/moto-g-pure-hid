name: Motorola Ellis Factory Chain (Official Standard)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Workspace Topology Setup
        run: |
          # Kernel Core
          git clone --depth=1 -b android-12-release-s3rhs32.20-42-10-4-11 \
          https://github.com/MotorolaMobilityLLC/kernel-mtk.git kernel
          
          # Official Build Automation Tools
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/kernel-prebuilts-kernel-build-tools.git build
          
          # Supplemental Vendor Hardware Modules
          git clone --depth=1 https://github.com/MotorolaMobilityLLC/motorola-kernel-modules.git vendor/motorola/modules
          
          # Google/Motorola Certified Clang
          git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
          prebuilts/clang/host/linux-x86

      - name: 2. Sanitization & Bridging
        run: |
          # Remove Windows line endings from all vendor configs
          find kernel -name "Kconfig*" -o -name "Makefile*" | xargs sed -i 's/\r//g'
          find vendor/motorola/modules -name "Kconfig*" -o -name "Makefile*" | xargs sed -i 's/\r//g'
          
          # Bridge the repos in the standard Motorola internal path
          mkdir -p kernel/vendor/motorola
          ln -s $GITHUB_WORKSPACE/vendor/motorola/modules kernel/vendor/motorola/modules
          
          # Set up toolchain path
          CLANG_DIR=$(ls -d $GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-r* | sort -V | tail -n 1)
          echo "$CLANG_DIR/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/build/linux-x86/bin" >> $GITHUB_PATH

      - name: 3. Execution (The Official build.sh Protocol)
        run: |
          cd kernel
          
          # Official Environment Variables for Ellis (MT6765)
          export ARCH=arm64
          export PROJECT=ellis
          export MTK_PLATFORM=mt6765
          export TARGET_BUILD_VARIANT=eng
          
          # Define standard output locations
          export OUT_DIR=$GITHUB_WORKSPACE/out
          export DIST_DIR=$GITHUB_WORKSPACE/dist
          
          # Hardware Feature Unlocks
          export MTK_TOUCH_PANEL=yes
          export MTK_USB_DUAL_ROLE_SUPPORT=yes
          export MTK_SMI_SUPPORT=yes
          export MTK_IOMMU_SUPPORT=yes
          export MTK_EARA_IO_SUPPORT=yes
          export MTK_BLOCK_TAG_SUPPORT=yes
          
          # The Build Invocation
          # We use build.sh because it handles 'olddefconfig' and 'merge_config' automatically
          bash ../build/build.sh -j$(nproc) \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            KBUILD_DEFCONFIG=ellis_defconfig

      - name: 4. Artifact Archiving
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moto-g-pure-ellis-factory-image
          path: |
            dist/Image.gz*
            dist/*.ko
            out/.config
