name: Ellis NetHunter HID Build (Full Source Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Sync Source & Techpacks
        run: |
          # 1. Main Kernel
          git clone --depth 1 -b android-12-release-s3rhs32.20-42-10-4-11 https://github.com/MotorolaMobilityLLC/kernel-mtk.git .
          
          # 2. Connectivity (Fixes the mtk_btag errors)
          mkdir -p techpack/connectivity
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/vendor-mediatek-kernel_modules-connectivity-conninfra.git techpack/connectivity
          
          # 3. Motorola Modules (Fixes Touchscreen/Audio errors)
          mkdir -p techpack/motorola
          git clone --depth 1 https://github.com/MotorolaMobilityLLC/motorola-kernel-modules.git techpack/motorola

      - name: Setup Compiler (AOSP Clang)
        run: |
          wget http://azure.archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb
          mkdir -p $GITHUB_WORKSPACE/clang
          cd $GITHUB_WORKSPACE/clang
          curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/3857008389202edac32d57008bb8c99d2c957f9d/clang-r416183b.tar.gz
          tar -xf clang-r416183b.tar.gz

      - name: Configure and Link Techpacks
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          
          # Use the ellis defconfig as base
          CONF_FILE=$(find arch/arm64/configs -iname "*ellis*defconfig*" | head -n 1)
          cp "$CONF_FILE" arch/arm64/configs/ellis_nh_defconfig

          # Standard NetHunter HID configuration
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- ellis_nh_defconfig
          ./scripts/config --file out/.config \
            --enable CONFIG_USB_G_HID \
            --enable CONFIG_USB_CONFIGFS_F_HID \
            --enable CONFIG_USB_F_HID \
            --enable CONFIG_HID_GENERIC \
            --enable CONFIG_USB_LIBCOMPOSITE \
            --enable CONFIG_USB_CONFIGFS
            
          # Apply IDs
          sed -i 's/CONFIG_USB_G_ANDROID_VID=.*/CONFIG_USB_G_ANDROID_VID=0x22b8/' out/.config
          sed -i 's/CONFIG_USB_G_ANDROID_PID=.*/CONFIG_USB_G_ANDROID_PID=0x2e76/' out/.config
          
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-android- olddefconfig

      - name: Compile with Manual Header Linking
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          
          # THE SOURCE FIX:
          # We force the compiler to include the techpack directories in its search path.
          # This provides the 'mtk_btag' and 'touchscreen' definitions.
          export KCFLAGS="-w \
            -I$(pwd)/techpack/connectivity/include \
            -I$(pwd)/techpack/motorola/include \
            -I$(pwd)/drivers/misc/mediatek/include"
          
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-android- \
          KCFLAGS="$KCFLAGS"

      - name: Package Results
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          find out/arch/arm64/boot/ -name "Image.gz*" -exec cp {} AnyKernel3/ \;
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          zip -r ../Ellis-Full-Source-Kernel.zip ./*

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Ellis-Full-Source-Kernel
          path: Ellis-Full-Source-Kernel.zip
